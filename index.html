  // A COUNTER-stance knight is purely DEFENSIVE: even if residual swingVel makes
  // its pan "live", it must NOT count as an attacker. Otherwise a same-frame
  // mutual collision would hit the CLASH branch and CLANG before applyHit() can
  // run the counter short-circuit (negate + reflect). Exclude counterTimer > 0.
  const aLive = p1.hitCdTimer === 0 && p1.swingVel > TUNE.hitSpeed &&
                p1.state !== ST.FALLING && p1.state !== ST.GUARD && p1.counterTimer === 0;
  const bLive = p2.hitCdTimer === 0 && p2.swingVel > TUNE.hitSpeed &&
                p2.state !== ST.FALLING && p2.state !== ST.GUARD && p2.counterTimer === 0;

  const aReach = aLive && circleHitsBox(tipA.x, tipA.y, TUNE.panTipR, boxB) && p2.state !== ST.FALLING;
  const bReach = bLive && circleHitsBox(tipB.x, tipB.y, TUNE.panTipR, boxA) && p1.state !== ST.FALLING;

  // CLASH: both pans fast toward each other and either tip overlaps the other.
  const tipsMeet =
    circleHitsBox(tipA.x, tipA.y, TUNE.panTipR, bodyBoxAround(tipB.x, tipB.y, TUNE.panTipR)) ;
  if (aLive && bLive && (tipsMeet || (aReach && bReach))) {
    const dirP1 = (p1.x <= p2.x) ? -1 : 1;   // shove each away from the other
    p1.swingVel = -p1.swingVel * TUNE.clashReflect;
    p2.swingVel = -p2.swingVel * TUNE.clashReflect;
    p1.vx += TUNE.clashPush * dirP1;  p1.knockTimer = 0.20;
    p2.vx += TUNE.clashPush * -dirP1; p2.knockTimer = 0.20;
    p1.hitCdTimer = TUNE.hitCooldown; p2.hitCdTimer = TUNE.hitCooldown;
    gainSp(p1, TUNE.spClashGain); gainSp(p2, TUNE.spClashGain);
    const cx = (tipA.x + tipB.x) / 2, cy = (tipA.y + tipB.y) / 2;
    spawnSparks(cx, cy, 24, PAL.clash);
    spawnFloater(cx, cy - 18, "CLANG!", PAL.clash);
    addShake(8);
    triggerHitStop(TUNE.hitStopMin);
    sfxClang();
    return;
  }

  if (aReach) applyHit(p1, p2, tipA);
  if (bReach) applyHit(p2, p1, tipB);
}
function bodyBoxAround(cx, cy, r) {
  return { x1: cx - r, x2: cx + r, y1: cy - r, y2: cy + r };
}

function applyHit(attacker, target, tip) {
  // ===== COUNTER STANCE: target is bracing — NEGATE this hit and PUNISH =====
  // If the would-be victim is in their counter window, the incoming hit deals
  // NOTHING to them; instead the attacker eats a big reflected shove + balance.
  // The attacker's swing energy is consumed and they get the one-hit lockout so
  // the negated swing can't immediately re-bite.
  if (target.counterTimer > 0 && target.state !== ST.FALLING) {
    target.counterTimer = 0;
    target.counterFlash = 0.4;
    const dir = (attacker.x >= target.x) ? 1 : -1;   // shove attacker away from target
    attacker.vx += TUNE.counterKnock * dir;
    attacker.knockTimer = 0.30;
    attacker.balance = Math.max(0, attacker.balance - TUNE.counterBal);
    attacker.swingVel = -Math.abs(attacker.swingVel) - TUNE.counterReact; // rocked back
    attacker.swingVel = Math.max(attacker.swingVel, -TUNE.swingMax * 6);
    attacker.hitCdTimer = TUNE.hitCooldown;
    attacker.megaPending = false;     // a countered mega is spent, not retained
    // SP: countering knight rewarded as if landing; attacker as if taking.
    gainSp(target, TUNE.spGainLand); gainSp(attacker, TUNE.spGainTake);
    spawnSparks(tip.x, tip.y, 24, PAL.clash);
    spawnFloater(target.x, target.y - TUNE.knightH - 6, "COUNTER!",
                 target.side === "p1" ? PAL.redLight : PAL.bluLight, 2.0);
    addBigShake(18);
    triggerHitStop(TUNE.hitStopMax);
    sfxCounter();
    return;
  }

  const guarding = target.state === ST.GUARD;

  // force scales with pan-tip approach speed (swingVel), capped to avoid one-shots
  const speed = Math.min(TUNE.forceCap, attacker.swingVel);
  let knock = TUNE.knockScale * speed;
  let balLoss = TUNE.balHitScale * speed;
  let react = TUNE.reaction * speed;

  // MEGA SMASH: this is the sanctioned anti-one-shot EXCEPTION. The giant
  // swingVel is still capped by forceCap above (so normal math holds), then we
  // multiply knock & balance AFTER the cap for the 2-3x payoff. Consumed here.
  const mega = attacker.megaPending;
  if (mega) {
    knock *= TUNE.megaMul;
    balLoss *= TUNE.megaMul;
    attacker.megaPending = false;
  }

  // low-balance target gets shoved further (danger / comeback lever)
  const balFrac = target.balance / TUNE.balanceMax;            // 1 full .. 0 empty
  const lowMul = 1 + (TUNE.lowBalKnockMul - 1) * (1 - balFrac);
  knock *= lowMul;

  if (guarding) { knock *= TUNE.guardMul; balLoss *= TUNE.guardMul; react *= TUNE.guardMul; }

  // ANCHOR: target is planted — greatly reduce incoming seat-knock + balance loss.
  if (target.anchorTimer > 0) {
    knock *= TUNE.anchorKnockMul;
    balLoss *= TUNE.anchorBalMul;
  }

  // EDGE = DANGER: a target near the rim is amplified-shoved (knockback ONLY,
  // never life — that keeps the ~10-hit depletion math honest). Scales toward
  // edgeKnockMul at the very edge. Stacks multiplicatively with lowMul.
  const tEdgeN = Math.min(1, Math.abs(target.x - logCenter) / (logW / 2)); // 0..1
  if (tEdgeN > TUNE.edgeKnockZone) {
    const e = (tEdgeN - TUNE.edgeKnockZone) / (1 - TUNE.edgeKnockZone);
    knock *= 1 + (TUNE.edgeKnockMul - 1) * Math.min(1, Math.max(0, e));
  }

  // seat knockback away from me (this is what shoves them toward the edge)
  const dir = (target.x >= attacker.x) ? 1 : -1;
  target.vx += knock * dir;
  target.knockTimer = 0.30;                  // let the shove exceed maxSpeed briefly
  target.balance = Math.max(0, target.balance - balLoss);
  // rock the opponent backward: a swing AWAY from me = negative swingVel for them
  target.swingVel -= react;

  // consume MY energy + one-hit lockout
  attacker.swingVel *= TUNE.swingConsume;
  attacker.hitCdTimer = TUNE.hitCooldown;

  // SP gain: lander gets more, taker gets a smaller amount; guard chips a little.
  gainSp(attacker, TUNE.spGainLand);
  gainSp(target, guarding ? TUNE.spGainGuard : TUNE.spGainTake);

  // effects (size scales with force; MEGA gets a bespoke onomatopoeia + extra FX)
  const heavy = speed > TUNE.hitSpeed + 2.5;
  const cx = tip.x, cy = tip.y;
  spawnSparks(cx, cy, guarding ? 10 : (mega ? 32 : (heavy ? 22 : 15)),
              guarding ? PAL.steel : (mega ? PAL.clash : PAL.spark));
  let words;
  if (mega) words = ["GWAAAN!", "SMASH!"];
  else if (guarding) words = ["CLANG!", "GUARD!"];
  else if (heavy) words = ["POW!", "THWACK!", "WHAM!"];
  else words = ["BONK!", "DOINK!", "WHACK!"];
  spawnFloater(cx, cy - 16, words[Math.floor(Math.random() * words.length)],
               guarding ? PAL.steel : (attacker.side === "p1" ? PAL.redLight : PAL.bluLight),
               mega ? 2.4 : 1);
  if (mega) addBigShake(24);
  else addShake(guarding ? 4 : (heavy ? 12 : 8));
  // hit-stop scaled to force (MEGA always max)
  const hs = TUNE.hitStopMin + (TUNE.hitStopMax - TUNE.hitStopMin) *
             Math.min(1, (speed - TUNE.hitSpeed) / (TUNE.forceCap - TUNE.hitSpeed));
  if (!guarding) triggerHitStop(mega ? TUNE.hitStopMax : hs);
  if (mega) sfxMega(); else sfxHit();
}

// After physics, check whether a falling knight has dropped off-screen
// and resolve the round (with both-off tiebreak).
function checkRoundResolution() {
  if (gameState !== GS.PLAYING) return;
  // TRAINING never resolves rounds — life is pinned and fallers are auto-
  // recentered upstream. Belt-and-suspenders guard so a future code path
  // can't accidentally award a round (or advance the match) in training.
  if (gameMode === "training") return;
  const p1Down = p1.state === ST.FALLING && p1.y > VH + 120;
  const p2Down = p2.state === ST.FALLING && p2.y > VH + 120;

  if (p1Down && p2Down) {
    // both gone: whoever fell LATER survives longer -> wins.
    // tiebreak on same frame: higher balance wins.
    let winner;
    if (p1.fellAtFrame > p2.fellAtFrame) winner = p1;
    else if (p2.fellAtFrame > p1.fellAtFrame) winner = p2;
    else winner = (p1.balance >= p2.balance) ? p1 : p2;
    awardRound(winner);
  } else if (p1Down) {
    awardRound(p2);
  } else if (p2Down) {
    awardRound(p1);
  }
}

// ----------------------------- MAIN UPDATE ---------------------------
function readInputs() {
  const i1 = {
    left: held.has("KeyA"), right: held.has("KeyD"),
    jump: held.has("KeyW"), guard: held.has("KeyS"),
    attack: consumeAttack("p1"),
  };
  const i2 = {
    left: held.has("ArrowLeft"), right: held.has("ArrowRight"),
    jump: held.has("ArrowUp"), guard: held.has("ArrowDown"),
    attack: consumeAttack("p2"),
  };
  i1.special = consumeSpecial("p1");
  i2.special = consumeSpecial("p2");
  return [i1, i2];
}

// ----------------------------- CPU AI --------------------------------
// aiInputs(self, foe, dt): returns the SAME shape readInputs produces for a
// player — {left,right,jump,guard,attack,special} of booleans — so the existing
// edge-triggered tap-swing / special-activation logic fires unchanged. attack &
// special are MOMENTARY: true on exactly the frame the AI decides to act, gated
// by per-knight cadence/reaction timers stored on `self` so it never machine-guns
// and a human can trade/punish. Cheap heuristics only; runs every PLAYING frame.
//
// Priorities (high -> low): self-preservation (edge) > spacing > attack > defense
// > special > hop. A FALLING self or foe => the AI idles (no actions).
function aiInputs(self, foe, dt) {
  const idle = { left:false, right:false, jump:false, guard:false, attack:false, special:false };

  // tick AI cadence/reaction timers
  if (self.aiSwingCd    > 0) self.aiSwingCd    = Math.max(0, self.aiSwingCd    - dt);
  if (self.aiReactTimer > 0) self.aiReactTimer = Math.max(0, self.aiReactTimer - dt);
  if (self.aiGuardCd    > 0) self.aiGuardCd    = Math.max(0, self.aiGuardCd    - dt);
  // a guard hold that just elapsed arms the post-guard lockout so the AI drops
  // its brace and becomes punishable (no infinite turtling).
  if (self.aiGuardTimer > 0) {
    self.aiGuardTimer = Math.max(0, self.aiGuardTimer - dt);
    if (self.aiGuardTimer === 0) self.aiGuardCd = TUNE.aiGuardCd;
  }

  // The AI must never act while anyone is falling.
  if (self.state === ST.FALLING || foe.state === ST.FALLING) return idle;

  const out = { left:false, right:false, jump:false, guard:false, attack:false, special:false };

  const d = foe.x - self.x;            // + => foe to the right
  const absd = Math.abs(d);
  const faceDir = d >= 0 ? 1 : -1;     // direction from self toward foe
  const facingFoe = self.facing === faceDir;
  const inRange = absd <= TUNE.aiConnectRange;

  // distance from self to its OWN nearest log edge (small => danger)
  const distToLeft  = self.x - logLeft;
  const distToRight = logRight - self.x;
  const nearLeftEdge  = distToLeft  < TUNE.aiEdgeMargin;
  const nearRightEdge = distToRight < TUNE.aiEdgeMargin;
  const nearEdge = nearLeftEdge || nearRightEdge;

  // (a) SELF-PRESERVATION (highest): if near our own edge, scoot toward CENTER.
  // This overrides closing toward the foe so the AI never voluntarily walks off.
  if (nearEdge) {
    if (nearLeftEdge)  out.right = true;   // edge is to the left => move right (center)
    if (nearRightEdge) out.left  = true;   // edge is to the right => move left (center)
    // ANCHOR if available while pinned near the edge (anti-ring-out use).
    if (self.chosenSpecial === "anchor" && self.special >= TUNE.spMax &&
        !specialActive(self) && self.aiReactTimer === 0) {
      out.special = true;
      self.aiReactTimer = TUNE.aiReactDelay;
    }
    return out;   // commit to escaping the edge this frame
  }

  // (b) SPACING: close the gap when too far; ease off if overlapping-close.
  if (absd > TUNE.aiConnectRange) {
    if (faceDir > 0) out.right = true; else out.left = true;
    // occasional hop to close distance faster (only when safely far from edge)
    if (Math.random() < TUNE.aiHopProb && self.onGround) out.jump = true;
  } else if (absd < TUNE.aiCloseRange) {
    // a touch too close: drift back slightly to keep swinging room (toward center)
    if (faceDir > 0) out.left = true; else out.right = true;
  } else {
    // mid range: face the foe by nudging toward it (establishes facing for swings)
    if (!facingFoe) { if (faceDir > 0) out.right = true; else out.left = true; }
  }

  // (d) DEFENSE: if the foe is winding a hard swing toward us and in range, and
  // we're not mid-swing, GUARD with some probability (reaction-limited). A held
  // guard runs out via aiGuardTimer so the AI never turtles forever.
  const foeThreat = foe.swingVel > TUNE.aiFoeSwingThreat && inRange && self.swingVel < TUNE.hitSpeed;
  if (self.aiGuardTimer > 0) {
    out.guard = true;
    // while guarding, stop trying to move/swing this frame
    out.left = out.right = out.jump = out.attack = false;
    return out;
  }
  if (foeThreat && self.aiReactTimer === 0 && self.aiGuardCd === 0 &&
      Math.random() < TUNE.aiGuardProb) {
    self.aiGuardTimer = TUNE.aiGuardTime;
    self.aiReactTimer = TUNE.aiReactDelay;
    return { left:false, right:false, jump:false, guard:true, attack:false, special:false };
  }

  // (e) SPECIAL: only when the gauge is full and one is chosen. Choose the moment
  // by type. Momentary (one frame), reaction-gated. dash is checked against our
  // own edge so the dash can't carry us off.
  if (self.special >= TUNE.spMax && self.chosenSpecial && !specialActive(self) &&
      self.aiReactTimer === 0) {
    let fire = false;
    switch (self.chosenSpecial) {
      case "mega":    fire = inRange && foe.state !== ST.GUARD; break;
      case "counter": fire = foe.swingVel > TUNE.aiFoeSwingThreat && inRange; break;
      case "dash": {
        // don't dash if it would carry us toward our own near edge
        const dashTargetX = self.x + faceDir * TUNE.dashVx * TUNE.dashTime;
        const safe = dashTargetX > logLeft + TUNE.aiEdgeMargin * 0.5 &&
                     dashTargetX < logRight - TUNE.aiEdgeMargin * 0.5;
        fire = safe && absd > TUNE.aiCloseRange && absd < TUNE.aiConnectRange * 1.6;
        break;
      }
      case "anchor":  fire = self.balance < TUNE.balanceMax * 0.4; break;
      default:        fire = inRange; break;
    }
    if (fire) { out.special = true; self.aiReactTimer = TUNE.aiReactDelay; return out; }
  }

  // (c) ATTACK: in range, facing the foe, off cooldown, not guarding. Gated by a
  // randomized cadence so it isn't a machine-gun. Note swings use the CURRENT
  // facing (updated by the move frames above), so require facingFoe here.
  if (inRange && facingFoe && self.aiSwingCd === 0 && self.aiReactTimer === 0 &&
      self.swingVel < TUNE.hitSpeed && !specialActive(self)) {
    out.attack = true;
    out.left = out.right = false;   // plant for the swing
    self.aiSwingCd = TUNE.aiSwingCdMin + Math.random() * (TUNE.aiSwingCdMax - TUNE.aiSwingCdMin);
    self.aiReactTimer = TUNE.aiReactDelay;
  }

  return out;
}

// ----------------------------- NETPLAY SNAPSHOT ----------------------
// Compact per-knight render state. Includes EVERY field render()/drawKnight()/
// drawHUD()/drawSelect() reads off a knight. Particle/floater arrays are NOT
// serialized (they're driven by FX events on the guest).
function snapKnight(k) {
  return {
    x: k.x, y: k.y, facing: k.facing,
    swingAngle: k.swingAngle, state: k.state,
    balance: k.balance, special: k.special, chosenSpecial: k.chosenSpecial,
    tumble: k.tumble || 0, attackFlash: k.attackFlash,
    windupTimer: k.windupTimer, counterTimer: k.counterTimer,
    counterFlash: k.counterFlash, dashTimer: k.dashTimer,
    anchorTimer: k.anchorTimer, onGround: k.onGround,
    rounds: k.rounds, spReadyPulse: k.spReadyPulse, bob: k.bob,
  };
}
function applyKnight(k, s) {
  if (!s) return;
  k.x = s.x; k.y = s.y; k.facing = s.facing;
  k.swingAngle = s.swingAngle; k.state = s.state;
  k.balance = s.balance; k.special = s.special; k.chosenSpecial = s.chosenSpecial;
  k.tumble = s.tumble; k.attackFlash = s.attackFlash;
  k.windupTimer = s.windupTimer; k.counterTimer = s.counterTimer;
  k.counterFlash = s.counterFlash; k.dashTimer = s.dashTimer;
  k.anchorTimer = s.anchorTimer; k.onGround = s.onGround;
  k.rounds = s.rounds; k.spReadyPulse = s.spReadyPulse; k.bob = s.bob;
}

// Build the full authoritative snapshot the guest needs to render any state.
function buildSnapshot() {
  return {
    gs: gameState,
    p1: snapKnight(p1),
    p2: snapKnight(p2),
    roundTimer,
    countdownIndex, countdownTimer,
    timeUpBanner, drawBanner,
    roundWinner: roundWinner ? roundWinner.side : null,
    matchWinner: matchWinner ? matchWinner.side : null,
    // SELECT-screen state
    selp1c: sel.p1.cursor, selp1l: sel.p1.locked,
    selp2c: sel.p2.cursor, selp2l: sel.p2.locked,
    readyTimer: sel.readyTimer,
    // mode label so guest's HUD/labels match (always "online" here, but kept
    // explicit; guest forces gameMode="online" anyway)
    shake,   // current shake is carried so the guest's world jitter tracks host;
             // FX shake EVENTS also fire, but updateEffects decays both consistently.
    stage: currentStageIndex,   // host-rolled stage so the guest's drawBackground matches
  };
}

// GUEST: write a received snapshot into local globals so render() draws it.
function applySnapshot(s) {
  if (!s) return;
  gameState = s.gs;
  applyKnight(p1, s.p1);
  applyKnight(p2, s.p2);
  roundTimer = s.roundTimer;
  countdownIndex = s.countdownIndex; countdownTimer = s.countdownTimer;
  timeUpBanner = s.timeUpBanner; drawBanner = s.drawBanner;
  roundWinner = s.roundWinner === "p1" ? p1 : (s.roundWinner === "p2" ? p2 : null);
  matchWinner = s.matchWinner === "p1" ? p1 : (s.matchWinner === "p2" ? p2 : null);
  sel.p1.cursor = s.selp1c; sel.p1.locked = s.selp1l;
  sel.p2.cursor = s.selp2c; sel.p2.locked = s.selp2l;
  sel.readyTimer = s.readyTimer;
  // shake: take the host's value as a floor so the guest's world jitter tracks the
  // host (its own updateEffects decays it between snapshots).
  shake = Math.max(shake, s.shake || 0);
  // Mirror the host's chosen stage so the guest's background matches. Guarded
  // against older snapshots that pre-date the field.
  if (typeof s.stage === "number") currentStageIndex = s.stage;
}

// HOST: flush this frame's snapshot + recorded FX events to the guest.
function hostBroadcast() {
  if (net.mode !== "host" || !net.connected || !net.ws || net.ws.readyState !== 1) {
    net.outEvents.length = 0;
    return;
  }
  const msg = { t: "st", s: buildSnapshot(), ev: net.outEvents };
  try { net.ws.send(JSON.stringify(msg)); } catch (err) {}
  net.outEvents.length = 0;
}

// HOST: translate the relayed guest input into SELECT navigation for p2. The guest
// sends uniform HELD flags every frame; the host edge-detects l/r (cursor move) and
// g (un-lock) here, and uses the already-edge-triggered attack as LOCK. This mirrors
// handleSelectKey's P2 branch but driven by the guest's stream.
function hostSelectFromGuest() {
  if (sel.readyTimer > 0) { net.guestAttackPending = false; net.guestSpecialPending = false; return; }
  const N = SPECIALS.length;
  const gi = net.guestInput;
  const prev = net.prevGuestLR;
  if (!sel.p2.locked) {
    if (gi.l && !prev.l) { sel.p2.cursor = (sel.p2.cursor + N - 1) % N; sfxSelect(); }
    if (gi.r && !prev.r) { sel.p2.cursor = (sel.p2.cursor + 1) % N; sfxSelect(); }
    if (net.guestAttackPending) { sel.p2.locked = true; p2.chosenSpecial = SPECIALS[sel.p2.cursor].id; sfxLock(); }
  } else {
    if (gi.g && !prev.g) { sel.p2.locked = false; p2.chosenSpecial = null; sfxSelect(); }
  }
  // consume edge state for next frame; drain attack/special so they don't leak
  prev.l = gi.l; prev.r = gi.r; prev.g = gi.g;
  net.guestAttackPending = false; net.guestSpecialPending = false;
  // both locked => start READY beat (same trigger as handleSelectKey / 1p)
  if (sel.p1.locked && sel.p2.locked && sel.readyTimer === 0) {
    sel.readyTimer = TUNE.readyDelay;
    sfxFight();
  }
}

function update(dt) {
  frameCount++;

  // --- HIT-STOP: freeze the sim (and the round clock) for a few ms, then
  // resume. lastTime advances every frame, so the frame after a freeze has a
  // normal small dt — no accumulation, no spiral. Effects + render still run.
  if (hitStopTimer > 0) {
    hitStopTimer = Math.max(0, hitStopTimer - dt);
    updateEffects(dt);
    return;
  }

  updateEffects(dt);

  if (gameState === GS.SELECT) {
    // drain any stray attack/special arms so they don't leak into the match
    consumeAttack("p1"); consumeAttack("p2");
    consumeSpecial("p1"); consumeSpecial("p2");
    // ---- 1p: CPU auto-picks a random special and auto-locks after a short beat.
    // Its cursor walks toward the pick so the card visibly settles, then locks.
    if (gameMode === "1p" && !sel.p2.locked && sel.readyTimer === 0) {
      // Pick a stable random TARGET card once (on the first SELECT frame after
      // entry), then visibly step the cursor toward it during the pick delay so
      // the card cursor is seen moving, and LOCK on the target when the timer
      // elapses. cpuPickTarget<0 means "not chosen yet this SELECT".
      if (cpuPickTarget < 0) cpuPickTarget = Math.floor(Math.random() * SPECIALS.length);
      if (cpuPickTimer > 0) {
        cpuPickTimer = Math.max(0, cpuPickTimer - dt);
        // step the cursor one card toward the target every ~0.18s of the delay
        cpuStepTimer -= dt;
        if (cpuStepTimer <= 0 && sel.p2.cursor !== cpuPickTarget) {
          const dir = (cpuPickTarget - sel.p2.cursor + SPECIALS.length) % SPECIALS.length;
          // shortest visual walk (left or right) toward the target
          sel.p2.cursor = (dir <= SPECIALS.length / 2)
            ? (sel.p2.cursor + 1) % SPECIALS.length
            : (sel.p2.cursor + SPECIALS.length - 1) % SPECIALS.length;
          cpuStepTimer = 0.18;
          sfxSelect();
        }
        if (cpuPickTimer === 0) {
          sel.p2.cursor = cpuPickTarget;     // settle on the chosen card
          sel.p2.locked = true;
          p2.chosenSpecial = SPECIALS[sel.p2.cursor].id;
          sfxLock();
        }
      }
    }
    // ---- online HOST: drive p2's SELECT cursor/lock from the guest's relayed
    // input (edge-detected). The READY-beat trigger below covers the lock-in.
    if (gameMode === "online" && net.mode === "host") {
      hostSelectFromGuest();
    }
    // Both locked => start the READY beat. This MUST live here too: when the CPU
    // auto-locks above, handleSelectKey (the other place this check lives) never
    // runs, so without this the match would soft-lock in SELECT. The
    // readyTimer===0 guard makes the duplicated check double-fire-safe.
    if (sel.p1.locked && sel.p2.locked && sel.readyTimer === 0) {
      sel.readyTimer = TUNE.readyDelay;
      sfxFight();
    }
    // idle knights settle gently (no inputs)
    const noInput = { left:false,right:false,jump:false,guard:false,attack:false };
    updateKnight(p1, dt, noInput);
    updateKnight(p2, dt, noInput);
    if (sel.readyTimer > 0) {
      sel.readyTimer -= dt;
      if (sel.readyTimer <= 0) { sel.readyTimer = 0; startMatch(); }
    }
    return;
  }

  if (gameState === GS.COUNTDOWN) {
    // keep attack flags from leaking into the fight
    consumeAttack("p1"); consumeAttack("p2");
    // online host: also drain the guest's latched attack/special so a press during
    // the countdown doesn't auto-fire on the first PLAYING frame.
    net.guestAttackPending = false; net.guestSpecialPending = false;
    countdownTimer -= dt;
    if (countdownTimer <= 0) {
      countdownIndex++;
      if (countdownIndex >= COUNT_LABELS.length) {
        beginPlaying();
      } else {
        countdownTimer = TUNE.countdownStep;
        if (countdownIndex === COUNT_LABELS.length - 1) sfxFight();
        else sfxCount();
      }
    }
    // let knights settle (idle physics, no inputs) during countdown
    const noInput = { left:false,right:false,jump:false,guard:false,attack:false };
    updateKnight(p1, dt, noInput);
    updateKnight(p2, dt, noInput);
    return;
  }

  if (gameState === GS.PLAYING) {
    // Always read inputs (this also DRAINS any stray P2 attack/special arms so a
    // human key press can't leak into the CPU's slot in 1p). In 1p the CPU
    // computes P2's inputs via aiInputs() and we discard the keyboard half.
    const [i1, i2kbd] = readInputs();
    // p2 input source: 1p => AI, online-host => relayed guest input,
    // training => passive dummy (all-false inputs, no AI), else => P2 kbd.
    let i2;
    if (gameMode === "1p") i2 = aiInputs(p2, p1, dt);
    else if (gameMode === "online" && net.mode === "host") i2 = hostGuestInputForFrame();
    else if (gameMode === "training") i2 = { left:false, right:false, jump:false, guard:false, attack:false, special:false };
    else i2 = i2kbd;
    // special activation (edge-triggered) BEFORE physics so a fired MEGA/dash
    // takes effect this frame.
    if (i1.special) activateSpecial(p1);
    if (i2.special) activateSpecial(p2);
    updateKnight(p1, dt, i1);
    updateKnight(p2, dt, i2);
    tickSpecial(p1, dt); tickSpecial(p2, dt);
    // passive SP trickle so stalemates still charge (only while neither falling)
    if (p1.state !== ST.FALLING) gainSp(p1, TUNE.spPassive * dt);
    if (p2.state !== ST.FALLING) gainSp(p2, TUNE.spPassive * dt);
    resolveCombat(dt);
    resolveDashTackles(dt);            // body-to-body shoves during a dash
    tryKnockout(p1); tryKnockout(p2);  // lethal hit => FALLING this frame, before timer/resolution
    // ===== TRAINING PIN: infinite life, fast SP recharge, dummy auto-recenter =====
    // Runs AFTER tryKnockout so any same-frame FALLING flip is healed before the
    // round-resolver sees it. The recenter snaps a shoved dummy back to its spawn,
    // so the player can keep practicing indefinitely. The round timer is pinned
    // to max so resolveTimeUp never fires; checkRoundResolution() short-circuits
    // explicitly in training as belt-and-suspenders.
    if (gameMode === "training") {
      // P1: infinite life, fast SP recharge (~2s of active play to full)
      p1.balance = TUNE.balanceMax;
      p1.special = Math.min(TUNE.spMax, p1.special + 50 * dt);
      // Heal a same-frame KO-fall on P1 too (if the dummy ever throws a hit
      // strong enough — defensive: dummy is passive, but this guarantees no
      // soft-lock if the spec ever changes).
      if (p1.state === ST.FALLING || p1.x < logLeft + 4 || p1.x > logRight - 4) {
        p1.state = ST.IDLE; p1.onGround = true; p1.tumble = 0;
        p1.x = logCenter - TUNE.spawnOffset; p1.y = logTopY;
        p1.vx = 0; p1.vy = 0; p1.knockTimer = 0; p1.swingAngle = 0; p1.swingVel = 0;
        p1.fellAtFrame = -1;
      }
      // P2 (dummy): pinned full life, zero SP, never falls. If shoved off the
      // edge or knocked into FALLING, snap back to spawn.
      p2.balance = TUNE.balanceMax;
      p2.special = 0;
      if (p2.state === ST.FALLING || p2.x < logLeft + 4 || p2.x > logRight - 4) {
        p2.state = ST.IDLE; p2.onGround = true; p2.tumble = 0;
        p2.x = logCenter + TUNE.spawnOffset; p2.y = logTopY;
        p2.vx = 0; p2.vy = 0; p2.knockTimer = 0; p2.swingAngle = 0; p2.swingVel = 0;
        p2.fellAtFrame = -1;
      }
      // pause the round timer (pin to max; the tick block below sees no change)
      roundTimer = TUNE.roundTime;
    }
    checkRoundResolution();      // a fall (once off-screen) flips state to ROUND_OVER
    // Round clock: ticks ONLY while still PLAYING and NEITHER knight is mid-fall.
    // A knight is flagged FALLING the instant its seat clears the edge but only
    // resolves the round after tumbling off-screen (~0.7s); freezing the clock
    // during that window keeps "fall = instant priority over the timer".
    const falling = p1.state === ST.FALLING || p2.state === ST.FALLING;
    if (gameState === GS.PLAYING && !falling) {
      roundTimer -= dt;
      if (roundTimer <= 0) { roundTimer = 0; resolveTimeUp(); }
    }
    return;
  }

  if (gameState === GS.ROUND_OVER) {
    consumeAttack("p1"); consumeAttack("p2");
    net.guestAttackPending = false; net.guestSpecialPending = false;
    // keep falling knights animating
    const noInput = { left:false,right:false,jump:false,guard:false,attack:false };
    updateKnight(p1, dt, noInput);
    updateKnight(p2, dt, noInput);
    roundOverTimer -= dt;
    if (roundOverTimer <= 0) {
      if (matchWinner) {
        gameState = GS.MATCH_OVER;
      } else {
        startCountdown();
      }
    }
    return;
  }

  if (gameState === GS.MENU || gameState === GS.MATCH_OVER) {
    consumeAttack("p1"); consumeAttack("p2");
    return;
  }
}

// ============================== RENDER ===============================

// --- precomputed forest silhouette layers (stable across frames) ---
function buildForest(seed, count, baseY, height, jitter) {
  // simple deterministic pseudo-random from seed
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const trees = [];
  for (let i = 0; i < count; i++) {
    const x = (i / count) * VW + (rnd() - 0.5) * jitter;
    const h = height * (0.6 + rnd() * 0.7);
    const w = h * (0.5 + rnd() * 0.2);
    trees.push({ x, baseY, h, w });
  }
  return trees;
}
const forestNear = buildForest(11, 26, logTopY - 8, 64, 30);
const forestMid  = buildForest(53, 22, logTopY - 38, 90, 46);
const forestFar  = buildForest(91, 18, logTopY - 70, 120, 70);

const clouds = [
  { x: 180, y: 110, w: 150, h: 26 },
  { x: 600, y: 80,  w: 200, h: 30 },
  { x: 760, y: 150, w: 120, h: 22 },
];

function drawBackground() {
  // Four hand-painted 960x540 Nordic plates (dusk / tundra / golden hour /
  // aurora) — currentStageIndex is set once per match in startMatch().
  // Drawn full-frame; the procedural LOG (drawLog) is still painted ON TOP so
  // the knights sit on it at the same coordinates. Guarded so a mid-load image
  // never throws: prefer the chosen stage, fall back to the original dusk
  // plate if it happens to finish first, then to a flat dusk fill.
  const stage = STAGES[currentStageIndex] || STAGES[0];
  const img = IMG[stage.imgKey];
  if (imgReady(img)) {
    ctx.drawImage(img, 0, 0, VW, VH);
  } else if (imgReady(IMG.bg)) {
    // mid-load fallback: use whichever bg already finished decoding
    ctx.drawImage(IMG.bg, 0, 0, VW, VH);
  } else {
    ctx.fillStyle = PAL.skyTop;
    ctx.fillRect(0, 0, VW, VH);
  }
}

function drawSoftCloud(x, y, w, h) {
  // chunky cloud from a few overlapping blocky ellipses
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 4; i++) {
    const cx = x + (i - 1.5) * (w / 4);
    const cw = w * (0.4 - Math.abs(i - 1.5) * 0.06);
    ctx.fillRect(cx - cw / 2, y - h / 2 + Math.sin(i) * 3, cw, h);
  }
  ctx.globalAlpha = 1;
}

function drawForest(trees, color) {
  ctx.fillStyle = color;
  for (const t of trees) {
    // spruce: stacked triangles
    const tiers = 3;
    for (let i = 0; i < tiers; i++) {
      const frac = i / tiers;
      const tierTop = t.baseY - t.h * (1 - frac);
      const tierBot = t.baseY - t.h * (1 - (frac + 1 / tiers)) + 6;
      const halfW = (t.w / 2) * (0.5 + frac * 0.5);
      ctx.beginPath();
      ctx.moveTo(t.x, tierTop);
      ctx.lineTo(t.x - halfW, tierBot);
      ctx.lineTo(t.x + halfW, tierBot);
      ctx.closePath();
      ctx.fill();
    }
    // trunk
    ctx.fillRect(t.x - 2, t.baseY - 6, 4, 8);
  }
}

function drawLog() {
  const x = logLeft, y = logTopY, w = logW, h = TUNE.logThickness;
  if (imgReady(IMG.log)) {
    ctx.imageSmoothingEnabled = true;          // smooth scale for the painted bark
    ctx.drawImage(IMG.log, x, y, w, h);
    ctx.imageSmoothingEnabled = false;
    return;
  }
  // ---- fallback: legacy procedural log (kept as a safety net) ----
  // cylinder shading: horizontal bands from top (light) to bottom (dark)
  const bands = [
    { t: 0.00, c: PAL.logTop },
    { t: 0.14, c: PAL.logLight },
    { t: 0.34, c: PAL.logBody },
    { t: 0.70, c: PAL.logDark },
  ];
  for (let i = 0; i < bands.length; i++) {
    const b = bands[i];
    const next = bands[i + 1];
    const y0 = y + b.t * h;
    const y1 = next ? y + next.t * h : y + h;
    ctx.fillStyle = b.c;
    ctx.fillRect(x, y0, w, y1 - y0);
  }
  // top highlight band (light hits the top edge)
  ctx.fillStyle = "rgba(255,236,190,0.30)";
  ctx.fillRect(x, y, w, 5);

  // bark vertical grooves / striations (blocky, limited)
  ctx.fillStyle = PAL.logGroove;
  for (let gx = x + 14; gx < x + w - 8; gx += 26) {
    const jitter = ((gx * 7) % 9) - 4;
    ctx.fillRect(gx + jitter, y + 10, 2, h - 14);
  }
  ctx.fillStyle = "rgba(196,154,94,0.25)";
  for (let gx = x + 26; gx < x + w - 8; gx += 26) {
    ctx.fillRect(gx, y + 8, 1, h - 12);
  }

  // near end cap with concentric ring grain (right end faces viewer-ish)
  drawEndCap(x, y, h);     // left cap
}

function drawEndCap(x, y, h) {
  // left end cap as an ellipse with tree rings
  const cx = x;
  const cyy = y + h / 2;
  const rx = 16, ry = h / 2;
  // base ellipse
  ctx.fillStyle = PAL.ringDark;
  fillEllipse(cx, cyy, rx, ry);
  // concentric rings
  const rings = 5;
  for (let i = rings; i >= 1; i--) {
    const f = i / rings;
    ctx.fillStyle = (i % 2 === 0) ? PAL.ringLight : PAL.logBody;
    fillEllipse(cx, cyy, rx * f, ry * f);
  }
  // center pith
  ctx.fillStyle = PAL.logGroove;
  fillEllipse(cx, cyy, 2.5, 4);
  // rim shadow
  ctx.strokeStyle = PAL.logDark;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cyy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
}
function fillEllipse(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ---- Knight rendering ----
// Each knight SITS ASTRIDE the log: the seat (hips) rests on the log's top
// surface at k.y, the torso rises UP above it, and BOTH legs drape DOWN over
// the NEAR (camera-facing) side of the log — thigh down the log front, lower
// leg / boot dangling. One hand wields a cast-iron FRYING PAN, the free hand
// grips the log for balance. No sword, no shield. k.y is the seat reference
// (top of the log); the whole figure fills the [k.y-H .. k.y] hitbox so the
// combat boxes stay honest. Legs are drawn BELOW k.y, over the log front.
function drawKnight(k) {
  const pal = (k.side === "p1")
    ? { dark: PAL.redDark, body: PAL.redBody, light: PAL.redLight, trim: PAL.redTrim }
    : { dark: PAL.bluDark, body: PAL.bluBody, light: PAL.bluLight, trim: PAL.bluTrim };

  // ===== SPECIAL aura (drawn in world space, BEFORE the body transform) =====
  // Subtle glow when SP is full & ready, or while a special state is active.
  // Color cues the moment: amber=ready, white=mega windup, cyan=counter,
  // team=dash, steel=anchor. Kept low-alpha so it never fights the pixel art.
  const spFull = k.special >= TUNE.spMax && k.chosenSpecial;
  let auraCol = null, auraA = 0;
  if (k.windupTimer > 0)      { auraCol = PAL.clash;  auraA = 0.30 + 0.2 * Math.sin(frameCount * 0.6); }
  else if (k.counterTimer > 0){ auraCol = PAL.bluLight; auraA = 0.32; }
  else if (k.dashTimer > 0)   { auraCol = (k.side === "p1" ? PAL.redLight : PAL.bluLight); auraA = 0.30; }
  else if (k.anchorTimer > 0) { auraCol = PAL.steel;  auraA = 0.26; }
  else if (k.counterFlash > 0){ auraCol = PAL.clash;  auraA = 0.5 * (k.counterFlash / 0.4); }
  else if (spFull)            { auraCol = PAL.sunGlow; auraA = 0.16 + 0.08 * Math.sin(frameCount * 0.18); }
  if (auraCol && auraA > 0) {
    // size the aura to the SPRITE torso (seat -> helm-top), centered mid-torso,
    // so the cue reads behind the bigger image knight (not the old 64px body).
    const auraR = KNIGHT_SEAT_TO_TOP * 0.75;
    const gx = k.x, gy = k.y - KNIGHT_SEAT_TO_TOP * 0.5;
    const gr = ctx.createRadialGradient(gx, gy, 6, gx, gy, auraR);
    gr.addColorStop(0, auraCol);
    gr.addColorStop(1, "rgba(0,0,0,0)");
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(0.6, auraA));
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(gx, gy, auraR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ===== SPRITE BODY =====
  // The whole seated knight is a single transparent PNG. Motion comes from the
  // transform, never from deforming the art:
  //   translate(seat) · scale(facing,1) · [tumble while FALLING] · rotate(swingAngle)
  // The seat anchor (SEAT_FX,SEAT_FY of the sprite) is placed at (k.x,k.y) and the
  // pendulum swing rotates the whole figure about that seat — so the pan arcs
  // exactly where panTip() computes its hit point. facing flips P2 to face left.
  // A tiny seated bob/scoot shuffle is applied as a translate (the art stays rigid).
  const sprite = (k.side === "p1") ? IMG.knightRed : IMG.knightBlue;
  if (imgReady(sprite)) {
    // small seated cues: idle breathing bob + scooting shuffle (translate only)
    let bobY = 0, hipShift = 0;
    if (k.state === ST.WALK) {
      bobY = Math.abs(Math.sin(k.bob)) * 1.8;
      hipShift = Math.sin(k.bob) * 3;
    } else if (k.state === ST.IDLE) {
      bobY = Math.sin(k.bob) * 1.2;
    }

    const sw = sprite.naturalWidth, sh = sprite.naturalHeight;
    const dw = sw * SPRITE_S, dh = sh * SPRITE_S;

    ctx.save();
    ctx.translate(k.x + hipShift, k.y + bobY);
    ctx.scale(k.facing, 1);                 // mirror P2 to face left
    if (k.state === ST.FALLING) ctx.rotate(k.tumble || 0); // tumble off the log
    ctx.rotate(k.swingAngle);               // rigid pendulum swing about the seat
    ctx.imageSmoothingEnabled = false;      // crisp pixel-art scaling
    // place the seat anchor at the origin: shift so (SEAT_FX*sw, SEAT_FY*sh) -> 0,0
    ctx.drawImage(sprite, -SEAT_FX * dw, -SEAT_FY * dh, dw, dh);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = 1 - p.life / p.maxLife;
    ctx.globalAlpha = Math.max(0, a);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
function drawFloaters() {
  ctx.textAlign = "center";
  for (const f of floaters) {
    const a = 1 - f.life / f.maxLife;
    const pop = f.life < 0.12 ? 1 + (0.12 - f.life) * 3 : 1;
    ctx.globalAlpha = Math.max(0, a);
    const size = Math.round(20 * pop * (f.scale || 1));
    ctx.font = `900 ${size}px "Trebuchet MS", sans-serif`;
    ctx.lineWidth = 4 * (f.scale || 1);
    ctx.strokeStyle = PAL.ink;
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = "left";
}

// ---------------------------- UI (no shake) --------------------------
function drawBalanceMeter(k, x, y, w, label, pal) {
  const h = 18;
  // life bar frame: Nordic stone sprite (with procedural fallback)
  if (imgReady(IMG.gaugeFrame)) {
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.gaugeFrame, x - 6, y - 6, w + 12, h + 12);
    ctx.imageSmoothingEnabled = false;
  } else {
    ctx.fillStyle = PAL.ink;
    ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
    ctx.fillStyle = "#2a3146";
    ctx.fillRect(x, y, w, h);
  }
  // fill proportional to balance
  const frac = k.balance / TUNE.balanceMax;
  const fillW = Math.max(0, Math.round(w * frac));
  // color shifts to warning when low
  let c = pal.body;
  if (frac < 0.3) c = "#d44"; else if (frac < 0.55) c = pal.light;
  // P2 fills from the right so meters mirror toward center
  if (k.side === "p1") {
    ctx.fillStyle = c; ctx.fillRect(x, y, fillW, h);
  } else {
    ctx.fillStyle = c; ctx.fillRect(x + (w - fillW), y, fillW, h);
  }
  // teetering balance marker (tilts with how off-center the knight is)
  const halfLog = logW / 2;
  const off = (k.x - logCenter) / halfLog; // -1..1
  const mx = k.side === "p1" ? x + fillW : x + (w - fillW);
  ctx.save();
  ctx.translate(Math.max(x + 6, Math.min(x + w - 6, mx)), y + h / 2);
  ctx.rotate(off * 0.5);
  ctx.fillStyle = pal.trim;
  ctx.fillRect(-9, -2, 18, 4);    // the balance beam
  ctx.fillStyle = PAL.steel;
  ctx.fillRect(-1, -6, 2, 12);    // fulcrum post
  ctx.restore();

  // ===== SP meter: a thinner accent bar beneath the life bar =====
  const spH = 7, spY = y + h + 4;
  // SP bar frame: same Nordic gauge sprite, scaled shorter
  if (imgReady(IMG.gaugeFrame)) {
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.gaugeFrame, x - 6, spY - 4, w + 12, spH + 8);
    ctx.imageSmoothingEnabled = false;
  } else {
    ctx.fillStyle = PAL.ink;
    ctx.fillRect(x - 2, spY - 2, w + 4, spH + 4);
    ctx.fillStyle = "#191f30";
    ctx.fillRect(x, spY, w, spH);
  }
  const spFrac = Math.max(0, Math.min(1, k.special / TUNE.spMax));
  const spW = Math.round(w * spFrac);
  const full = k.special >= TUNE.spMax && k.chosenSpecial;
  // accent gradient color (distinct from the life bar): amber charging -> bright
  let spCol = full ? PAL.sunGlow : PAL.skyAmber;
  ctx.fillStyle = spCol;
  if (k.side === "p1") ctx.fillRect(x, spY, spW, spH);
  else ctx.fillRect(x + (w - spW), spY, spW, spH);
  // tick at the full mark
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  for (let t = 1; t < 4; t++) ctx.fillRect(x + Math.round(w * t / 4), spY, 1, spH);
  // "SP READY!" flash when full
  if (full) {
    const pulse = k.spReadyPulse > 0 || (Math.floor(frameCount * 0.12) % 2 === 0);
    if (pulse) {
      ctx.font = '900 13px "Trebuchet MS", sans-serif';
      ctx.textAlign = k.side === "p1" ? "left" : "right";
      ctx.lineWidth = 3; ctx.strokeStyle = PAL.ink;
      const rx = k.side === "p1" ? x : x + w;
      ctx.strokeText("SP READY!", rx, spY + spH + 14);
      ctx.fillStyle = PAL.sunGlow;
      ctx.fillText("SP READY!", rx, spY + spH + 14);
    }
  } else if (k.chosenSpecial) {
    // tiny SP caption with the chosen special's short name
    const spInfo = SPECIALS.find(s => s.id === k.chosenSpecial);
    ctx.font = '700 10px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.steelDk;
    ctx.textAlign = k.side === "p1" ? "left" : "right";
    const rx = k.side === "p1" ? x : x + w;
    ctx.fillText("SP · " + (spInfo ? spInfo.en : ""), rx, spY + spH + 13);
  }

  // label + win pips
  ctx.fillStyle = PAL.bone;
  ctx.font = '700 16px "Trebuchet MS", sans-serif';
  ctx.textAlign = k.side === "p1" ? "left" : "right";
  const lx = k.side === "p1" ? x : x + w;
  ctx.fillText(label, lx, y - 8);

  // pips ●●○
  const pipR = 6;
  for (let i = 0; i < TUNE.roundsToWin; i++) {
    const px = k.side === "p1"
      ? x + w - 12 - i * 18
      : x + 12 + i * 18;
    ctx.beginPath();
    ctx.arc(px, y - 13, pipR, 0, Math.PI * 2);
    if (i < k.rounds) { ctx.fillStyle = pal.light; ctx.fill(); }
    else { ctx.strokeStyle = PAL.steelDk; ctx.lineWidth = 2; ctx.stroke(); }
  }
  ctx.textAlign = "left";
}

// ===== Mute indicator (procedural speaker icon) =========================
// Drawn at (cx, cy) as its CENTER, scaled to the requested width `w` (≈18px).
// Cone = a small filled trapezoid (drawn as two stacked rects + a triangle so
// it stays purely procedural). Waves = two thin arcs to the right. When muted,
// a red diagonal slash is overlaid. Used in the top-right of HUD/title/select.
function drawAudioIcon(cx, cy, w) {
  const scale = w / 20;        // base art is in a 20x20 box
  const x = Math.round(cx - 10 * scale);
  const y = Math.round(cy - 10 * scale);
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // cone body: small inner rect + a left-side rect + a triangular flare
  ctx.fillStyle = muted ? "#7d8294" : "#e8dcc0";
  ctx.fillRect(2, 8, 3, 4);            // back nub
  ctx.fillRect(5, 6, 2, 8);            // neck
  // triangle flare
  ctx.beginPath();
  ctx.moveTo(7, 4);
  ctx.lineTo(12, 1);
  ctx.lineTo(12, 19);
  ctx.lineTo(7, 16);
  ctx.closePath();
  ctx.fill();

  if (!muted) {
    // sound waves: two arcs of increasing radius
    ctx.strokeStyle = "#e8dcc0";
    ctx.lineWidth = 1.4;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.arc(13, 10, 3.0, -Math.PI / 3, Math.PI / 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(13, 10, 5.5, -Math.PI / 3.2, Math.PI / 3.2);
    ctx.stroke();
  } else {
    // red diagonal slash with a darker shadow underneath
    ctx.strokeStyle = "#1a0808";
    ctx.lineWidth = 3.2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(1, 1); ctx.lineTo(19, 19);
    ctx.stroke();
    ctx.strokeStyle = "#ff4a4a";
    ctx.lineWidth = 1.8;
    ctx.beginPath();
    ctx.moveTo(1, 1); ctx.lineTo(19, 19);
    ctx.stroke();
  }
  ctx.restore();
}

// Top-right placement for the mute icon, with a small "M" caption underneath.
// Tucked into the corner so it doesn't collide with the balance meters
// (which start at x=30 and end at x=VW-30) or the round timer (centered).
function drawMuteIndicator() {
  const w = 20;
  const cx = VW - 22;
  const cy = 22;
  drawAudioIcon(cx, cy, w);
  ctx.save();
  ctx.font = '700 9px "Trebuchet MS", sans-serif';
  ctx.fillStyle = muted ? "#ff8080" : "#5a6a8a";
  ctx.textAlign = "center";
  ctx.fillText("M", cx, cy + 18);
  ctx.restore();
  ctx.textAlign = "left";
}

function drawHUD() {
  const palR = { dark: PAL.redDark, body: PAL.redBody, light: PAL.redLight, trim: PAL.redTrim };
  const palB = { dark: PAL.bluDark, body: PAL.bluBody, light: PAL.bluLight, trim: PAL.bluTrim };
  const mw = 320;
  const p1Label = (gameMode === "online" && net.mode === "guest") ? "CRIMSON  HOST" : "P1  CRIMSON";
  const p2Label = (gameMode === "training") ? "AZURE  DUMMY"
                : (gameMode === "1p") ? "AZURE  CPU"
                : (gameMode === "online") ? ((net.mode === "guest") ? "AZURE  YOU" : "AZURE  P2") : "AZURE  P2";
  drawBalanceMeter(p1, 30, 40, mw, p1Label, palR);
  drawBalanceMeter(p2, VW - 30 - mw, 40, mw, p2Label, palB);
  // TRAINING: replace the round timer with a small "TRAINING — press R to exit"
  // label in the same screen real estate. Balance meters + win pips stay (pips
  // will all show empty because rounds=0 in training).
  if (gameMode === "training") {
    ctx.save();
    ctx.textAlign = "center";
    ctx.font = '900 22px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 6; ctx.strokeStyle = PAL.ink;
    ctx.strokeText("TRAINING", VW / 2, 56);
    ctx.fillStyle = PAL.skyAmber;
    ctx.fillText("TRAINING", VW / 2, 56);
    ctx.font = '700 12px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.bone;
    ctx.fillText("press R to exit", VW / 2, 76);
    ctx.restore();
    ctx.textAlign = "left";
  } else {
    drawRoundTimer();
  }
}

// Chunky pixel-HUD round clock, top-center between the two balance gauges.
// Carved stone slab + bold numerals; turns urgent crimson in the last 10s.
function drawRoundTimer() {
  const secs = Math.max(0, Math.ceil(roundTimer));
  const urgent = roundTimer <= 10;
  const blink = urgent && (Math.floor(roundTimer * 4) % 2 === 0);
  const label = (secs < 10 ? "0" : "") + secs;

  const cx = VW / 2;
  const w = 108, h = 56, top = 24;
  const bx = cx - w / 2, by = top;

  // slab: Nordic stone-plaque sprite (falls back to procedural if not yet loaded)
  if (imgReady(IMG.hudTimer)) {
    // urgent: soft red halo rim behind the plaque
    if (urgent) {
      ctx.fillStyle = "rgba(255,90,90,0.18)";
      ctx.fillRect(bx - 10, by - 10, w + 20, h + 20);
      ctx.fillStyle = "rgba(255,90,90,0.30)";
      ctx.fillRect(bx - 6, by - 6, w + 12, h + 12);
    }
    // draw the stone plaque sprite over the same 116x64 outer region
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.hudTimer, bx - 4, by - 4, w + 8, h + 8);
    ctx.imageSmoothingEnabled = false;
  } else {
    // FALLBACK: procedural slab (used while image is still loading)
    ctx.fillStyle = PAL.ink;
    ctx.fillRect(bx - 4, by - 4, w + 8, h + 8);
    ctx.fillStyle = urgent ? "#3a1620" : "#202a40";
    ctx.fillRect(bx, by, w, h);
    // top bevel highlight
    ctx.fillStyle = urgent ? "#5a2230" : "#2e3a56";
    ctx.fillRect(bx, by, w, 5);
    // rivets at the corners (pixel-HUD flavor)
    ctx.fillStyle = PAL.steelDk;
    for (const [rx, ry] of [[bx + 6, by + 6], [bx + w - 8, by + 6], [bx + 6, by + h - 8], [bx + w - 8, by + h - 8]]) {
      ctx.fillRect(rx, ry, 3, 3);
    }
  }

  // numerals
  ctx.save();
  ctx.textAlign = "center";
  ctx.font = '900 40px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 6; ctx.strokeStyle = PAL.ink;
  const col = urgent ? (blink ? "#ff5a5a" : "#ff9090") : PAL.bone;
  const cyT = by + h / 2 + 14;
  ctx.strokeText(label, cx, cyT);
  ctx.fillStyle = col;
  ctx.fillText(label, cx, cyT);
  // tiny "TIME" caption
  ctx.font = '700 11px "Trebuchet MS", sans-serif';
  ctx.fillStyle = urgent ? "#e08a8a" : PAL.steelDk;
  ctx.fillText("TIME", cx, by + 14);
  ctx.restore();
  ctx.textAlign = "left";
}

function drawCenterText(text, sub, big) {
  ctx.textAlign = "center";
  ctx.fillStyle = PAL.bone;
  ctx.strokeStyle = PAL.ink;
  ctx.lineWidth = 6;
  ctx.font = `900 ${big}px "Trebuchet MS", sans-serif`;
  ctx.strokeText(text, VW / 2, VH / 2);
  ctx.fillText(text, VW / 2, VH / 2);
  if (sub) {
    ctx.font = '600 22px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 4;
    ctx.strokeText(sub, VW / 2, VH / 2 + 44);
    ctx.fillStyle = PAL.bone;
    ctx.fillText(sub, VW / 2, VH / 2 + 44);
  }
  ctx.textAlign = "left";
}

// ===== SELECT screen: pick one special per player, Nordic chunky-pixel HUD =====
function drawSelect() {
  // dim overlay (match the title's mood)
  ctx.fillStyle = "rgba(8,12,20,0.62)";
  ctx.fillRect(0, 0, VW, VH);

  ctx.textAlign = "center";
  ctx.font = '900 52px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 9; ctx.strokeStyle = PAL.ink;
  ctx.strokeText("CHOOSE YOUR SPECIAL", VW / 2, 86);
  ctx.fillStyle = PAL.bone;
  ctx.fillText("CHOOSE YOUR SPECIAL", VW / 2, 86);

  // player banners (crimson left / azure right) with their special key binding —
  // on two separate lines so the long hint strings never overlap in the middle.
  ctx.font = '800 17px "Trebuchet MS", sans-serif';
  ctx.textAlign = "left";
  ctx.fillStyle = PAL.redLight;
  ctx.fillText("P1 CRIMSON  ·  A/D move · SPACE lock · S un-lock · SPECIAL: F", 40, 116);
  ctx.textAlign = "right";
  ctx.fillStyle = PAL.bluLight;
  if (gameMode === "1p") {
    ctx.fillText("AZURE  —  CPU  (auto)", VW - 40, 116);
  } else if (gameMode === "online") {
    // both peers use the same comfortable A/D/SPACE/S scheme on their OWN machine.
    ctx.fillText("AZURE (online)  ·  A/D move · SPACE lock · S un-lock · SPECIAL: F", VW - 40, 140);
  } else {
    ctx.fillText("AZURE P2  ·  ◄► move · ENTER lock · ▼ un-lock · SPECIAL: /", VW - 40, 140);
  }
  ctx.textAlign = "left";

  // ---- card grid ----
  const N = SPECIALS.length;
  const gap = 22, cardW = 196, cardH = 240;
  const totalW = N * cardW + (N - 1) * gap;
  const x0 = (VW - totalW) / 2, y0 = 158;

  for (let i = 0; i < N; i++) {
    const sp = SPECIALS[i];
    const cx = x0 + i * (cardW + gap);
    const p1Here = sel.p1.cursor === i;
    const p2Here = sel.p2.cursor === i;

    // card backplate: Nordic carved-stone tablet sprite (with procedural fallback)
    if (imgReady(IMG.cardFrame)) {
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(IMG.cardFrame, cx - 4, y0 - 4, cardW + 8, cardH + 8);
      ctx.imageSmoothingEnabled = false;
    } else {
      // ---- fallback: procedural backplate ----
      ctx.fillStyle = PAL.ink;
      ctx.fillRect(cx - 4, y0 - 4, cardW + 8, cardH + 8);
      ctx.fillStyle = "#202a40";
      ctx.fillRect(cx, y0, cardW, cardH);
      ctx.fillStyle = "#2e3a56";
      ctx.fillRect(cx, y0, cardW, 6);   // top bevel
      // corner rivets
      ctx.fillStyle = PAL.steelDk;
      for (const [rx, ry] of [[cx + 7, y0 + 9], [cx + cardW - 10, y0 + 9],
                              [cx + 7, y0 + cardH - 12], [cx + cardW - 10, y0 + cardH - 12]]) {
        ctx.fillRect(rx, ry, 3, 3);
      }
    }

    // emblem-ish icon plate per special
    drawSpecialIcon(sp.id, cx + cardW / 2, y0 + 64);

    // names
    ctx.textAlign = "center";
    ctx.font = '900 24px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.bone;
    ctx.fillText(sp.name, cx + cardW / 2, y0 + 134);
    ctx.font = '800 15px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.skyAmber;
    ctx.fillText(sp.en, cx + cardW / 2, y0 + 156);

    // one-line effect (wrapped to two lines)
    ctx.font = '500 12px "Trebuchet MS", sans-serif';
    ctx.fillStyle = "#b9c2d6";
    wrapText(sp.fx, cx + cardW / 2, y0 + 182, cardW - 24, 15);

    // P1 / P2 cursor highlights (crimson / azure outlines)
    if (p1Here) drawCardOutline(cx, y0, cardW, cardH, PAL.redLight, sel.p1.locked, -3);
    if (p2Here) drawCardOutline(cx, y0, cardW, cardH, PAL.bluLight, sel.p2.locked, 3);

    // "CPU" badge INSIDE the top of the azure-picked card (1p) — clear of the
    // header hint lines so nothing overlaps.
    if (p2Here && gameMode === "1p") {
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = '900 13px "Trebuchet MS", sans-serif';
      const bcx = cx + cardW / 2, bby = y0 + 6, bbw = 46, bbh = 18;
      ctx.fillStyle = PAL.ink;
      ctx.fillRect(bcx - bbw / 2, bby, bbw, bbh);
      ctx.fillStyle = PAL.bluLight;
      ctx.fillText("CPU", bcx, bby + 14);
      ctx.restore();
    }

    // LOCKED stamps (offset so both can sit on one card)
    if (p1Here && sel.p1.locked) drawLockStamp(cx + cardW / 2 - 34, y0 + cardH - 30, PAL.redLight);
    if (p2Here && sel.p2.locked) drawLockStamp(cx + cardW / 2 + 34, y0 + cardH - 30, PAL.bluLight);
  }

  // footer / prompt
  ctx.textAlign = "center";
  if (sel.readyTimer > 0) {
    const s = 1 + Math.min(1, (TUNE.readyDelay - sel.readyTimer) * 6) * 0.4;
    ctx.save();
    ctx.translate(VW / 2, 466);
    ctx.scale(s, s);
    ctx.font = '900 56px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 9; ctx.strokeStyle = PAL.ink;
    ctx.strokeText("READY!", 0, 0);
    ctx.fillStyle = PAL.sunGlow;
    ctx.fillText("READY!", 0, 0);
    ctx.restore();
  } else {
    const blink = (Math.sin(frameCount * 0.12) > -0.2);
    if (blink) {
      ctx.font = '800 20px "Trebuchet MS", sans-serif';
      ctx.fillStyle = PAL.bone;
      const lockMsg = gameMode === "1p" ? "LOCK IN to begin (CPU picks automatically)" : "Both players LOCK IN to begin";
      ctx.fillText(lockMsg + "   ·   ESC: title   ·   R: re-pick", VW / 2, 466);
    }
  }
  ctx.textAlign = "left";
}

function drawCardOutline(x, y, w, h, color, locked, inset) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = locked ? 5 : 3;
  ctx.strokeRect(x + inset, y + inset, w - inset * 2, h - inset * 2);
  ctx.restore();
}

function drawLockStamp(cx, cy, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.18);
  ctx.font = '900 16px "Trebuchet MS", sans-serif';
  ctx.textAlign = "center";
  ctx.lineWidth = 4; ctx.strokeStyle = PAL.ink;
  ctx.strokeText("LOCKED", 0, 0);
  ctx.fillStyle = color;
  ctx.fillText("LOCKED", 0, 0);
  ctx.restore();
}

// chunky little icon per special (on-theme, not generic clip-art).
// Prefers the painted 96x96 round medallion PNG; falls back to the procedural
// vector glyph if the image isn't decoded yet (guarded, never throws).
function drawSpecialIcon(id, cx, cy) {
  const iconImg = IMG[SPECIAL_ICON[id]];
  if (imgReady(iconImg)) {
    const sz = 84;   // medallion render size on the card
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(iconImg, cx - sz / 2, cy - sz / 2, sz, sz);
    ctx.imageSmoothingEnabled = false;
    return;
  }
  ctx.save();
  ctx.translate(cx, cy);
  if (id === "mega") {
    // big pan cocked back with motion arc
    ctx.strokeStyle = PAL.steelDk; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 4, 22, Math.PI * 1.05, Math.PI * 1.75); ctx.stroke();
    ctx.fillStyle = "#15151a";
    ctx.beginPath(); ctx.arc(-2, -10, 13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#34343c"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(-2, -10, 12, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#2a211a";
    ctx.fillRect(6, -2, 18, 5);
  } else if (id === "counter") {
    // crossed parry spark
    ctx.strokeStyle = PAL.bluLight; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-16, -14); ctx.lineTo(16, 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16, -14); ctx.lineTo(-16, 14); ctx.stroke();
    ctx.fillStyle = PAL.clash;
    for (const a of [0, 1, 2, 3]) {
      const ang = a * Math.PI / 2 + 0.4;
      ctx.fillRect(Math.cos(ang) * 18 - 2, Math.sin(ang) * 18 - 2, 4, 4);
    }
  } else if (id === "dash") {
    // forward chevrons (speed)
    ctx.fillStyle = PAL.redLight;
    for (let i = 0; i < 3; i++) {
      const ox = -16 + i * 12;
      ctx.beginPath();
      ctx.moveTo(ox, -12); ctx.lineTo(ox + 9, 0); ctx.lineTo(ox, 12);
      ctx.lineTo(ox + 4, 12); ctx.lineTo(ox + 13, 0); ctx.lineTo(ox + 4, -12);
      ctx.closePath(); ctx.fill();
    }
  } else if (id === "anchor") {
    // planted boots / ground grip
    ctx.fillStyle = PAL.steel;
    ctx.fillRect(-3, -16, 6, 22);
    ctx.beginPath(); ctx.arc(0, -16, 6, Math.PI, 0); ctx.fill();
    ctx.strokeStyle = PAL.steel; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 4, 14, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
    ctx.fillStyle = "#8a7a5a";
    ctx.fillRect(-18, 16, 36, 4);  // ground line
  }
  ctx.restore();
}

// simple word-wrap centered at (cx, y), advancing by lineH
function wrapText(text, cx, y, maxW, lineH) {
  const words = text.split(" ");
  let line = "", yy = y;
  for (let i = 0; i < words.length; i++) {
    const test = line ? line + " " + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, cx, yy);
      line = words[i]; yy += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, cx, yy);
}

function drawCountdown() {
  const label = COUNT_LABELS[Math.min(countdownIndex, COUNT_LABELS.length - 1)];
  // pop scale based on time within the step
  const t = 1 - (countdownTimer / TUNE.countdownStep); // 0..1
  const scale = 1 + (1 - Math.min(1, t * 2)) * 0.6;
  const isFight = countdownIndex === COUNT_LABELS.length - 1;
  ctx.save();
  ctx.textAlign = "center";
  ctx.translate(VW / 2, VH / 2 - 30);
  ctx.scale(scale, scale);

  // Nordic medallion backdrop (drawn first; text overlays it)
  if (imgReady(IMG.countdownMedallion)) {
    const ms = 320;
    ctx.save();
    ctx.globalAlpha = isFight ? 0.85 : 1.0;
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.countdownMedallion, -ms / 2, -ms / 2, ms, ms);
    ctx.imageSmoothingEnabled = false;
    ctx.restore();
  }

  ctx.font = `900 ${isFight ? 96 : 130}px "Trebuchet MS", sans-serif`;
  ctx.lineWidth = 8;
  ctx.strokeStyle = PAL.ink;
  ctx.fillStyle = isFight ? PAL.skyAmber : PAL.bone;
  ctx.strokeText(label, 0, 0);
  ctx.fillText(label, 0, 0);

  // Stage-name reveal: only on the first countdown step "3" so it pops once
  // per round-start without distracting on 2/1/FIGHT. Still inside the existing
  // translate+scale, so the name shares the pop animation with the number.
  if (countdownIndex === 0) {
    const stage = STAGES[currentStageIndex] || STAGES[0];
    ctx.font = '800 24px "Trebuchet MS", sans-serif';
    ctx.textAlign = "center";
    ctx.lineWidth = 5; ctx.strokeStyle = PAL.ink;
    ctx.strokeText(stage.name, 0, 130);
    ctx.fillStyle = PAL.skyAmber;
    ctx.fillText(stage.name, 0, 130);
  }

  ctx.restore();
  ctx.textAlign = "left";
}

// ===== ONLINE connect screens (Nordic stone-slab styling, matches SELECT) =====
// shared dim backdrop + heading
function drawOnlineBackdrop(heading) {
  ctx.fillStyle = "rgba(8,12,20,0.66)";
  ctx.fillRect(0, 0, VW, VH);
  ctx.textAlign = "center";
  ctx.font = '900 46px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 9; ctx.strokeStyle = PAL.ink;
  ctx.strokeText(heading, VW / 2, 120);
  ctx.fillStyle = PAL.bone;
  ctx.fillText(heading, VW / 2, 120);
  ctx.textAlign = "left";
}
// a stone-slab choice button centered at (cx, y)
function drawSlabButton(cx, y, w, h, label, selected) {
  const bx = cx - w / 2, by = y - h / 2;
  if (imgReady(IMG.modeSlab)) {
    // soft amber halo behind the active slab (same pattern as the title mode slabs)
    if (selected) {
      ctx.fillStyle = "rgba(216,164,90,0.22)";
      ctx.fillRect(bx - 8, by - 8, w + 16, h + 16);
      ctx.fillStyle = "rgba(216,164,90,0.35)";
      ctx.fillRect(bx - 4, by - 4, w + 8, h + 8);
    }
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.modeSlab, bx - 4, by - 4, w + 8, h + 8);
    ctx.imageSmoothingEnabled = false;
    if (selected) {
      ctx.strokeStyle = PAL.skyAmber; ctx.lineWidth = 3;
      ctx.strokeRect(bx, by, w, h);  // crisp amber rim on top
    }
  } else {
    // ---- fallback: original procedural slab ----
    ctx.fillStyle = PAL.ink;
    ctx.fillRect(bx - 4, by - 4, w + 8, h + 8);
    ctx.fillStyle = selected ? "#2e3a56" : "#1a2234";
    ctx.fillRect(bx, by, w, h);
    ctx.fillStyle = selected ? "#3a4a6e" : "#222c42";
    ctx.fillRect(bx, by, w, 5);
    if (selected) {
      ctx.strokeStyle = PAL.skyAmber; ctx.lineWidth = 3;
      ctx.strokeRect(bx, by, w, h);
    }
  }
  ctx.save();
  ctx.textAlign = "center";
  ctx.font = '900 26px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 5; ctx.strokeStyle = PAL.ink;
  ctx.strokeText(label, cx, y + 9);
  ctx.fillStyle = selected ? PAL.sunGlow : PAL.steelDk;
  ctx.fillText(label, cx, y + 9);
  ctx.restore();
}

function drawOnlineMenu() {
  drawOnlineBackdrop("ONLINE  DUEL");
  ctx.textAlign = "center";
  ctx.font = 'italic 600 18px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.bone;
  ctx.fillText("Host a room and share the code, or join a friend's room.", VW / 2, 168);

  drawSlabButton(VW / 2, 250, 300, 70, "HOST  GAME", onlineMenuCursor === 0);
  drawSlabButton(VW / 2, 340, 300, 70, "JOIN  GAME", onlineMenuCursor === 1);

  // sub-captions under each
  ctx.font = '500 14px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.steelDk;
  ctx.fillText("Create a room — you play CRIMSON (host).", VW / 2, 296);
  ctx.fillText("Enter a room code — you play AZURE (guest).", VW / 2, 386);

  ctx.font = '600 14px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.bone;
  ctx.fillText("← → / W S  select   ·   ENTER  confirm   ·   ESC  back", VW / 2, 470);

  if (net.error) {
    ctx.font = '800 16px "Trebuchet MS", sans-serif';
    ctx.fillStyle = "#ff9090";
    ctx.fillText(net.error, VW / 2, 500);

// HOST waiting screen (also reused as the JOIN "connecting/waiting" screen).
function drawOnlineConnect() {
  drawOnlineBackdrop(net.mode === "guest" ? "JOINING  ROOM" : "HOSTING  ROOM");
  ctx.textAlign = "center";

  // room code panel (big chunky slab) — shown for the host so they can share it.
  if (net.code) {
    const w = 280, h = 90, cx = VW / 2, cy = 220;
    const bx = cx - w / 2, by = cy - h / 2;
    ctx.fillStyle = PAL.ink; ctx.fillRect(bx - 4, by - 4, w + 8, h + 8);
    ctx.fillStyle = "#202a40"; ctx.fillRect(bx, by, w, h);
    ctx.fillStyle = "#2e3a56"; ctx.fillRect(bx, by, w, 6);
    ctx.font = '700 14px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.steelDk;
    ctx.fillText("ROOM CODE", cx, by + 26);
    ctx.font = '900 52px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 7; ctx.strokeStyle = PAL.ink;
    ctx.strokeText(net.code, cx, by + 72);
    ctx.fillStyle = PAL.sunGlow;
    ctx.fillText(net.code, cx, by + 72);
  }

  // status / spinner-ish line
  const dots = ".".repeat(1 + (Math.floor(frameCount * 0.05) % 3));
  ctx.font = '800 22px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.bone;
  const statusLine = net.connected ? "Opponent found — starting…"
    : (net.mode === "guest" ? "Waiting for host" : "Share the code · waiting for opponent");
  ctx.fillText(statusLine + (net.connected ? "" : dots), VW / 2, 320);

  if (net.error) {
    ctx.font = '800 18px "Trebuchet MS", sans-serif';
    ctx.fillStyle = "#ff9090";
    ctx.fillText(net.error, VW / 2, 360);
  }

  ctx.font = '600 14px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.steelDk;
  ctx.fillText("ESC  cancel & back", VW / 2, 470);
  ctx.textAlign = "left";
}

function drawOnlineJoin() {
  drawOnlineBackdrop("JOIN  ROOM");

  ctx.fillStyle = PAL.bone;

// GUEST: connected, awaiting the first host snapshot.
function drawOnlineWait() {
  drawOnlineBackdrop("CONNECTED");
  ctx.textAlign = "center";
  const dots = ".".repeat(1 + (Math.floor(frameCount * 0.05) % 3));
  ctx.font = '800 24px "Trebuchet MS", sans-serif';

function drawTitle() {
  // dim overlay
  ctx.fillStyle = "rgba(8,12,20,0.55)";
  ctx.fillRect(0, 0, VW, VH);

  // ----- heraldic crest, centered ABOVE the title text -----
  // The emblem (crossed frying pans + helm + shield) crowns the title. Scaled
  // to ~150px tall to sit in the top band without crowding the title/controls
  // below it. Guarded so a mid-load image never throws.
  if (imgReady(IMG.titleCrest)) {
    const cs = IMG.titleCrest;          // 263x256
    const crestH = 150;
    const crestW = crestH * (cs.naturalWidth / cs.naturalHeight);
    const crestX = VW / 2 - crestW / 2;
    const crestY = 8;                   // top margin
    ctx.imageSmoothingEnabled = true;   // smooth scale for the painted emblem
    ctx.drawImage(cs, crestX, crestY, crestW, crestH);
    ctx.imageSmoothingEnabled = false;
  }

  ctx.textAlign = "center";
  // title (just below the crest)
  ctx.font = '900 64px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 10; ctx.strokeStyle = PAL.ink;
  ctx.strokeText("LOG KNIGHT", VW / 2, 216);
  ctx.fillStyle = PAL.redLight;  ctx.fillText("LOG KNIGHT", VW / 2, 216);
  ctx.strokeText("BATTLE", VW / 2, 276);
  ctx.fillStyle = PAL.bluLight;  ctx.fillText("BATTLE", VW / 2, 276);

  ctx.font = 'italic 600 18px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.bone;
  ctx.fillText("A bare-knuckle frying-pan duel — astride a log, last seat wins.", VW / 2, 306);

  // ----- MODE SELECTOR: "1P vs CPU" | "2P LOCAL" | "ONLINE" | "TRAINING" (highlight current) -----
  // 4 slabs at 184px wide + 3×16 gaps = 784px → comfortably inside VW=960 (mX0=88).
  const modes = [
    { id: "1p",       label: "1P  vs CPU" },
    { id: "2p",       label: "2P  LOCAL"  },
    { id: "online",   label: "ONLINE"     },
    { id: "training", label: "TRAINING"   },
  ];
  const mY = 384;
  const bw = 184, bh = 34, mGap = 16;
  const totalW = modes.length * bw + (modes.length - 1) * mGap;
  const mX0 = VW / 2 - totalW / 2;
  ctx.font = '900 20px "Trebuchet MS", sans-serif';
  ctx.textAlign = "center";
  for (let i = 0; i < modes.length; i++) {
    const m = modes[i];
    const bx = mX0 + i * (bw + mGap);
    const cxm = bx + bw / 2;
    const isCur = gameMode === m.id;
    const by = mY - 24;
    // slab
    if (imgReady(IMG.modeSlab)) {
      // soft amber glow halo behind the active slab (so it stands out without re-tinting the stone)
      if (isCur) {
        ctx.fillStyle = "rgba(216,164,90,0.22)";
        ctx.fillRect(bx - 8, by - 8, bw + 16, bh + 16);
        ctx.fillStyle = "rgba(216,164,90,0.35)";
        ctx.fillRect(bx - 4, by - 4, bw + 8, bh + 8);
      }
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(IMG.modeSlab, bx - 3, by - 3, bw + 6, bh + 6);
      ctx.imageSmoothingEnabled = false;
      if (isCur) {
        ctx.strokeStyle = PAL.skyAmber; ctx.lineWidth = 3;
        ctx.strokeRect(bx, by, bw, bh);                 // keep crisp amber rim on top
      }
    } else {
      // ---- fallback: original procedural slab ----
      ctx.fillStyle = PAL.ink;
      ctx.fillRect(bx - 3, by - 3, bw + 6, bh + 6);
      ctx.fillStyle = isCur ? "#2e3a56" : "#1a2234";
      ctx.fillRect(bx, by, bw, bh);
      if (isCur) {
        ctx.strokeStyle = PAL.skyAmber; ctx.lineWidth = 3;
        ctx.strokeRect(bx, by, bw, bh);
      }
    }
    ctx.lineWidth = 4; ctx.strokeStyle = PAL.ink;
    ctx.strokeText(m.label, cxm, mY);
    ctx.fillStyle = isCur ? PAL.sunGlow : PAL.steelDk;
    ctx.fillText(m.label, cxm, mY);
  }
  ctx.font = '600 13px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.bone;
  ctx.fillText("↑↓ / W S / 1 2 3 4  select mode  ·  ENTER  choose specials", VW / 2, mY + 26);
  ctx.textAlign = "left";

  // disconnect notice (shown once after an online session ends abnormally)
  if (onlineDisconnectMsg) {
    ctx.textAlign = "center";
    ctx.font = '800 16px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 4; ctx.strokeStyle = PAL.ink;
    ctx.strokeText(onlineDisconnectMsg, VW / 2, mY + 50);
    ctx.fillStyle = "#ff9090";
    ctx.fillText(onlineDisconnectMsg, VW / 2, mY + 50);
    ctx.textAlign = "left";
  }

  // prompt (blink)
  const blink = (Math.sin(frameCount * 0.12) > -0.2);
  if (blink) {
    ctx.textAlign = "center";
    ctx.font = '900 22px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 5; ctx.strokeStyle = PAL.ink;
    ctx.strokeText("PRESS  ENTER  TO  START", VW / 2, 462);
    ctx.fillStyle = PAL.skyAmber;
    ctx.fillText("PRESS  ENTER  TO  START", VW / 2, 462);
  }
  ctx.textAlign = "left";
}

function drawRoundOver() {
  ctx.fillStyle = "rgba(8,12,20,0.35)";
  ctx.fillRect(0, 0, VW, VH);
  ctx.textAlign = "center";

  // ornate banner backdrop behind result text (780×175, centered on text baseline VH/2-30)
  if (imgReady(IMG.resultBanner)) {
    const bw = 780, bh = 175;
    const bx = Math.round(VW / 2 - bw / 2);
    const by = Math.round(VH / 2 - 30 - bh / 2); // = Math.round(VH/2 - 117.5)
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.resultBanner, bx, by, bw, bh);
    ctx.imageSmoothingEnabled = false;
  }

  // optional "TIME UP!" kicker above the result
  if (timeUpBanner) {
    ctx.font = '900 34px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 7; ctx.strokeStyle = PAL.ink;
    ctx.strokeText("TIME UP!", VW / 2, VH / 2 - 86);
    ctx.fillStyle = PAL.skyAmber;
    ctx.fillText("TIME UP!", VW / 2, VH / 2 - 86);
  }

  let txt, col;
  if (drawBanner) {
    txt = "DRAW — REPLAY!"; col = PAL.bone;
  } else if (roundWinner) {
    const isRed = roundWinner.side === "p1";
    txt = isRed ? "CRIMSON WINS THE ROUND!" : "AZURE WINS THE ROUND!";
    col = isRed ? PAL.redLight : PAL.bluLight;
  } else {
    ctx.textAlign = "left";
    return;
  }
  ctx.font = '900 48px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 8; ctx.strokeStyle = PAL.ink;
  ctx.strokeText(txt, VW / 2, VH / 2 - 30);
  ctx.fillStyle = col;
  ctx.fillText(txt, VW / 2, VH / 2 - 30);
  ctx.textAlign = "left";
}

function drawMatchOver() {
  ctx.fillStyle = "rgba(8,12,20,0.7)";
  ctx.fillRect(0, 0, VW, VH);

  // ornate banner backdrop behind victory text (880×110, Y=VH/2-100; bottom=VH/2+10, score at VH/2+8 just clear)
  if (imgReady(IMG.resultBanner)) {
    const bw = 880, bh = 110;
    const bx = Math.round(VW / 2 - bw / 2);
    const by = Math.round(VH / 2 - 100);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.resultBanner, bx, by, bw, bh);
    ctx.imageSmoothingEnabled = false;
  }

  const isRed = matchWinner && matchWinner.side === "p1";
  const txt = isRed ? "CRIMSON IS VICTORIOUS" : "AZURE IS VICTORIOUS";
  ctx.textAlign = "center";
  ctx.font = '900 60px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 10; ctx.strokeStyle = PAL.ink;
  ctx.strokeText(txt, VW / 2, VH / 2 - 40);
  ctx.fillStyle = isRed ? PAL.redLight : PAL.bluLight;
  ctx.fillText(txt, VW / 2, VH / 2 - 40);

  ctx.font = '700 24px "Trebuchet MS", sans-serif';
  ctx.fillStyle = PAL.bone;
  ctx.fillText(`${p1.rounds}  —  ${p2.rounds}`, VW / 2, VH / 2 + 8);

  // restart button (visual; key R/Enter also works)
  const bw = 230, bh = 54, bx = VW / 2 - bw / 2, by = VH / 2 + 44;
  if (imgReady(IMG.restartBtn)) {
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(IMG.restartBtn, bx, by, bw, bh);
    ctx.imageSmoothingEnabled = false;
  } else {
    // ---- fallback: original procedural button ----
    ctx.fillStyle = PAL.skyAmber;
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = PAL.ink;
    ctx.fillRect(bx, by, bw, 4);
  }
  ctx.font = '900 24px "Trebuchet MS", sans-serif';
  ctx.textAlign = "center";
  ctx.lineWidth = 4; ctx.strokeStyle = PAL.ink;
  ctx.strokeText("RESTART  (R)", VW / 2, by + 36);
  ctx.fillStyle = imgReady(IMG.restartBtn) ? PAL.sunGlow : PAL.ink;
  ctx.fillText("RESTART  (R)", VW / 2, by + 36);
  matchBtn = { bx, by, bw, bh };
  ctx.textAlign = "left";
}
let matchBtn = null;

// click restart button
canvas.addEventListener("click", (e) => {
  if (gameState !== GS.MATCH_OVER || !matchBtn) return;
  // online guest never drives restart locally (host is authoritative); ignore.
  if (gameMode === "online" && net.mode === "guest") return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = VW / rect.width, scaleY = VH / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;
  const b = matchBtn;
  if (mx >= b.bx && mx <= b.bx + b.bw && my >= b.by && my <= b.by + b.bh) {
    enterSelect();   // restart => re-pick specials, then play again
  }
});

// ---------------------------- RENDER FRAME ---------------------------
// Simple "LOADING…" beat shown until every asset is decoded. A small pip row
// reflects how many of the assets have resolved (loaded or failed).
function drawLoadingScreen() {
  ctx.fillStyle = PAL.skyTop;
  ctx.fillRect(0, 0, VW, VH);
  ctx.textAlign = "center";
  ctx.font = '900 40px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 7; ctx.strokeStyle = PAL.ink;
  const dots = ".".repeat(1 + (Math.floor(frameCount * 0.06) % 3));
  ctx.strokeText("LOADING" + dots, VW / 2, VH / 2);
  ctx.fillStyle = PAL.bone;
  ctx.fillText("LOADING" + dots, VW / 2, VH / 2);
  // progress pips
  const pipW = 22, gap = 8, total = ASSET_TOTAL;
  const rowW = total * pipW + (total - 1) * gap;
  const sx = (VW - rowW) / 2, sy = VH / 2 + 30;
  for (let i = 0; i < total; i++) {
    ctx.fillStyle = i < assetsLoaded ? PAL.skyAmber : "#2a3146";
    ctx.fillRect(sx + i * (pipW + gap), sy, pipW, 8);
  }
  ctx.textAlign = "left";
}

function render() {
  // clear
  ctx.fillStyle = PAL.skyTop;
  ctx.fillRect(0, 0, VW, VH);

  // ----- LOADING gate: hold the title/world until all art is decoded -----
  // The sim already runs (state stays MENU until ENTER), but we don't want a
  // half-loaded title/bg flashing in. Show a simple LOADING beat instead.
  if (!allAssetsLoaded()) {
    drawLoadingScreen();
    return;
  }

  // ----- WORLD (subject to screen shake) -----
  ctx.save();
  if (shake > 0) {
    const sxk = (Math.random() * 2 - 1) * shake * 0.7;
    const syk = (Math.random() * 2 - 1) * shake * 0.7;
    ctx.translate(sxk, syk);
  }

  drawBackground();
  drawLog();

  // draw knights (back-most by x for slight depth: draw farther first)
  const order = [p1, p2];
  for (const k of order) drawKnight(k);

  drawParticles();
  drawFloaters();

  ctx.restore(); // end shake transform — UI must NOT jitter

  // ----- UI / OVERLAYS (no shake) -----
  // The HUD (life/SP/timer) only shows in the live match states. MENU, SELECT and
  // the ONLINE connect screens suppress it.
  const noHud = (gameState === GS.MENU || gameState === GS.SELECT ||
                 gameState === GS.ONLINE_MENU || gameState === GS.ONLINE_HOST ||
                 gameState === GS.ONLINE_JOIN || gameState === GS.ONLINE_WAIT);
  if (!noHud) drawHUD();

  if (gameState === GS.MENU) drawTitle();
  else if (gameState === GS.SELECT) drawSelect();
  else if (gameState === GS.COUNTDOWN) drawCountdown();
  else if (gameState === GS.ROUND_OVER) drawRoundOver();
  else if (gameState === GS.MATCH_OVER) drawMatchOver();
  else if (gameState === GS.ONLINE_MENU) drawOnlineMenu();
  else if (gameState === GS.ONLINE_HOST) drawOnlineConnect();
  else if (gameState === GS.ONLINE_JOIN) drawOnlineJoin();
  else if (gameState === GS.ONLINE_WAIT) drawOnlineWait();

  // Mute indicator sits on top of every screen, top-right corner. Always
  // visible so the user knows what state audio is in (and finds the M key).
  drawMuteIndicator();
}

// ---------------------------- MAIN LOOP ------------------------------
let lastTime = performance.now();
function frame(now) {
  let dt = (now - lastTime) / 1000;
  lastTime = now;
  // cap dt to avoid spiral-of-death (e.g. tab refocus)
  if (dt > 1 / 20) dt = 1 / 20;
  if (dt < 0) dt = 0;

  if (gameMode === "online" && net.mode === "guest") {
    // ===== GUEST: thin terminal — DO NOT simulate. =====
    // (1) send local input to host (edge-triggered attack/special consumed here),
    // (2) the latest snapshot+events were already applied by netOnMessage,
    // (3) animate/expire FX locally, (4) render. Connect screens still render.
    frameCount++;          // keep render-only animations (auras, blinks, dots) alive
    guestSendInput();
    updateEffects(dt);
    render();
    requestAnimationFrame(frame);
    return;
  }

  update(dt);
  render();

  // HOST: after simulating, broadcast the snapshot + this frame's FX events.
  if (gameMode === "online" && net.mode === "host") hostBroadcast();

  requestAnimationFrame(frame);
}
updateHint();   // sync the below-canvas hint strip to the default mode (1p)
requestAnimationFrame(frame);

})();
</script>
