<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LOG KNIGHT BATTLE</title>
<style>
  :root {
    /* ===== DELIBERATE LIMITED PALETTE (~16 colors) ===== */
    --c-night:    #1a2238; /* deep dusk sky top    */
    --c-page:     #0d1320; /* page background      */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0d1320;
    overflow: hidden;
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: #e8dcc0;
  }
  #stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse at 50% 30%, #1a2238 0%, #0d1320 70%);
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #1a2238;
    box-shadow: 0 0 0 2px #2a3552, 0 18px 60px rgba(0,0,0,0.7);
    /* sized by JS to keep aspect ratio, integer-ish scaling */
  }
  #hint {
    position: absolute;
    bottom: 8px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 1px;
    color: #5a6a8a;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="960" height="540"></canvas>
  </div>
  <div id="hint">P1: A/D scoot · W hop · S guard · SPACE swing · SPECIAL: F &nbsp;&nbsp;|&nbsp;&nbsp; P2: ◄ ► scoot · ▲ hop · ▼ guard · ENTER swing · SPECIAL: /</div>

<script>
"use strict";
(function () {

// =====================================================================
//  LOG KNIGHT BATTLE — single-file Canvas 2D slapstick brawler
//  Two armored knights SIT ASTRIDE a Nordic log and bonk each other
//  with cast-iron FRYING PANS until one slips off. Bare-knuckle energy,
//  no swords, no shields. Best of 3. PC keyboard, 2 players local.
// =====================================================================

// ----------------------------- CONSTANTS -----------------------------
const VW = 960;            // internal virtual width
const VH = 540;            // internal virtual height

// --- Nordic limited palette (named, deliberately restricted) ---
const PAL = {
  skyTop:    "#1a2238",
  skyMid:    "#3a3a63",
  skyHorizon:"#b86a72",
  skyAmber:  "#e7a36b",
  sunGlow:   "#f6d8a0",
  cloud:     "#42425f",
  forestFar: "#222b40",
  forestMid: "#1a2334",
  forestNear:"#11192a",
  logDark:   "#3a2a1c",
  logBody:   "#6b4a2e",
  logLight:  "#9c7244",
  logTop:    "#c69a5e",
  logGroove: "#2c2014",
  ringDark:  "#4a3320",
  ringLight: "#8a6238",
  // knight reds (P1)
  redDark:   "#6e1822",
  redBody:   "#b22a33",
  redLight:  "#e25548",
  redTrim:   "#f0c060",
  // knight blues (P2)
  bluDark:   "#1c3658",
  bluBody:   "#356a9c",
  bluLight:  "#5fa0d6",
  bluTrim:   "#cdd8e6",
  // shared metal / accents
  steel:     "#c2c8d2",
  steelDk:   "#7c8595",
  ink:       "#11151f",
  bone:      "#e8dcc0",
  spark:     "#ffe9a0",
  clash:     "#fff4d0",
};

// --- Tuning constants (grouped for easy tweaking) ---
const TUNE = {
  // log geometry
  logWidthFrac: 0.62,        // log spans 62% of width
  logTopY:      VH * 0.66,   // y of the log's top surface (where the seat rests)
  logThickness: 70,          // visual log height
  spawnOffset:  118,         // each knight spawns this far from center

  // knight body
  knightW: 40,
  knightH: 64,

  // movement (units are px/sec, accel px/sec^2)
  accel:       1700,
  friction:    1400,         // decel when no input
  maxSpeed:    260,

  // seated hop / gravity (knights sit astride the log and can hop in place)
  gravity:     1900,
  jumpV:       620,

  // ===== SAUSAGE-LEGEND PENDULUM COMBAT =====
  // The upper body is a rigid torsional pendulum hinged at the seat.
  // angAccel = -SPRING_K*angle - SPRING_DAMP*vel  (underdamped: it overshoots
  // and oscillates a couple times before settling). Critical damping would be
  // 2*sqrt(K); we keep DAMP well below that so a tap visibly springs & bounces.
  springK:     58,           // torsional stiffness (rad/s^2 per rad)
  springDamp:  6.2,          // damping (2*sqrt(58) ~= 15.2 is critical; 6.2 < that = underdamped)
  swingMax:    1.30,         // |swingAngle| clamp (rad)
  swingImpulse: 7.6,         // angular velocity added per tap (rad/s) toward foe
  swingReflect: 0.45,        // velocity retained (reversed) when hitting the angle clamp
  swingConsume: 0.40,        // fraction of MY swingVel kept after I land a hit (energy spent)
  tapMinInterval: 0.06,      // min seconds between taps (auto-repeat guard backstop)

  // physics-driven hit
  hitSpeed:    2.25,         // min |swingVel| (rad/s) toward foe for the pan to "bite"
  knockScale:  17,           // seat vx impulse per (rad/s) of pan-tip approach speed
  reaction:    1.4,          // opponent swingVel kick per unit force (rocks them back)
  hitCooldown: 0.22,         // per-attacker lockout after a hit (one swing = one hit;
                             // longer than a swing arc so one tap = at most one bite)
  forceCap:    9.0,          // cap on effective pan-tip speed used for force (anti one-shot)
  balHitScale: 1.15,         // balance lost per unit of (capped) pan-tip approach speed.
                             // LIFE MODEL (no passive recovery): this fully depletes the
                             // 100pt bar. In active tap-spam, swingConsume(0.40)+swingImpulse
                             // re-stack swingVel to forceCap(9), so a solid hit costs
                             // ~1.15*9 = 10.4 balance => a full bar takes ~10 clean hits
                             // (~14 for isolated lighter taps). Sits in the 8-16 target band.
  armRestAngle: -0.42,       // legacy rest tilt of the procedural pan arm (kept for
                             // reference; sprite knights derive pan geometry from
                             // measured sprite anchors, not from this).
  panTipR:     13.5,         // pan-tip hit circle radius ~ 0.12*spriteW*S (matches
                             // the drawn cast-iron pan-head radius on the sprite).

  // clash
  clashPush:   150,          // mutual clash seat pushback
  clashReflect: 0.55,        // swingVel retained (reversed) on a clash
  guardMul:    0.50,         // guard halves incoming seat-knock & reaction
  guardSpringMul: 4.5,       // guard stiffens the spring toward upright

  // hit-stop (impact freeze)
  hitStopMin:  0.040,        // light hit freeze (s)
  hitStopMax:  0.070,        // heavy hit freeze (s)

  // balance = LIFE. It ONLY drops from taking hits (no passive drain, no
  // passive recovery). 0 balance => the knight loses their balance and tumbles
  // off the log (see updateKnight). Where you sit no longer changes life.
  balanceMax:   100,

  // EDGE = DANGER (without draining life): when hit near the rim, the incoming
  // seat-knockback is amplified so a knight is easier to shove off near the edge.
  edgeKnockZone: 0.55,       // edgeN above this starts amplifying knockback (0..1)
  edgeKnockMul:  1.6,        // up to this knockback multiplier right at the very edge

  // a low-balance knight gets shoved further (comeback / danger lever)
  lowBalKnockMul: 1.5,       // up to this multiplier as balance -> 0

  // round / match
  roundTime:     99,         // seconds per round (countdown timer)
  timeUpTieEps:  3,          // balance within this at time-up => DRAW (replay)
  countdownStep: 0.8,        // seconds per countdown number
  roundOverDelay: 2.2,       // pause on round-over banner
  roundsToWin:   2,          // best of 3

  // fall
  fallGravity: 1500,

  // ===== SPECIAL-MOVE SYSTEM =====
  // SP gauge (0..100). Fills through combat so a full charge takes ~8-14s of
  // active play. Derivation: a clean hit costs ~10 of the 100 life bar and the
  // post-hit lockout is hitCooldown(0.22s), so realistic ACTIVE trading lands
  // roughly ~1 hit/sec/player (not every swing connects — many miss, clash, or
  // are guarded). With gainLand+gainTake+passive below, ~1 land/s + ~0.7 take/s
  // gives ~7 + 0.7*3 + 2.5 = ~11.6 SP/s => full in ~8.6s of a live exchange.
  // A pure stalemate (no hits) still fills via passive 2.5/s => ~40s, so it is
  // reachable but combat is by far the dominant source.
  spGainLand:    7,      // SP gained when YOU land a hit
  spGainTake:    3,      // SP gained when you TAKE a hit (smaller)
  spGainGuard:   2,      // SP gained when you block a hit while guarding
  spPassive:     2.5,    // SP/sec passive trickle while PLAYING (stalemate charge)
  spMax:         100,    // full gauge => special AVAILABLE
  spClashGain:   3,      // SP each on a mutual clash

  // (a) MEGA SMASH — telegraphed wind-up then one huge auto-swing.
  megaWindup:    0.35,   // s of vulnerable cock-back before the swing fires
  megaSwingVel:  13.0,   // forward swingVel set when it unleashes (huge)
  megaMul:       2.6,    // knock & balance multiplier applied AFTER forceCap
                         // (sanctioned anti-one-shot exception for this high-risk move)

  // (b) COUNTER STANCE — brief parry window that reflects an incoming hit.
  counterWindow: 0.70,   // s the counter is active
  counterKnock:  240,    // seat knockback dealt to a punished attacker
  counterBal:    26,     // balance damage dealt to a punished attacker
  counterReact:  6.0,    // swingVel kick that rocks the punished attacker back

  // (c) DASH TACKLE — fast committed seat dash; body-shove on overlap.
  dashTime:      0.30,   // s of the dash
  dashVx:        520,    // dash speed toward the foe (well beyond maxSpeed 260)
  dashKnock:     300,    // seat knockback of the body shove
  dashBal:       22,     // balance damage of the body shove

  // (d) ANCHOR — temporary knockback resistance / anti-ring-out.
  anchorTime:    3.0,    // s of the planted stance
  anchorKnockMul: 0.25,  // incoming seat-knock multiplier while anchored
  anchorBalMul:   0.50,  // incoming balance-loss multiplier while anchored

  // select-screen
  readyDelay:    0.9,    // s the "READY" stamp shows before the match starts
};

// The four selectable specials (id, display name, one-line effect).
const SPECIALS = [
  { id: "mega",    name: "大振りスマッシュ", en: "MEGA SMASH",    fx: "Telegraphed wind-up, then ONE huge ring-out swing." },
  { id: "counter", name: "カウンター構え",   en: "COUNTER STANCE", fx: "Brace; negate & punish a hit during the window." },
  { id: "dash",    name: "突進タックル",     en: "DASH TACKLE",   fx: "Commit a fast dash; body-shove on contact. Risky." },
  { id: "anchor",  name: "踏ん張り",         en: "ANCHOR",        fx: "Plant for 3s: very hard to shove off the log." },
];

// ----------------------------- CANVAS --------------------------------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d", { alpha: false });
ctx.imageSmoothingEnabled = false;

// ----------------------------- ASSET PRELOAD -------------------------
// All art is loaded from sibling files (relative paths => works on file://
// and GitHub Pages). The game NEVER calls getImageData/toDataURL, so the
// canvas is never tainted by these (possibly cross-origin under some hosts)
// images. Each draw site guards on img.complete && img.naturalWidth so a
// mid-load image is simply skipped that frame (no throw, no half-drawn art).
const ASSET_SRCS = {
  bg:           "assets/bg.jpg",
  knightRed:    "assets/knight_red.png",
  knightBlue:   "assets/knight_blue.png",
  titleCrest:   "assets/title_crest.png",
  iconMega:     "assets/icon_mega.png",
  iconCounter:  "assets/icon_counter.png",
  iconDash:     "assets/icon_dash.png",
  iconAnchor:   "assets/icon_anchor.png",
};
const IMG = {};
let assetsLoaded = 0;
const ASSET_TOTAL = Object.keys(ASSET_SRCS).length;
for (const key in ASSET_SRCS) {
  const img = new Image();
  // count both success AND error so a missing/broken file can't wedge the
  // LOADING screen forever; a failed image just stays naturalWidth===0 and
  // its guarded draw site skips it.
  img.onload  = () => { assetsLoaded++; };
  img.onerror = () => { assetsLoaded++; };
  img.src = ASSET_SRCS[key];
  IMG[key] = img;
}
function imgReady(img) { return !!img && img.complete && img.naturalWidth > 0; }
function allAssetsLoaded() { return assetsLoaded >= ASSET_TOTAL; }

// map a special id -> its medallion icon image (SELECT screen cards)
const SPECIAL_ICON = {
  mega:    "iconMega",
  counter: "iconCounter",
  dash:    "iconDash",
  anchor:  "iconAnchor",
};

function resize() {
  // Letterbox: pick integer-ish scale to fill window while keeping aspect.
  const sx = window.innerWidth / VW;
  const sy = window.innerHeight / VH;
  let scale = Math.min(sx, sy) * 0.96;
  // prefer crisp scaling but don't force tiny windows below 1x oddly
  canvas.style.width  = Math.round(VW * scale) + "px";
  canvas.style.height = Math.round(VH * scale) + "px";
}
window.addEventListener("resize", resize);
resize();

// ----------------------------- INPUT ---------------------------------
// Held-keys set for continuous reads (move/guard).
// Edge-triggered attack via a per-action "pressed this frame" flag that
// is consumed by the knight and only re-armed on keyup.
const held = new Set();
// attackArmed: true means a fresh press is available to consume.
const attackArmed = { p1: false, p2: false };
// specialArmed: same edge-trigger pattern for the dedicated special keys.
const specialArmed = { p1: false, p2: false };

const KEYS_PREVENT = new Set([
  "ArrowLeft","ArrowRight","ArrowUp","ArrowDown"," ","Space","Enter",
  // special keys: KeyF for P1, Slash ("/") for P2 (Slash is browser quick-find).
  "KeyF","Slash","/",
]);

let audioInited = false;

window.addEventListener("keydown", (e) => {
  const code = e.code;
  if (KEYS_PREVENT.has(e.key) || KEYS_PREVENT.has(code)) e.preventDefault();

  if (!audioInited) initAudio();

  // Ignore OS key-repeat entirely for state transitions.
  if (e.repeat) return;

  held.add(code);

  // Edge-trigger attacks ONLY on a genuine fresh down (not repeat).
  if (code === "Space") attackArmed.p1 = true;
  if (code === "Enter") attackArmed.p2 = true;

  // Edge-trigger specials (dedicated keys, one press = one activation).
  if (code === "KeyF")  specialArmed.p1 = true;
  if (code === "Slash") specialArmed.p2 = true;

  // Global hotkeys handled by state machine
  handleGlobalKey(code);
});

window.addEventListener("keyup", (e) => {
  held.delete(e.code);
  // Re-arming happens implicitly: a new keydown sets attackArmed=true again.
});

// also clear held keys if window loses focus (prevents stuck movement)
window.addEventListener("blur", () => { held.clear(); });

function consumeAttack(who) {
  if (attackArmed[who]) { attackArmed[who] = false; return true; }
  return false;
}
function consumeSpecial(who) {
  if (specialArmed[who]) { specialArmed[who] = false; return true; }
  return false;
}

// ----------------------------- AUDIO ---------------------------------
let actx = null;
function initAudio() {
  if (audioInited) return;
  audioInited = true;
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (err) { actx = null; }
}
function blip(freq, dur, type, vol) {
  if (!actx) return;
  try {
    if (actx.state === "suspended") actx.resume();
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const g = actx.createGain();
    osc.type = type || "square";
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.12, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(actx.destination);
    osc.start(t); osc.stop(t + dur + 0.02);
  } catch (err) {}
}
function sfxSwing() { blip(220, 0.08, "triangle", 0.05); }
function sfxHit()   { blip(140, 0.14, "square", 0.10); blip(90, 0.16, "sawtooth", 0.06); }
function sfxClang() { blip(880, 0.10, "square", 0.10); blip(1320, 0.10, "triangle", 0.07); }
function sfxJump()  { blip(330, 0.10, "sine", 0.05); }
function sfxFall()  { blip(120, 0.4, "sawtooth", 0.08); }
function sfxCount() { blip(660, 0.08, "square", 0.07); }
function sfxFight() { blip(523, 0.10, "square", 0.10); blip(784, 0.16, "square", 0.08); }
// --- special-move SFX ---
function sfxSpReady() { blip(880, 0.07, "square", 0.06); blip(1175, 0.10, "triangle", 0.05); }
function sfxSpFail()  { blip(180, 0.06, "square", 0.04); }
function sfxMega()    { blip(70, 0.30, "sawtooth", 0.12); blip(160, 0.22, "square", 0.09); }
function sfxCounter() { blip(1320, 0.08, "square", 0.10); blip(1760, 0.12, "triangle", 0.07); }
function sfxDash()    { blip(110, 0.18, "sawtooth", 0.09); blip(300, 0.10, "square", 0.06); }
function sfxAnchor()  { blip(200, 0.22, "sine", 0.08); blip(110, 0.26, "triangle", 0.06); }
function sfxSelect()  { blip(523, 0.05, "square", 0.05); }
function sfxLock()    { blip(659, 0.08, "square", 0.07); blip(988, 0.10, "triangle", 0.05); }

// ----------------------------- LOG GEOMETRY --------------------------
const logW = VW * TUNE.logWidthFrac;
const logLeft  = (VW - logW) / 2;
const logRight = logLeft + logW;
const logTopY  = TUNE.logTopY;
const logCenter = VW / 2;
// A knight is "off" when its seat center passes beyond an edge margin.
const EDGE_MARGIN = 6;

// ----------------------------- KNIGHT --------------------------------
const ST = {
  IDLE: "idle", WALK: "walk", JUMP: "jump",
  ATTACK: "attack", GUARD: "guard", FALLING: "falling",
};

function makeKnight(side) {
  return {
    side,                       // "p1" | "p2"
    x: 0, y: logTopY,           // y = seat (hips on top of log)
    vx: 0, vy: 0,
    onGround: true,
    facing: side === "p1" ? 1 : -1,
    balance: TUNE.balanceMax,
    state: ST.IDLE,
    // ===== pendulum (rigid upper body about the seat pivot) =====
    swingAngle: 0,              // rad; 0 = upright, + = leaning toward opponent
    swingVel: 0,               // rad/s
    tapCdTimer: 0,             // backstop min interval between taps
    hitCdTimer: 0,             // post-hit lockout (one swing = one hit)
    knockTimer: 0,             // window where vx is NOT clamped (knockback in flight)
    attackFlash: 0,            // brief ATTACK label timer (for SFX/anim only)
    // falling bookkeeping
    fellAtFrame: -1,
    // visual
    bob: Math.random() * Math.PI * 2,
    landDust: 0,
    rounds: 0,
    // ===== SPECIAL-MOVE SYSTEM =====
    chosenSpecial: null,   // "mega"|"counter"|"dash"|"anchor"; chosen ONCE per match
                           // on the SELECT screen. NOT reset between rounds.
    special: 0,            // SP gauge 0..spMax; resets to 0 each round, refills
    spReadyPulse: 0,       // visual pulse when the gauge first hits full
    // transient special states/timers (all reset on round start)
    windupTimer: 0,        // MEGA SMASH cock-back countdown (vulnerable)
    megaPending: false,    // MEGA SMASH: next pan contact is super-charged
    counterTimer: 0,       // COUNTER STANCE active window
    counterFlash: 0,       // visual flash after a successful counter
    dashTimer: 0,          // DASH TACKLE active window
    dashHit: false,        // DASH TACKLE: already shoved this dash (one shove)
    anchorTimer: 0,        // ANCHOR active window
  };
}

const p1 = makeKnight("p1");
const p2 = makeKnight("p2");

function resetKnightPositions() {
  p1.x = logCenter - TUNE.spawnOffset;
  p2.x = logCenter + TUNE.spawnOffset;
  for (const k of [p1, p2]) {
    k.y = logTopY; k.vx = 0; k.vy = 0; k.onGround = true;
    k.balance = TUNE.balanceMax;
    k.state = ST.IDLE;
    k.swingAngle = 0; k.swingVel = 0;
    k.tapCdTimer = 0; k.hitCdTimer = 0; k.knockTimer = 0; k.attackFlash = 0;
    k.fellAtFrame = -1; k.landDust = 0;
    // SP gauge + all transient special states reset each round.
    // chosenSpecial is DELIBERATELY left intact (picked once per match).
    k.special = 0; k.spReadyPulse = 0;
    k.windupTimer = 0; k.megaPending = false;
    k.counterTimer = 0; k.counterFlash = 0;
    k.dashTimer = 0; k.dashHit = false;
    k.anchorTimer = 0;
  }
  p1.facing = 1; p2.facing = -1;
}

// FULL clean reset of a single knight to a stationary idle pose. Builds on the
// per-round reset (resetKnightPositions handles x/y/facing + all round-scoped
// bits as the single source of truth) and additionally clears the visual
// tumble angle. Used by enterSelect so no residual motion/state leaks into the
// SELECT screen or the next match. NOTE: chosenSpecial is intentionally NOT
// touched here — enterSelect clears it separately (kept across rounds).
function fullResetKnight(k) {
  k.tumble = 0;
}

// ----------------------------- EFFECTS -------------------------------
const particles = [];   // {x,y,vx,vy,life,maxLife,size,color}
const floaters = [];    // {x,y,vy,life,maxLife,text,color,scale}
let shake = 0;          // current screen-shake magnitude

function spawnSparks(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 220;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 60,
      life: 0, maxLife: 0.4 + Math.random() * 0.35,
      size: 2 + Math.floor(Math.random() * 3),
      color: color || PAL.spark,
      grav: 520,
    });
  }
}
function spawnDust(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = -Math.PI + Math.random() * Math.PI; // upper hemisphere outward
    const sp = 30 + Math.random() * 70;
    particles.push({
      x: x + (Math.random() * 24 - 12), y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp * 0.4,
      life: 0, maxLife: 0.5 + Math.random() * 0.3,
      size: 2 + Math.floor(Math.random() * 3),
      color: "#8a7a5a",
      grav: -40,
    });
  }
}
function spawnFloater(x, y, text, color) {
  floaters.push({ x, y, vy: -42, life: 0, maxLife: 0.85, text, color: color || PAL.bone, scale: 1 });
}
function addShake(amount) { shake = Math.min(10, shake + amount * 0.6); }

function updateEffects(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += dt;
    if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
    p.vy += (p.grav || 0) * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.life += dt;
    if (f.life >= f.maxLife) { floaters.splice(i, 1); continue; }
    f.y += f.vy * dt;
    f.vy *= (1 - 1.5 * dt);
  }
  if (shake > 0) {
    shake -= 48 * dt;
    if (shake < 0) shake = 0;
  }
}

// ----------------------------- GAME STATE ----------------------------
const GS = { MENU: "menu", SELECT: "select", COUNTDOWN: "countdown", PLAYING: "playing", ROUND_OVER: "roundover", MATCH_OVER: "matchover" };
let gameState = GS.MENU;

// ----- SELECT screen state -----
const sel = {
  p1: { cursor: 0, locked: false },
  p2: { cursor: 1, locked: false },
  readyTimer: 0,   // >0 once both locked: the "READY" beat before the match
};

let countdownTimer = 0;
let countdownIndex = 0;         // 0..3 -> "3","2","1","FIGHT!"
let roundOverTimer = 0;
let roundWinner = null;         // p1 | p2
let matchWinner = null;
let frameCount = 0;

// round timer + hit-stop
let roundTimer = TUNE.roundTime;   // seconds remaining (counts down only in PLAYING)
let hitStopTimer = 0;              // >0 freezes the sim (and the round clock)
let timeUpBanner = false;          // show "TIME UP!" on the round-over banner
let drawBanner = false;            // round was a DRAW (replay, no pip)

function triggerHitStop(sec) {
  if (sec > hitStopTimer) hitStopTimer = sec;
}

const COUNT_LABELS = ["3", "2", "1", "FIGHT!"];

// Enter the SELECT screen: reset cursors/locks/ready beat and the chosen
// specials. This is the single entry point for title-Enter, R (any state),
// MATCH_OVER-Enter, and the restart button — so players always re-pick.
function enterSelect() {
  sel.p1.cursor = 0; sel.p1.locked = false;
  sel.p2.cursor = 1; sel.p2.locked = false;
  sel.readyTimer = 0;
  // FULL clean reset: positions + all round-scoped physics/combat/special state
  // (resetKnightPositions is the single source of truth for that), then clear
  // the visual tumble so no faller/dasher/winder-upper from the previous match
  // keeps sliding/tumbling on the SELECT background.
  resetKnightPositions();
  fullResetKnight(p1); fullResetKnight(p2);
  // Clear edge-trigger input arms and any keys still physically held so they
  // can't leak a press/movement into the next match.
  attackArmed.p1 = attackArmed.p2 = false;
  specialArmed.p1 = specialArmed.p2 = false;
  held.clear();
  // chosenSpecial is kept across rounds within a match, but re-picked here.
  p1.chosenSpecial = null; p2.chosenSpecial = null;
  gameState = GS.SELECT;
}

// Start the match. Only fired from SELECT after both players lock in and the
// READY beat elapses. Chosen specials are already stored on the knights.
function startMatch() {
  p1.rounds = 0; p2.rounds = 0;
  matchWinner = null;
  startCountdown();
}
function startCountdown() {
  resetKnightPositions();
  particles.length = 0;
  floaters.length = 0;
  shake = 0;
  roundWinner = null;
  timeUpBanner = false;
  drawBanner = false;
  roundTimer = TUNE.roundTime;   // reset to 99 every round (incl. replays/draws)
  hitStopTimer = 0;
  countdownIndex = 0;
  countdownTimer = TUNE.countdownStep;
  gameState = GS.COUNTDOWN;
  sfxCount();
}
function beginPlaying() {
  gameState = GS.PLAYING;
}
function awardRound(winnerKnight) {
  if (gameState !== GS.PLAYING) return; // guard: only award once
  roundWinner = winnerKnight;
  winnerKnight.rounds += 1;
  roundOverTimer = TUNE.roundOverDelay;
  gameState = GS.ROUND_OVER;
  sfxFall();
  addShake(8);
  // check match end
  if (winnerKnight.rounds >= TUNE.roundsToWin) {
    matchWinner = winnerKnight;
  }
}

// TIME UP with no faller: decide by higher balance, or DRAW (replay) if tied.
function resolveTimeUp() {
  if (gameState !== GS.PLAYING) return;
  timeUpBanner = true;
  const diff = p1.balance - p2.balance;
  if (Math.abs(diff) <= TUNE.timeUpTieEps) {
    // DRAW: no pip to either side, replay the round. Do NOT route through
    // awardRound (it would increment rounds and miscount best-of-3).
    drawBanner = true;
    roundWinner = null;
    roundOverTimer = TUNE.roundOverDelay;
    gameState = GS.ROUND_OVER;
    sfxFall();
    addShake(6);
  } else {
    awardRound(diff > 0 ? p1 : p2);
  }
}

// KO-FALL: a knight whose balance (LIFE) has reached 0 pitches off the nearest
// log edge and tumbles. Called from update()'s PLAYING branch right after
// resolveCombat() (the only place balance drops) so a lethal hit flips the
// victim to FALLING on the SAME frame. No onGround gate -- an airborne knight at
// 0 balance must also fall. The FALLING guard prevents a double-fire.
function tryKnockout(k) {
  if (k.state === ST.FALLING || k.balance > 0) return;
  k.state = ST.FALLING;
  k.onGround = false;
  k.fellAtFrame = frameCount;
  k.vx = (k.x < logCenter ? -1 : 1) * 120;   // launch off the nearest edge
  if (k.vy > -120) k.vy = -120;               // ensure a tumble pop even if airborne
  k.tumble = 0;
  sfxFall();
}

function handleGlobalKey(code) {
  // R = full restart from ANY state. Routes through enterSelect() so all
  // transient special timers / knockback flags are cleared and players re-pick.
  if (code === "KeyR") { enterSelect(); return; }
  if (gameState === GS.MENU) {
    if (code === "Enter" || code === "Space") enterSelect();
  } else if (gameState === GS.SELECT) {
    handleSelectKey(code);
  } else if (gameState === GS.MATCH_OVER) {
    if (code === "Enter") enterSelect();
  }
}

// SELECT navigation. Called from the keydown listener AFTER e.repeat is filtered
// (one genuine press = one move), so we don't poll the held-set here.
//   P1: KeyA/KeyD move, Space lock, KeyS un-lock.
//   P2: ArrowLeft/Right move, Enter lock, ArrowDown un-lock.
function handleSelectKey(code) {
  if (sel.readyTimer > 0) return;   // both locked: input frozen during READY beat
  const N = SPECIALS.length;
  // ---- P1 ----
  if (!sel.p1.locked) {
    if (code === "KeyA") { sel.p1.cursor = (sel.p1.cursor + N - 1) % N; sfxSelect(); }
    else if (code === "KeyD") { sel.p1.cursor = (sel.p1.cursor + 1) % N; sfxSelect(); }
    else if (code === "Space") { sel.p1.locked = true; p1.chosenSpecial = SPECIALS[sel.p1.cursor].id; sfxLock(); }
  } else if (code === "KeyS") {
    sel.p1.locked = false; p1.chosenSpecial = null; sfxSelect();
  }
  // ---- P2 ----
  if (!sel.p2.locked) {
    if (code === "ArrowLeft") { sel.p2.cursor = (sel.p2.cursor + N - 1) % N; sfxSelect(); }
    else if (code === "ArrowRight") { sel.p2.cursor = (sel.p2.cursor + 1) % N; sfxSelect(); }
    else if (code === "Enter") { sel.p2.locked = true; p2.chosenSpecial = SPECIALS[sel.p2.cursor].id; sfxLock(); }
  } else if (code === "ArrowDown") {
    sel.p2.locked = false; p2.chosenSpecial = null; sfxSelect();
  }
  // both locked => start the READY beat
  if (sel.p1.locked && sel.p2.locked && sel.readyTimer === 0) {
    sel.readyTimer = TUNE.readyDelay;
    sfxFight();
  }
}

// ----------------------------- PHYSICS / UPDATE ----------------------
function approachZero(v, drop) {
  if (v > 0) return Math.max(0, v - drop);
  if (v < 0) return Math.min(0, v + drop);
  return 0;
}

function updateKnight(k, dt, input) {
  // --- FALLING: knight has gone off the log; tumble down, no input. ---
  if (k.state === ST.FALLING) {
    k.vy += TUNE.fallGravity * dt;
    k.x += k.vx * dt;
    k.y += k.vy * dt;
    k.tumble = (k.tumble || 0) + dt * 8 * (k.vx >= 0 ? 1 : -1);
    return;
  }

  // tick timers
  if (k.tapCdTimer  > 0) k.tapCdTimer  = Math.max(0, k.tapCdTimer  - dt);
  if (k.hitCdTimer  > 0) k.hitCdTimer  = Math.max(0, k.hitCdTimer  - dt);
  if (k.knockTimer  > 0) k.knockTimer  = Math.max(0, k.knockTimer  - dt);
  if (k.attackFlash > 0) k.attackFlash = Math.max(0, k.attackFlash - dt);

  const guarding = input.guard && k.onGround;

  // --- ATTACK = TAP-TO-SWING -------------------------------------------
  // Each genuine keypress (input.attack is already edge-triggered + repeat
  // guarded by the input layer) adds a forward angular impulse toward the
  // opponent. A tiny min-interval is a backstop against any residual repeat.
  // Cannot swing while guarding. No startup/active/recovery state anymore;
  // the "hit" is purely velocity-driven (see resolveCombat).
  if (input.attack && !guarding && k.tapCdTimer === 0) {
    k.swingVel += TUNE.swingImpulse;     // + = toward opponent
    k.tapCdTimer = TUNE.tapMinInterval;
    k.attackFlash = 0.16;                 // anim/SFX label only
    sfxSwing();
  }

  // --- PENDULUM SPRING (rigid upper-body rotation about the seat) -------
  // Underdamped torsional spring: overshoots and oscillates. Guarding stiffens
  // it hard toward upright (brace), so a guarding knight can't wind up a swing.
  const springK = guarding ? TUNE.springK * TUNE.guardSpringMul : TUNE.springK;
  const angAccel = -springK * k.swingAngle - TUNE.springDamp * k.swingVel;
  k.swingVel += angAccel * dt;
  k.swingAngle += k.swingVel * dt;
  if (k.swingAngle > TUNE.swingMax) {
    k.swingAngle = TUNE.swingMax;
    if (k.swingVel > 0) k.swingVel = -k.swingVel * TUNE.swingReflect;
  } else if (k.swingAngle < -TUNE.swingMax) {
    k.swingAngle = -TUNE.swingMax;
    if (k.swingVel < 0) k.swingVel = -k.swingVel * TUNE.swingReflect;
  }

  // --- HORIZONTAL MOVEMENT ---
  const lockMove = guarding;
  let moving = false;
  if (!lockMove) {
    if (input.left)  { k.vx -= TUNE.accel * dt; k.facing = -1; moving = true; }
    if (input.right) { k.vx += TUNE.accel * dt; k.facing = 1;  moving = true; }
  }
  // friction when no directional input (always some friction on the log)
  if (!moving || lockMove) {
    k.vx = approachZero(k.vx, TUNE.friction * dt);
  }
  // clamp player-driven speed only. While knockback is in flight (knockTimer>0)
  // the seat impulse may far exceed maxSpeed — that's exactly the shove that
  // pushes a knight off the log — so leave it uncapped and let friction decay it.
  // A DASH TACKLE (dashTimer>0) is likewise an intentional over-speed commit, so
  // it is exempt from the clamp too (this is what lets it self-ring-out on a whiff
  // via the existing off-log check below).
  if (k.knockTimer === 0 && k.dashTimer === 0) {
    if (k.vx >  TUNE.maxSpeed) k.vx =  TUNE.maxSpeed;
    if (k.vx < -TUNE.maxSpeed) k.vx = -TUNE.maxSpeed;
  }

  // --- HOP (also lunges the seat toward the opponent: a closing move) ---
  if (input.jump && k.onGround && !guarding) {
    k.vy = -TUNE.jumpV;
    k.vx += k.facing * 90;       // small forward lunge on the hop
    k.onGround = false;
    k.state = ST.JUMP;
    sfxJump();
  }

  // --- VERTICAL INTEGRATION ---
  if (!k.onGround) {
    k.vy += TUNE.gravity * dt;
    k.y += k.vy * dt;
    if (k.y >= logTopY) {
      // land
      k.y = logTopY;
      k.vy = 0;
      const wasAir = !k.onGround;
      k.onGround = true;
      if (k.state === ST.JUMP) k.state = ST.IDLE;
      if (wasAir) { spawnDust(k.x, logTopY); k.landDust = 0.2; }
    }
  }
  if (k.landDust > 0) k.landDust = Math.max(0, k.landDust - dt);

  // --- HORIZONTAL INTEGRATION ---
  k.x += k.vx * dt;

  // --- STATE label for animation only (physics is the spring above) ---
  if (!k.onGround) {
    k.state = ST.JUMP;
  } else if (guarding) {
    k.state = ST.GUARD;
  } else if (k.attackFlash > 0) {
    k.state = ST.ATTACK;
  } else if (Math.abs(k.vx) > 12) {
    k.state = ST.WALK;
  } else {
    k.state = ST.IDLE;
  }

  // --- BALANCE = LIFE ---
  // Balance NEVER changes here: no passive drain, no passive recovery. It only
  // drops in applyHit() when this knight takes a hit. Where the knight sits on
  // the log no longer affects life (edge danger is now a knockback amplifier,
  // see applyHit). Balance is clamped to [0, balanceMax] at the point of damage.

  // --- bob phase for idle animation ---
  k.bob += dt * (k.state === ST.WALK ? 12 : 4);

  // --- KO-FALL: balance (LIFE) hit 0 -> lose footing & tumble off ---
  // Handled by tryKnockout(), called from the PLAYING branch of update()
  // IMMEDIATELY after resolveCombat() (where balance can reach 0) and BEFORE
  // the round-timer block. Doing it there (not here) guarantees a lethal hit
  // flips the victim to FALLING on the SAME frame the hit lands -- so the timer
  // freezes and a KO always beats a same-frame time-up. tryKnockout() has no
  // onGround gate, so an airborne knight at 0 balance also falls (air-KO).

  // --- OFF-LOG / LOSE DETECTION ---
  // seat center beyond edge -> slip off & begin falling (do NOT award this frame).
  // Coexists with the KO-fall (tryKnockout, run from update()): the FALLING
  // state guard means whichever fires first skips the other (no double-fire).
  if (k.onGround && (k.x < logLeft - EDGE_MARGIN || k.x > logRight + EDGE_MARGIN)) {
    k.state = ST.FALLING;
    k.onGround = false;
    k.fellAtFrame = frameCount;
    // launch in the direction it was already going (or off the nearest edge)
    if (k.vx === 0) k.vx = (k.x < logCenter) ? -60 : 60;
    k.vy = -120;
    k.tumble = 0;
    sfxFall();
  }
}

// ----------------------------- SPECIAL MOVES -------------------------
// True while any special's transient state is active (used to block a second
// activation — one charge at a time).
function specialActive(k) {
  return k.windupTimer > 0 || k.megaPending || k.counterTimer > 0 ||
         k.dashTimer > 0 || k.anchorTimer > 0;
}

// Add SP, clamping to spMax. Fires a one-shot "ready" pulse + chime the frame
// the gauge first reaches full (and only when a special is chosen & none active).
function gainSp(k, amt) {
  if (amt <= 0) return;
  const was = k.special;
  k.special = Math.min(TUNE.spMax, k.special + amt);
  if (was < TUNE.spMax && k.special >= TUNE.spMax && k.chosenSpecial && !specialActive(k)) {
    k.spReadyPulse = 0.6;
    sfxSpReady();
  }
}

// Try to activate a knight's CHOSEN special. Spends the FULL gauge. Does nothing
// (tiny "not ready" blip) if the gauge isn't full, no special is chosen, the
// knight is falling, or a special is already in flight (no double-fire).
function activateSpecial(k) {
  if (k.state === ST.FALLING) return;
  if (!k.chosenSpecial) return;
  if (specialActive(k)) return;            // one charge at a time
  if (k.special < TUNE.spMax) { sfxSpFail(); return; }   // not ready

  k.special = 0;   // spend the full meter
  switch (k.chosenSpecial) {
    case "mega":
      // telegraphed wind-up; the big swing auto-fires when windupTimer elapses.
      k.windupTimer = TUNE.megaWindup;
      k.swingVel = Math.min(k.swingVel, -1.0); // visibly cock BACK during wind-up
      spawnFloater(k.x, k.y - TUNE.knightH - 14, "CHARGE!", PAL.spark);
      sfxAnchor();
      break;
    case "counter":
      k.counterTimer = TUNE.counterWindow;
      spawnFloater(k.x, k.y - TUNE.knightH - 14, "KAMAE!", k.side === "p1" ? PAL.redLight : PAL.bluLight);
      sfxCounter();
      break;
    case "dash":
      k.dashTimer = TUNE.dashTime;
      k.dashHit = false;
      k.vx = k.facing * TUNE.dashVx;        // commit a fast seat dash toward foe
      k.knockTimer = Math.max(k.knockTimer, TUNE.dashTime); // skip maxSpeed clamp
      spawnDust(k.x, logTopY);
      spawnFloater(k.x, k.y - TUNE.knightH - 14, "TACKLE!", k.side === "p1" ? PAL.redLight : PAL.bluLight);
      sfxDash();
      break;
    case "anchor":
      k.anchorTimer = TUNE.anchorTime;
      spawnDust(k.x, logTopY);
      spawnFloater(k.x, k.y - TUNE.knightH - 14, "FUNBARI!", PAL.steel);
      sfxAnchor();
      break;
  }
}

// Per-frame upkeep of active special states. Run in PLAYING after updateKnight.
function tickSpecial(k, dt) {
  if (k.spReadyPulse > 0) k.spReadyPulse = Math.max(0, k.spReadyPulse - dt);
  if (k.counterFlash > 0) k.counterFlash = Math.max(0, k.counterFlash - dt);

  // MEGA SMASH wind-up: when it elapses, auto-unleash one huge forward swing.
  if (k.windupTimer > 0) {
    k.windupTimer = Math.max(0, k.windupTimer - dt);
    if (k.windupTimer === 0 && k.state !== ST.FALLING) {
      k.swingVel = TUNE.megaSwingVel;       // huge forward velocity
      k.megaPending = true;                 // next contact is super-charged
      k.attackFlash = 0.16;
      sfxMega();
    }
  }
  if (k.counterTimer > 0) k.counterTimer = Math.max(0, k.counterTimer - dt);
  if (k.dashTimer  > 0) k.dashTimer  = Math.max(0, k.dashTimer  - dt);
  if (k.anchorTimer > 0) k.anchorTimer = Math.max(0, k.anchorTimer - dt);
  // megaPending lingers until the swing actually lands (consumed in applyHit),
  // but if the swing decays below the hit threshold it would never connect; let
  // it clear once the pan is no longer moving forward hard, so it can't stick.
  if (k.megaPending && k.windupTimer === 0 && k.swingVel < TUNE.hitSpeed) {
    k.megaPending = false;
  }
}

// DASH TACKLE body-shove: while either knight is dashing, a body-to-body overlap
// delivers a big shove (routed like applyHit so tryKnockout can KO same-frame).
function resolveDashTackles(dt) {
  for (const [att, tgt] of [[p1, p2], [p2, p1]]) {
    if (att.dashTimer <= 0 || att.dashHit) continue;
    if (att.state === ST.FALLING || tgt.state === ST.FALLING) continue;
    const ba = bodyBox(att), bt = bodyBox(tgt);
    const overlap = !(ba.x2 < bt.x1 || ba.x1 > bt.x2 || ba.y2 < bt.y1 || ba.y1 > bt.y2);
    if (!overlap) continue;
    att.dashHit = true;
    applyBodyShove(att, tgt);
  }
}

// A body shove (DASH TACKLE / COUNTER reflect): direct knockback + balance with
// the same anchor/guard/edge rules as applyHit, then SP gain + FX.
function applyBodyShove(attacker, target, knockBase, balBase, label, color) {
  knockBase = knockBase != null ? knockBase : TUNE.dashKnock;
  balBase   = balBase   != null ? balBase   : TUNE.dashBal;
  const guarding = target.state === ST.GUARD;
  let knock = knockBase, balLoss = balBase;

  // low-balance target shoved further (same comeback lever as applyHit)
  const balFrac = target.balance / TUNE.balanceMax;
  knock *= 1 + (TUNE.lowBalKnockMul - 1) * (1 - balFrac);
  if (guarding) { knock *= TUNE.guardMul; balLoss *= TUNE.guardMul; }

  // edge danger amplifier (knockback only)
  const tEdgeN = Math.min(1, Math.abs(target.x - logCenter) / (logW / 2));
  if (tEdgeN > TUNE.edgeKnockZone) {
    const e = (tEdgeN - TUNE.edgeKnockZone) / (1 - TUNE.edgeKnockZone);
    knock *= 1 + (TUNE.edgeKnockMul - 1) * Math.min(1, Math.max(0, e));
  }

  // ANCHOR resistance on the target
  if (target.anchorTimer > 0) { knock *= TUNE.anchorKnockMul; balLoss *= TUNE.anchorBalMul; }

  const dir = (target.x >= attacker.x) ? 1 : -1;
  target.vx += knock * dir;
  target.knockTimer = 0.30;
  target.balance = Math.max(0, target.balance - balLoss);

  // SP gain for both sides
  attacker.special = Math.min(TUNE.spMax, attacker.special + TUNE.spGainLand);
  target.special   = Math.min(TUNE.spMax, target.special   + TUNE.spGainTake);

  const cx = (attacker.x + target.x) / 2, cy = target.y - TUNE.knightH * 0.5;
  spawnSparks(cx, cy, 22, color || PAL.spark);
  spawnFloater(cx, cy - 16, label || (Math.random() < 0.5 ? "DOSUN!" : "SHOVE!"),
               color || (attacker.side === "p1" ? PAL.redLight : PAL.bluLight));
  addShake(12);
  triggerHitStop(TUNE.hitStopMax);
}

// ===== SPRITE GEOMETRY (image-art knights) =====
// Measured anchors as fractions of EACH sprite's own (W,H), identical for both
// colors:
//   SEAT / pivot           = (0.375*spriteW, 0.64*spriteH)  -> sits at (k.x,k.y)
//   FRYING-PAN HEAD center = (0.80*spriteW,  0.22*spriteH)
// Both sprites are 256 tall (W = 182 red / 181 blue; the 1px diff is cosmetic).
// In-game draw scale: targets sprite ~150-175px tall on the 540px canvas so the
// knights read substantial sitting on the log (seat-to-helm span 0.64*256*S maps
// to a bit above the old knightH=64 for presence). S=0.62 => 256*0.62 = 158.7px
// tall, seat-to-helm ~101.6px. BOTH knights share this S.
const SEAT_FX = 0.375, SEAT_FY = 0.64;
const PAN_FX  = 0.80,  PAN_FY  = 0.22;
const SPRITE_S = 0.62;            // in-game draw scale for both knight sprites
// Nominal sprite dims for hit geometry (1px W diff between colors is ignored).
const SPRITE_W = 182, SPRITE_H = 256;
const KNIGHT_DRAW_H = SPRITE_H * SPRITE_S;   // ~158.7px on-screen sprite height
const KNIGHT_SEAT_TO_TOP = SEAT_FY * SPRITE_H * SPRITE_S; // ~101.6px seat->helm

// World-space frying-pan TIP, computed from the seat pivot + swingAngle so it
// tracks the rigidly-rotated sprite EXACTLY as drawn. Render order is:
//   translate(k.x,k.y) · scale(f,1) · rotate(swingAngle)   [pivot = seat]
// so a sprite-local point (lx,ly) lands on screen at:
//   X = k.x + f*( cosθ*lx - sinθ*ly )
//   Y = k.y +     sinθ*lx + cosθ*ly
// PAN_LX/PAN_LY are the pan-head CENTER offset FROM the seat anchor in scaled
// sprite pixels (the same frame the sprite is drawn in, BEFORE scale·rotate),
// so the hit point coincides with the drawn pan head at ANY swingAngle:
//   PAN_LX =  (0.80-0.375)*spriteW*S =  0.425*spriteW*S
//   PAN_LY =  (0.22 -0.64 )*spriteH*S = -0.42 *spriteH*S
const PAN_LX = (PAN_FX - SEAT_FX) * SPRITE_W * SPRITE_S;   // ~ +47.96 (forward)
const PAN_LY = (PAN_FY - SEAT_FY) * SPRITE_H * SPRITE_S;   // ~ -66.66 (up)
function panTip(k) {
  const f = k.facing;
  const t = k.swingAngle;
  const c = Math.cos(t), s = Math.sin(t);
  const x = k.x + f * (c * PAN_LX - s * PAN_LY);
  const y = k.y + (s * PAN_LX + c * PAN_LY);
  return { x, y };
}
// bodyBox covers the VISIBLE sprite torso: horizontally seat ± ~0.32*spriteW*S,
// vertically from the seat (k.y) UP to the helm top (k.y - 0.64*spriteH*S). This
// keeps received hits landing on the body, and at spawn spacing two idle knights
// neither overlap bodies nor pans (see the report).
const BODY_HALF_W = 0.32 * SPRITE_W * SPRITE_S;           // ~ 36.1
function bodyBox(k) {
  return {
    x1: k.x - BODY_HALF_W,        x2: k.x + BODY_HALF_W,
    y1: k.y - KNIGHT_SEAT_TO_TOP, y2: k.y,
  };
}
// circle (cx,cy,r) vs axis-aligned box
function circleHitsBox(cx, cy, r, box) {
  const nx = Math.max(box.x1, Math.min(cx, box.x2));
  const ny = Math.max(box.y1, Math.min(cy, box.y2));
  const dx = cx - nx, dy = cy - ny;
  return dx * dx + dy * dy <= r * r;
}

// PHYSICS-DRIVEN combat. A knight "bites" when its pan tip is moving toward the
// foe (swingVel > HIT_SPEED, positive = toward opponent) AND the pan-tip circle
// overlaps the opponent's body box. Mutual fast swings that meet => CLANG.
function resolveCombat(dt) {
  const tipA = panTip(p1), tipB = panTip(p2);
  const boxA = bodyBox(p1), boxB = bodyBox(p2);

  // === INTENTIONAL "流れパン" (momentum-pan), by user decision 2026-06-17 ===
  // A knight "bites" whenever its pan tip is moving toward the foe fast enough
  // (swingVel > hitSpeed) and overlaps the foe — INCLUDING swings caused purely
  // by recoil / spring oscillation, with NO fresh tap required. This is a
  // DELIBERATE design choice and MUST NOT be restricted to tap-initiated swings.
  // Do not "fix" this by gating on attackFlash / a recent tap — it is by design.
  //
  // A guarding knight can NEVER deal damage: its stiff brace-spring can fling
  // the raised pan forward fast enough to clear hitSpeed, but guard must be
  // purely defensive. Exclude GUARD (and FALLING) from being a live attacker.
  // A COUNTER-stance knight is purely DEFENSIVE: even if residual swingVel makes
  // its pan "live", it must NOT count as an attacker. Otherwise a same-frame
  // mutual collision would hit the CLASH branch and CLANG before applyHit() can
  // run the counter short-circuit (negate + reflect). Exclude counterTimer > 0.
  const aLive = p1.hitCdTimer === 0 && p1.swingVel > TUNE.hitSpeed &&
                p1.state !== ST.FALLING && p1.state !== ST.GUARD && p1.counterTimer === 0;
  const bLive = p2.hitCdTimer === 0 && p2.swingVel > TUNE.hitSpeed &&
                p2.state !== ST.FALLING && p2.state !== ST.GUARD && p2.counterTimer === 0;

  const aReach = aLive && circleHitsBox(tipA.x, tipA.y, TUNE.panTipR, boxB) && p2.state !== ST.FALLING;
  const bReach = bLive && circleHitsBox(tipB.x, tipB.y, TUNE.panTipR, boxA) && p1.state !== ST.FALLING;

  // CLASH: both pans fast toward each other and either tip overlaps the other.
  const tipsMeet =
    circleHitsBox(tipA.x, tipA.y, TUNE.panTipR, bodyBoxAround(tipB.x, tipB.y, TUNE.panTipR)) ;
  if (aLive && bLive && (tipsMeet || (aReach && bReach))) {
    const dirP1 = (p1.x <= p2.x) ? -1 : 1;   // shove each away from the other
    p1.swingVel = -p1.swingVel * TUNE.clashReflect;
    p2.swingVel = -p2.swingVel * TUNE.clashReflect;
    p1.vx += TUNE.clashPush * dirP1;  p1.knockTimer = 0.20;
    p2.vx += TUNE.clashPush * -dirP1; p2.knockTimer = 0.20;
    p1.hitCdTimer = TUNE.hitCooldown; p2.hitCdTimer = TUNE.hitCooldown;
    gainSp(p1, TUNE.spClashGain); gainSp(p2, TUNE.spClashGain);
    const cx = (tipA.x + tipB.x) / 2, cy = (tipA.y + tipB.y) / 2;
    spawnSparks(cx, cy, 24, PAL.clash);
    spawnFloater(cx, cy - 18, "CLANG!", PAL.clash);
    addShake(8);
    triggerHitStop(TUNE.hitStopMin);
    sfxClang();
    return;
  }

  if (aReach) applyHit(p1, p2, tipA);
  if (bReach) applyHit(p2, p1, tipB);
}
function bodyBoxAround(cx, cy, r) {
  return { x1: cx - r, x2: cx + r, y1: cy - r, y2: cy + r };
}

function applyHit(attacker, target, tip) {
  // ===== COUNTER STANCE: target is bracing — NEGATE this hit and PUNISH =====
  // If the would-be victim is in their counter window, the incoming hit deals
  // NOTHING to them; instead the attacker eats a big reflected shove + balance.
  // The attacker's swing energy is consumed and they get the one-hit lockout so
  // the negated swing can't immediately re-bite.
  if (target.counterTimer > 0 && target.state !== ST.FALLING) {
    target.counterTimer = 0;
    target.counterFlash = 0.4;
    const dir = (attacker.x >= target.x) ? 1 : -1;   // shove attacker away from target
    attacker.vx += TUNE.counterKnock * dir;
    attacker.knockTimer = 0.30;
    attacker.balance = Math.max(0, attacker.balance - TUNE.counterBal);
    attacker.swingVel = -Math.abs(attacker.swingVel) - TUNE.counterReact; // rocked back
    attacker.swingVel = Math.max(attacker.swingVel, -TUNE.swingMax * 6);
    attacker.hitCdTimer = TUNE.hitCooldown;
    attacker.megaPending = false;     // a countered mega is spent, not retained
    // SP: countering knight rewarded as if landing; attacker as if taking.
    gainSp(target, TUNE.spGainLand); gainSp(attacker, TUNE.spGainTake);
    spawnSparks(tip.x, tip.y, 24, PAL.clash);
    spawnFloater(target.x, target.y - TUNE.knightH - 6, "COUNTER!",
                 target.side === "p1" ? PAL.redLight : PAL.bluLight);
    addShake(12);
    triggerHitStop(TUNE.hitStopMax);
    sfxCounter();
    return;
  }

  const guarding = target.state === ST.GUARD;

  // force scales with pan-tip approach speed (swingVel), capped to avoid one-shots
  const speed = Math.min(TUNE.forceCap, attacker.swingVel);
  let knock = TUNE.knockScale * speed;
  let balLoss = TUNE.balHitScale * speed;
  let react = TUNE.reaction * speed;

  // MEGA SMASH: this is the sanctioned anti-one-shot EXCEPTION. The giant
  // swingVel is still capped by forceCap above (so normal math holds), then we
  // multiply knock & balance AFTER the cap for the 2-3x payoff. Consumed here.
  const mega = attacker.megaPending;
  if (mega) {
    knock *= TUNE.megaMul;
    balLoss *= TUNE.megaMul;
    attacker.megaPending = false;
  }

  // low-balance target gets shoved further (danger / comeback lever)
  const balFrac = target.balance / TUNE.balanceMax;            // 1 full .. 0 empty
  const lowMul = 1 + (TUNE.lowBalKnockMul - 1) * (1 - balFrac);
  knock *= lowMul;

  if (guarding) { knock *= TUNE.guardMul; balLoss *= TUNE.guardMul; react *= TUNE.guardMul; }

  // ANCHOR: target is planted — greatly reduce incoming seat-knock + balance loss.
  if (target.anchorTimer > 0) {
    knock *= TUNE.anchorKnockMul;
    balLoss *= TUNE.anchorBalMul;
  }

  // EDGE = DANGER: a target near the rim is amplified-shoved (knockback ONLY,
  // never life — that keeps the ~10-hit depletion math honest). Scales toward
  // edgeKnockMul at the very edge. Stacks multiplicatively with lowMul.
  const tEdgeN = Math.min(1, Math.abs(target.x - logCenter) / (logW / 2)); // 0..1
  if (tEdgeN > TUNE.edgeKnockZone) {
    const e = (tEdgeN - TUNE.edgeKnockZone) / (1 - TUNE.edgeKnockZone);
    knock *= 1 + (TUNE.edgeKnockMul - 1) * Math.min(1, Math.max(0, e));
  }

  // seat knockback away from me (this is what shoves them toward the edge)
  const dir = (target.x >= attacker.x) ? 1 : -1;
  target.vx += knock * dir;
  target.knockTimer = 0.30;                  // let the shove exceed maxSpeed briefly
  target.balance = Math.max(0, target.balance - balLoss);
  // rock the opponent backward: a swing AWAY from me = negative swingVel for them
  target.swingVel -= react;

  // consume MY energy + one-hit lockout
  attacker.swingVel *= TUNE.swingConsume;
  attacker.hitCdTimer = TUNE.hitCooldown;

  // SP gain: lander gets more, taker gets a smaller amount; guard chips a little.
  gainSp(attacker, TUNE.spGainLand);
  gainSp(target, guarding ? TUNE.spGainGuard : TUNE.spGainTake);

  // effects (size scales with force; MEGA gets a bespoke onomatopoeia + extra FX)
  const heavy = speed > TUNE.hitSpeed + 2.5;
  const cx = tip.x, cy = tip.y;
  spawnSparks(cx, cy, guarding ? 10 : (mega ? 32 : (heavy ? 22 : 15)),
              guarding ? PAL.steel : (mega ? PAL.clash : PAL.spark));
  let words;
  if (mega) words = ["GWAAAN!", "SMASH!"];
  else if (guarding) words = ["CLANG!", "GUARD!"];
  else if (heavy) words = ["POW!", "THWACK!", "WHAM!"];
  else words = ["BONK!", "DOINK!", "WHACK!"];
  spawnFloater(cx, cy - 16, words[Math.floor(Math.random() * words.length)],
               guarding ? PAL.steel : (attacker.side === "p1" ? PAL.redLight : PAL.bluLight));
  addShake(guarding ? 4 : (mega ? 18 : (heavy ? 12 : 8)));
  // hit-stop scaled to force (MEGA always max)
  const hs = TUNE.hitStopMin + (TUNE.hitStopMax - TUNE.hitStopMin) *
             Math.min(1, (speed - TUNE.hitSpeed) / (TUNE.forceCap - TUNE.hitSpeed));
  if (!guarding) triggerHitStop(mega ? TUNE.hitStopMax : hs);
  if (mega) sfxMega(); else sfxHit();
}

// After physics, check whether a falling knight has dropped off-screen
// and resolve the round (with both-off tiebreak).
function checkRoundResolution() {
  if (gameState !== GS.PLAYING) return;
  const p1Down = p1.state === ST.FALLING && p1.y > VH + 120;
  const p2Down = p2.state === ST.FALLING && p2.y > VH + 120;

  if (p1Down && p2Down) {
    // both gone: whoever fell LATER survives longer -> wins.
    // tiebreak on same frame: higher balance wins.
    let winner;
    if (p1.fellAtFrame > p2.fellAtFrame) winner = p1;
    else if (p2.fellAtFrame > p1.fellAtFrame) winner = p2;
    else winner = (p1.balance >= p2.balance) ? p1 : p2;
    awardRound(winner);
  } else if (p1Down) {
    awardRound(p2);
  } else if (p2Down) {
    awardRound(p1);
  }
}

// ----------------------------- MAIN UPDATE ---------------------------
function readInputs() {
  const i1 = {
    left: held.has("KeyA"), right: held.has("KeyD"),
    jump: held.has("KeyW"), guard: held.has("KeyS"),
    attack: consumeAttack("p1"),
  };
  const i2 = {
    left: held.has("ArrowLeft"), right: held.has("ArrowRight"),
    jump: held.has("ArrowUp"), guard: held.has("ArrowDown"),
    attack: consumeAttack("p2"),
  };
  i1.special = consumeSpecial("p1");
  i2.special = consumeSpecial("p2");
  return [i1, i2];
}

function update(dt) {
  frameCount++;

  // --- HIT-STOP: freeze the sim (and the round clock) for a few ms, then
  // resume. lastTime advances every frame, so the frame after a freeze has a
  // normal small dt — no accumulation, no spiral. Effects + render still run.
  if (hitStopTimer > 0) {
    hitStopTimer = Math.max(0, hitStopTimer - dt);
    updateEffects(dt);
    return;
  }

  updateEffects(dt);

  if (gameState === GS.SELECT) {
    // drain any stray attack/special arms so they don't leak into the match
    consumeAttack("p1"); consumeAttack("p2");
    consumeSpecial("p1"); consumeSpecial("p2");
    // idle knights settle gently (no inputs)
    const noInput = { left:false,right:false,jump:false,guard:false,attack:false };
    updateKnight(p1, dt, noInput);
    updateKnight(p2, dt, noInput);
    if (sel.readyTimer > 0) {
      sel.readyTimer -= dt;
      if (sel.readyTimer <= 0) { sel.readyTimer = 0; startMatch(); }
    }
    return;
  }

  if (gameState === GS.COUNTDOWN) {
    // keep attack flags from leaking into the fight
    consumeAttack("p1"); consumeAttack("p2");
    countdownTimer -= dt;
    if (countdownTimer <= 0) {
      countdownIndex++;
      if (countdownIndex >= COUNT_LABELS.length) {
        beginPlaying();
      } else {
        countdownTimer = TUNE.countdownStep;
        if (countdownIndex === COUNT_LABELS.length - 1) sfxFight();
        else sfxCount();
      }
    }
    // let knights settle (idle physics, no inputs) during countdown
    const noInput = { left:false,right:false,jump:false,guard:false,attack:false };
    updateKnight(p1, dt, noInput);
    updateKnight(p2, dt, noInput);
    return;
  }

  if (gameState === GS.PLAYING) {
    const [i1, i2] = readInputs();
    // special activation (edge-triggered) BEFORE physics so a fired MEGA/dash
    // takes effect this frame.
    if (i1.special) activateSpecial(p1);
    if (i2.special) activateSpecial(p2);
    updateKnight(p1, dt, i1);
    updateKnight(p2, dt, i2);
    tickSpecial(p1, dt); tickSpecial(p2, dt);
    // passive SP trickle so stalemates still charge (only while neither falling)
    if (p1.state !== ST.FALLING) gainSp(p1, TUNE.spPassive * dt);
    if (p2.state !== ST.FALLING) gainSp(p2, TUNE.spPassive * dt);
    resolveCombat(dt);
    resolveDashTackles(dt);            // body-to-body shoves during a dash
    tryKnockout(p1); tryKnockout(p2);  // lethal hit => FALLING this frame, before timer/resolution
    checkRoundResolution();      // a fall (once off-screen) flips state to ROUND_OVER
    // Round clock: ticks ONLY while still PLAYING and NEITHER knight is mid-fall.
    // A knight is flagged FALLING the instant its seat clears the edge but only
    // resolves the round after tumbling off-screen (~0.7s); freezing the clock
    // during that window keeps "fall = instant priority over the timer".
    const falling = p1.state === ST.FALLING || p2.state === ST.FALLING;
    if (gameState === GS.PLAYING && !falling) {
      roundTimer -= dt;
      if (roundTimer <= 0) { roundTimer = 0; resolveTimeUp(); }
    }
    return;
  }

  if (gameState === GS.ROUND_OVER) {
    consumeAttack("p1"); consumeAttack("p2");
    // keep falling knights animating
    const noInput = { left:false,right:false,jump:false,guard:false,attack:false };
    updateKnight(p1, dt, noInput);
    updateKnight(p2, dt, noInput);
    roundOverTimer -= dt;
    if (roundOverTimer <= 0) {
      if (matchWinner) {
        gameState = GS.MATCH_OVER;
      } else {
        startCountdown();
      }
    }
    return;
  }

  if (gameState === GS.MENU || gameState === GS.MATCH_OVER) {
    consumeAttack("p1"); consumeAttack("p2");
    return;
  }
}

// ============================== RENDER ===============================

// --- precomputed forest silhouette layers (stable across frames) ---
function buildForest(seed, count, baseY, height, jitter) {
  // simple deterministic pseudo-random from seed
  let s = seed;
  const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const trees = [];
  for (let i = 0; i < count; i++) {
    const x = (i / count) * VW + (rnd() - 0.5) * jitter;
    const h = height * (0.6 + rnd() * 0.7);
    const w = h * (0.5 + rnd() * 0.2);
    trees.push({ x, baseY, h, w });
  }
  return trees;
}
const forestNear = buildForest(11, 26, logTopY - 8, 64, 30);
const forestMid  = buildForest(53, 22, logTopY - 38, 90, 46);
const forestFar  = buildForest(91, 18, logTopY - 70, 120, 70);

const clouds = [
  { x: 180, y: 110, w: 150, h: 26 },
  { x: 600, y: 80,  w: 200, h: 30 },
  { x: 760, y: 150, w: 120, h: 22 },
];

function drawBackground() {
  // The hand-painted 960x540 Nordic-dusk plate replaces the old procedural
  // sky/sun/clouds/forest. Drawn full-frame; the procedural LOG (drawLog) is
  // still painted ON TOP so the knights sit on it at the same coordinates.
  // Guarded so a mid-load image never throws (falls back to the dusk fill).
  if (imgReady(IMG.bg)) {
    ctx.drawImage(IMG.bg, 0, 0, VW, VH);
  } else {
    ctx.fillStyle = PAL.skyTop;
    ctx.fillRect(0, 0, VW, VH);
  }
}

function drawSoftCloud(x, y, w, h) {
  // chunky cloud from a few overlapping blocky ellipses
  ctx.globalAlpha = 0.5;
  for (let i = 0; i < 4; i++) {
    const cx = x + (i - 1.5) * (w / 4);
    const cw = w * (0.4 - Math.abs(i - 1.5) * 0.06);
    ctx.fillRect(cx - cw / 2, y - h / 2 + Math.sin(i) * 3, cw, h);
  }
  ctx.globalAlpha = 1;
}

function drawForest(trees, color) {
  ctx.fillStyle = color;
  for (const t of trees) {
    // spruce: stacked triangles
    const tiers = 3;
    for (let i = 0; i < tiers; i++) {
      const frac = i / tiers;
      const tierTop = t.baseY - t.h * (1 - frac);
      const tierBot = t.baseY - t.h * (1 - (frac + 1 / tiers)) + 6;
      const halfW = (t.w / 2) * (0.5 + frac * 0.5);
      ctx.beginPath();
      ctx.moveTo(t.x, tierTop);
      ctx.lineTo(t.x - halfW, tierBot);
      ctx.lineTo(t.x + halfW, tierBot);
      ctx.closePath();
      ctx.fill();
    }
    // trunk
    ctx.fillRect(t.x - 2, t.baseY - 6, 4, 8);
  }
}

function drawLog() {
  const x = logLeft, y = logTopY, w = logW, h = TUNE.logThickness;
  // cylinder shading: horizontal bands from top (light) to bottom (dark)
  const bands = [
    { t: 0.00, c: PAL.logTop },
    { t: 0.14, c: PAL.logLight },
    { t: 0.34, c: PAL.logBody },
    { t: 0.70, c: PAL.logDark },
  ];
  for (let i = 0; i < bands.length; i++) {
    const b = bands[i];
    const next = bands[i + 1];
    const y0 = y + b.t * h;
    const y1 = next ? y + next.t * h : y + h;
    ctx.fillStyle = b.c;
    ctx.fillRect(x, y0, w, y1 - y0);
  }
  // top highlight band (light hits the top edge)
  ctx.fillStyle = "rgba(255,236,190,0.30)";
  ctx.fillRect(x, y, w, 5);

  // bark vertical grooves / striations (blocky, limited)
  ctx.fillStyle = PAL.logGroove;
  for (let gx = x + 14; gx < x + w - 8; gx += 26) {
    const jitter = ((gx * 7) % 9) - 4;
    ctx.fillRect(gx + jitter, y + 10, 2, h - 14);
  }
  ctx.fillStyle = "rgba(196,154,94,0.25)";
  for (let gx = x + 26; gx < x + w - 8; gx += 26) {
    ctx.fillRect(gx, y + 8, 1, h - 12);
  }

  // near end cap with concentric ring grain (right end faces viewer-ish)
  drawEndCap(x, y, h);     // left cap
}

function drawEndCap(x, y, h) {
  // left end cap as an ellipse with tree rings
  const cx = x;
  const cyy = y + h / 2;
  const rx = 16, ry = h / 2;
  // base ellipse
  ctx.fillStyle = PAL.ringDark;
  fillEllipse(cx, cyy, rx, ry);
  // concentric rings
  const rings = 5;
  for (let i = rings; i >= 1; i--) {
    const f = i / rings;
    ctx.fillStyle = (i % 2 === 0) ? PAL.ringLight : PAL.logBody;
    fillEllipse(cx, cyy, rx * f, ry * f);
  }
  // center pith
  ctx.fillStyle = PAL.logGroove;
  fillEllipse(cx, cyy, 2.5, 4);
  // rim shadow
  ctx.strokeStyle = PAL.logDark;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cyy, rx, ry, 0, 0, Math.PI * 2);
  ctx.stroke();
}
function fillEllipse(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ---- Knight rendering ----
// Each knight SITS ASTRIDE the log: the seat (hips) rests on the log's top
// surface at k.y, the torso rises UP above it, and BOTH legs drape DOWN over
// the NEAR (camera-facing) side of the log — thigh down the log front, lower
// leg / boot dangling. One hand wields a cast-iron FRYING PAN, the free hand
// grips the log for balance. No sword, no shield. k.y is the seat reference
// (top of the log); the whole figure fills the [k.y-H .. k.y] hitbox so the
// combat boxes stay honest. Legs are drawn BELOW k.y, over the log front.
function drawKnight(k) {
  const pal = (k.side === "p1")
    ? { dark: PAL.redDark, body: PAL.redBody, light: PAL.redLight, trim: PAL.redTrim }
    : { dark: PAL.bluDark, body: PAL.bluBody, light: PAL.bluLight, trim: PAL.bluTrim };

  // ===== SPECIAL aura (drawn in world space, BEFORE the body transform) =====
  // Subtle glow when SP is full & ready, or while a special state is active.
  // Color cues the moment: amber=ready, white=mega windup, cyan=counter,
  // team=dash, steel=anchor. Kept low-alpha so it never fights the pixel art.
  const spFull = k.special >= TUNE.spMax && k.chosenSpecial;
  let auraCol = null, auraA = 0;
  if (k.windupTimer > 0)      { auraCol = PAL.clash;  auraA = 0.30 + 0.2 * Math.sin(frameCount * 0.6); }
  else if (k.counterTimer > 0){ auraCol = PAL.bluLight; auraA = 0.32; }
  else if (k.dashTimer > 0)   { auraCol = (k.side === "p1" ? PAL.redLight : PAL.bluLight); auraA = 0.30; }
  else if (k.anchorTimer > 0) { auraCol = PAL.steel;  auraA = 0.26; }
  else if (k.counterFlash > 0){ auraCol = PAL.clash;  auraA = 0.5 * (k.counterFlash / 0.4); }
  else if (spFull)            { auraCol = PAL.sunGlow; auraA = 0.16 + 0.08 * Math.sin(frameCount * 0.18); }
  if (auraCol && auraA > 0) {
    // size the aura to the SPRITE torso (seat -> helm-top), centered mid-torso,
    // so the cue reads behind the bigger image knight (not the old 64px body).
    const auraR = KNIGHT_SEAT_TO_TOP * 0.75;
    const gx = k.x, gy = k.y - KNIGHT_SEAT_TO_TOP * 0.5;
    const gr = ctx.createRadialGradient(gx, gy, 6, gx, gy, auraR);
    gr.addColorStop(0, auraCol);
    gr.addColorStop(1, "rgba(0,0,0,0)");
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(0.6, auraA));
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(gx, gy, auraR, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ===== SPRITE BODY =====
  // The whole seated knight is a single transparent PNG. Motion comes from the
  // transform, never from deforming the art:
  //   translate(seat) · scale(facing,1) · [tumble while FALLING] · rotate(swingAngle)
  // The seat anchor (SEAT_FX,SEAT_FY of the sprite) is placed at (k.x,k.y) and the
  // pendulum swing rotates the whole figure about that seat — so the pan arcs
  // exactly where panTip() computes its hit point. facing flips P2 to face left.
  // A tiny seated bob/scoot shuffle is applied as a translate (the art stays rigid).
  const sprite = (k.side === "p1") ? IMG.knightRed : IMG.knightBlue;
  if (imgReady(sprite)) {
    // small seated cues: idle breathing bob + scooting shuffle (translate only)
    let bobY = 0, hipShift = 0;
    if (k.state === ST.WALK) {
      bobY = Math.abs(Math.sin(k.bob)) * 1.8;
      hipShift = Math.sin(k.bob) * 3;
    } else if (k.state === ST.IDLE) {
      bobY = Math.sin(k.bob) * 1.2;
    }

    const sw = sprite.naturalWidth, sh = sprite.naturalHeight;
    const dw = sw * SPRITE_S, dh = sh * SPRITE_S;

    ctx.save();
    ctx.translate(k.x + hipShift, k.y + bobY);
    ctx.scale(k.facing, 1);                 // mirror P2 to face left
    if (k.state === ST.FALLING) ctx.rotate(k.tumble || 0); // tumble off the log
    ctx.rotate(k.swingAngle);               // rigid pendulum swing about the seat
    ctx.imageSmoothingEnabled = false;      // crisp pixel-art scaling
    // place the seat anchor at the origin: shift so (SEAT_FX*sw, SEAT_FY*sh) -> 0,0
    ctx.drawImage(sprite, -SEAT_FX * dw, -SEAT_FY * dh, dw, dh);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = 1 - p.life / p.maxLife;
    ctx.globalAlpha = Math.max(0, a);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}
function drawFloaters() {
  ctx.textAlign = "center";
  for (const f of floaters) {
    const a = 1 - f.life / f.maxLife;
    const pop = f.life < 0.12 ? 1 + (0.12 - f.life) * 3 : 1;
    ctx.globalAlpha = Math.max(0, a);
    const size = Math.round(20 * pop);
    ctx.font = `900 ${size}px "Trebuchet MS", sans-serif`;
    ctx.lineWidth = 4;
    ctx.strokeStyle = PAL.ink;
    ctx.strokeText(f.text, f.x, f.y);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = "left";
}

// ---------------------------- UI (no shake) --------------------------
function drawBalanceMeter(k, x, y, w, label, pal) {
  const h = 18;
  // frame
  ctx.fillStyle = PAL.ink;
  ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
  ctx.fillStyle = "#2a3146";
  ctx.fillRect(x, y, w, h);
  // fill proportional to balance
  const frac = k.balance / TUNE.balanceMax;
  const fillW = Math.max(0, Math.round(w * frac));
  // color shifts to warning when low
  let c = pal.body;
  if (frac < 0.3) c = "#d44"; else if (frac < 0.55) c = pal.light;
  // P2 fills from the right so meters mirror toward center
  if (k.side === "p1") {
    ctx.fillStyle = c; ctx.fillRect(x, y, fillW, h);
  } else {
    ctx.fillStyle = c; ctx.fillRect(x + (w - fillW), y, fillW, h);
  }
  // teetering balance marker (tilts with how off-center the knight is)
  const halfLog = logW / 2;
  const off = (k.x - logCenter) / halfLog; // -1..1
  const mx = k.side === "p1" ? x + fillW : x + (w - fillW);
  ctx.save();
  ctx.translate(Math.max(x + 6, Math.min(x + w - 6, mx)), y + h / 2);
  ctx.rotate(off * 0.5);
  ctx.fillStyle = pal.trim;
  ctx.fillRect(-9, -2, 18, 4);    // the balance beam
  ctx.fillStyle = PAL.steel;
  ctx.fillRect(-1, -6, 2, 12);    // fulcrum post
  ctx.restore();

  // ===== SP meter: a thinner accent bar beneath the life bar =====
  const spH = 7, spY = y + h + 4;
  ctx.fillStyle = PAL.ink;
  ctx.fillRect(x - 2, spY - 2, w + 4, spH + 4);
  ctx.fillStyle = "#191f30";
  ctx.fillRect(x, spY, w, spH);
  const spFrac = Math.max(0, Math.min(1, k.special / TUNE.spMax));
  const spW = Math.round(w * spFrac);
  const full = k.special >= TUNE.spMax && k.chosenSpecial;
  // accent gradient color (distinct from the life bar): amber charging -> bright
  let spCol = full ? PAL.sunGlow : PAL.skyAmber;
  ctx.fillStyle = spCol;
  if (k.side === "p1") ctx.fillRect(x, spY, spW, spH);
  else ctx.fillRect(x + (w - spW), spY, spW, spH);
  // tick at the full mark
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  for (let t = 1; t < 4; t++) ctx.fillRect(x + Math.round(w * t / 4), spY, 1, spH);
  // "SP READY!" flash when full
  if (full) {
    const pulse = k.spReadyPulse > 0 || (Math.floor(frameCount * 0.12) % 2 === 0);
    if (pulse) {
      ctx.font = '900 13px "Trebuchet MS", sans-serif';
      ctx.textAlign = k.side === "p1" ? "left" : "right";
      ctx.lineWidth = 3; ctx.strokeStyle = PAL.ink;
      const rx = k.side === "p1" ? x : x + w;
      ctx.strokeText("SP READY!", rx, spY + spH + 14);
      ctx.fillStyle = PAL.sunGlow;
      ctx.fillText("SP READY!", rx, spY + spH + 14);
    }
  } else if (k.chosenSpecial) {
    // tiny SP caption with the chosen special's short name
    const spInfo = SPECIALS.find(s => s.id === k.chosenSpecial);
    ctx.font = '700 10px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.steelDk;
    ctx.textAlign = k.side === "p1" ? "left" : "right";
    const rx = k.side === "p1" ? x : x + w;
    ctx.fillText("SP · " + (spInfo ? spInfo.en : ""), rx, spY + spH + 13);
  }

  // label + win pips
  ctx.fillStyle = PAL.bone;
  ctx.font = '700 16px "Trebuchet MS", sans-serif';
  ctx.textAlign = k.side === "p1" ? "left" : "right";
  const lx = k.side === "p1" ? x : x + w;
  ctx.fillText(label, lx, y - 8);

  // pips ●●○
  const pipR = 6;
  for (let i = 0; i < TUNE.roundsToWin; i++) {
    const px = k.side === "p1"
      ? x + w - 12 - i * 18
      : x + 12 + i * 18;
    ctx.beginPath();
    ctx.arc(px, y - 13, pipR, 0, Math.PI * 2);
    if (i < k.rounds) { ctx.fillStyle = pal.light; ctx.fill(); }
    else { ctx.strokeStyle = PAL.steelDk; ctx.lineWidth = 2; ctx.stroke(); }
  }
  ctx.textAlign = "left";
}

function drawHUD() {
  const palR = { dark: PAL.redDark, body: PAL.redBody, light: PAL.redLight, trim: PAL.redTrim };
  const palB = { dark: PAL.bluDark, body: PAL.bluBody, light: PAL.bluLight, trim: PAL.bluTrim };
  const mw = 320;
  drawBalanceMeter(p1, 30, 40, mw, "P1  CRIMSON", palR);
  drawBalanceMeter(p2, VW - 30 - mw, 40, mw, "AZURE  P2", palB);
  drawRoundTimer();
}

// Chunky pixel-HUD round clock, top-center between the two balance gauges.
// Carved stone slab + bold numerals; turns urgent crimson in the last 10s.
function drawRoundTimer() {
  const secs = Math.max(0, Math.ceil(roundTimer));
  const urgent = roundTimer <= 10;
  const blink = urgent && (Math.floor(roundTimer * 4) % 2 === 0);
  const label = (secs < 10 ? "0" : "") + secs;

  const cx = VW / 2;
  const w = 108, h = 56, top = 24;
  const bx = cx - w / 2, by = top;

  // slab: dark frame + inset face
  ctx.fillStyle = PAL.ink;
  ctx.fillRect(bx - 4, by - 4, w + 8, h + 8);
  ctx.fillStyle = urgent ? "#3a1620" : "#202a40";
  ctx.fillRect(bx, by, w, h);
  // top bevel highlight
  ctx.fillStyle = urgent ? "#5a2230" : "#2e3a56";
  ctx.fillRect(bx, by, w, 5);
  // rivets at the corners (pixel-HUD flavor)
  ctx.fillStyle = PAL.steelDk;
  for (const [rx, ry] of [[bx + 6, by + 6], [bx + w - 8, by + 6], [bx + 6, by + h - 8], [bx + w - 8, by + h - 8]]) {
    ctx.fillRect(rx, ry, 3, 3);
  }

  // numerals
  ctx.save();
  ctx.textAlign = "center";
  ctx.font = '900 40px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 6; ctx.strokeStyle = PAL.ink;
  const col = urgent ? (blink ? "#ff5a5a" : "#ff9090") : PAL.bone;
  const cyT = by + h / 2 + 14;
  ctx.strokeText(label, cx, cyT);
  ctx.fillStyle = col;
  ctx.fillText(label, cx, cyT);
  // tiny "TIME" caption
  ctx.font = '700 11px "Trebuchet MS", sans-serif';
  ctx.fillStyle = urgent ? "#e08a8a" : PAL.steelDk;
  ctx.fillText("TIME", cx, by + 14);
  ctx.restore();
  ctx.textAlign = "left";
}

function drawCenterText(text, sub, big) {
  ctx.textAlign = "center";
  ctx.fillStyle = PAL.bone;
  ctx.strokeStyle = PAL.ink;
  ctx.lineWidth = 6;
  ctx.font = `900 ${big}px "Trebuchet MS", sans-serif`;
  ctx.strokeText(text, VW / 2, VH / 2);
  ctx.fillText(text, VW / 2, VH / 2);
  if (sub) {
    ctx.font = '600 22px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 4;
    ctx.strokeText(sub, VW / 2, VH / 2 + 44);
    ctx.fillStyle = PAL.bone;
    ctx.fillText(sub, VW / 2, VH / 2 + 44);
  }
  ctx.textAlign = "left";
}

// ===== SELECT screen: pick one special per player, Nordic chunky-pixel HUD =====
function drawSelect() {
  // dim overlay (match the title's mood)
  ctx.fillStyle = "rgba(8,12,20,0.62)";
  ctx.fillRect(0, 0, VW, VH);

  ctx.textAlign = "center";
  ctx.font = '900 52px "Trebuchet MS", sans-serif';
  ctx.lineWidth = 9; ctx.strokeStyle = PAL.ink;
  ctx.strokeText("CHOOSE YOUR SPECIAL", VW / 2, 86);
  ctx.fillStyle = PAL.bone;
  ctx.fillText("CHOOSE YOUR SPECIAL", VW / 2, 86);

  // player banners (crimson left / azure right) with their special key binding —
  // on two separate lines so the long hint strings never overlap in the middle.
  ctx.font = '800 17px "Trebuchet MS", sans-serif';
  ctx.textAlign = "left";
  ctx.fillStyle = PAL.redLight;
  ctx.fillText("P1 CRIMSON  ·  A/D move · SPACE lock · S un-lock · SPECIAL: F", 40, 116);
  ctx.textAlign = "right";
  ctx.fillStyle = PAL.bluLight;
  ctx.fillText("AZURE P2  ·  ◄► move · ENTER lock · ▼ un-lock · SPECIAL: /", VW - 40, 140);
  ctx.textAlign = "left";

  // ---- card grid ----
  const N = SPECIALS.length;
  const gap = 22, cardW = 196, cardH = 240;
  const totalW = N * cardW + (N - 1) * gap;
  const x0 = (VW - totalW) / 2, y0 = 158;

  for (let i = 0; i < N; i++) {
    const sp = SPECIALS[i];
    const cx = x0 + i * (cardW + gap);
    const p1Here = sel.p1.cursor === i;
    const p2Here = sel.p2.cursor === i;

    // card slab: dark frame + inset face (stone-HUD flavor)
    ctx.fillStyle = PAL.ink;
    ctx.fillRect(cx - 4, y0 - 4, cardW + 8, cardH + 8);
    ctx.fillStyle = "#202a40";
    ctx.fillRect(cx, y0, cardW, cardH);
    ctx.fillStyle = "#2e3a56";
    ctx.fillRect(cx, y0, cardW, 6);   // top bevel
    // corner rivets
    ctx.fillStyle = PAL.steelDk;
    for (const [rx, ry] of [[cx + 7, y0 + 9], [cx + cardW - 10, y0 + 9],
                            [cx + 7, y0 + cardH - 12], [cx + cardW - 10, y0 + cardH - 12]]) {
      ctx.fillRect(rx, ry, 3, 3);
    }

    // emblem-ish icon plate per special
    drawSpecialIcon(sp.id, cx + cardW / 2, y0 + 64);

    // names
    ctx.textAlign = "center";
    ctx.font = '900 24px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.bone;
    ctx.fillText(sp.name, cx + cardW / 2, y0 + 134);
    ctx.font = '800 15px "Trebuchet MS", sans-serif';
    ctx.fillStyle = PAL.skyAmber;
    ctx.fillText(sp.en, cx + cardW / 2, y0 + 156);

    // one-line effect (wrapped to two lines)
    ctx.font = '500 12px "Trebuchet MS", sans-serif';
    ctx.fillStyle = "#b9c2d6";
    wrapText(sp.fx, cx + cardW / 2, y0 + 182, cardW - 24, 15);

    // P1 / P2 cursor highlights (crimson / azure outlines)
    if (p1Here) drawCardOutline(cx, y0, cardW, cardH, PAL.redLight, sel.p1.locked, -3);
    if (p2Here) drawCardOutline(cx, y0, cardW, cardH, PAL.bluLight, sel.p2.locked, 3);

    // LOCKED stamps (offset so both can sit on one card)
    if (p1Here && sel.p1.locked) drawLockStamp(cx + cardW / 2 - 34, y0 + cardH - 30, PAL.redLight);
    if (p2Here && sel.p2.locked) drawLockStamp(cx + cardW / 2 + 34, y0 + cardH - 30, PAL.bluLight);
  }

  // footer / prompt
  ctx.textAlign = "center";
  if (sel.readyTimer > 0) {
    const s = 1 + Math.min(1, (TUNE.readyDelay - sel.readyTimer) * 6) * 0.4;
    ctx.save();
    ctx.translate(VW / 2, 466);
    ctx.scale(s, s);
    ctx.font = '900 56px "Trebuchet MS", sans-serif';
    ctx.lineWidth = 9; ctx.strokeStyle = PAL.ink;
    ctx.strokeText("READY!", 0, 0);
    ctx.fillStyle = PAL.sunGlow;
    ctx.fillText("READY!", 0, 0);
    ctx.restore();
  } else {
    const blink = (Math.sin(frameCount * 0.12) > -0.2);
    if (blink) {
      ctx.font = '800 20px "Trebuchet MS", sans-serif';
      ctx.fillStyle = PAL.bone;
      ctx.fillText("Both players LOCK IN to begin   ·   R: back to select", VW / 2, 466);
    }
  }
  ctx.textAlign = "left";
}

function drawCardOutline(x, y, w, h, color, locked, inset) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = locked ? 5 : 3;
  ctx.strokeRect(x + inset, y + inset, w - inset * 2, h - inset * 2);
  ctx.restore();
}

function drawLockStamp(cx, cy, color) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.18);
  ctx.font = '900 16px "Trebuchet MS", sans-serif';
  ctx.textAlign = "center";
  ctx.lineWidth = 4; ctx.strokeStyle = PAL.ink;
  ctx.strokeText("LOCKED", 0, 0);
  ctx.fillStyle = color;
  ctx.fillText("LOCKED", 0, 0);
  ctx.restore();
}

// chunky little icon per special (on-theme, not generic clip-art).
// Prefers the painted 96x96 round medallion PNG; falls back to the procedural
// vector glyph if the image isn't decoded yet (guarded, never throws).
function drawSpecialIcon(id, cx, cy) {
  const iconImg = IMG[SPECIAL_ICON[id]];
  if (imgReady(iconImg)) {
    const sz = 84;   // medallion render size on the card
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(iconImg, cx - sz / 2, cy - sz / 2, sz, sz);
    ctx.imageSmoothingEnabled = false;
    return;
  }
  ctx.save();
  ctx.translate(cx, cy);
  if (id === "mega") {
    // big pan cocked back with motion arc
    ctx.strokeStyle = PAL.steelDk; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 4, 22, Math.PI * 1.05, Math.PI * 1.75); ctx.stroke();
    ctx.fillStyle = "#15151a";
    ctx.beginPath(); ctx.arc(-2, -10, 13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#34343c"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(-2, -10, 12, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#2a211a";
    ctx.fillRect(6, -2, 18, 5);
  } else if (id === "counter") {
    // crossed parry spark
    ctx.strokeStyle = PAL.bluLight; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-16, -14); ctx.lineTo(16, 14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(16, -14); ctx.lineTo(-16, 14); ctx.stroke();
    ctx.fillStyle = PAL.clash;
    for (const a of [0, 1, 2, 3]) {
      const ang = a * Math.PI / 2 + 0.4;
      ctx.fillRect(Math.cos(ang) * 18 - 2, Math.sin(ang) * 18 - 2, 4, 4);
    }
  } else if (id === "dash") {
    // forward chevrons (speed)
    ctx.fillStyle = PAL.redLight;
    for (let i = 0; i < 3; i++) {
      const ox = -16 + i * 12;
      ctx.beginPath();
      ctx.moveTo(ox, -12); ctx.lineTo(ox + 9, 0); ctx.lineTo(ox, 12);
      ctx.lineTo(ox + 4, 12); ctx.lineTo(ox + 13, 0); ctx.lineTo(ox + 4, -12);
      ctx.closePath(); ctx.fill();
    }
  } else if (id === "anchor") {
    // planted boots / ground grip
    ctx.fillStyle = PAL.steel;
    ctx.fillRect(-3, -16, 6, 22);
    ctx.beginPath(); ctx.arc(0, -16, 6, Math.PI, 0); ctx.fill();
    ctx.strokeStyle = PAL.steel; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 4, 14, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
    ctx.fillStyle = "#8a7a5a";
    ctx.fillRect(-18, 16, 36, 4);  // ground line
  }
  ctx.restore();
}

// simple word-wrap centered at (cx, y), advancing by lineH
function wrapText(text, cx, y, maxW, lineH) {
  const words = text.split(" ");
  let line = "", yy = y;
  for (let i = 0; i < words.length; i++) {
    const test = line ? line + " " + words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, cx, yy);
      line = words[i]; yy += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, cx, yy);
}

function drawCountdown() {
  const label = COUNT_LABELS[Math.min(countdownIndex, COUNT_LABELS.length - 1)];
  // pop scale based on time within the step
