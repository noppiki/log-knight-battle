<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Knight Battle — 3D vertical slice (iter 66)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a1f2e;
      font-family: 'Trebuchet MS', Verdana, sans-serif;
    }

    #canvas-host {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── top-right back link ────────────────────────────────────── */
    #back-link {
      position: fixed;
      top: 14px;
      right: 18px;
      z-index: 20;
      color: #e8dcc0;
      background: rgba(20, 20, 30, 0.85);
      border: 1px solid rgba(216, 164, 90, 0.7);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 12px;
      font-family: 'Trebuchet MS', Verdana, sans-serif;
      font-weight: bold;
      letter-spacing: 0.04em;
      text-decoration: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.6);
      transition: background 0.15s, color 0.15s;
    }
    #back-link:hover {
      background: rgba(40, 40, 55, 0.9);
      color: #d8a45a;
    }

    /* ── bottom-left HUD strip ──────────────────────────────────── */
    #hud {
      position: fixed;
      bottom: 14px;
      left: 18px;
      z-index: 20;
      color: #e8dcc0;
      background: rgba(20, 20, 30, 0.85);
      border: 1px solid rgba(216, 164, 90, 0.8);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.06em;
      line-height: 1.5;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.9);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
    }
    #hud .label {
      color: #d8a45a;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── full-screen radial vignette ───────────────────────────── */
    #vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 5;
      background: radial-gradient(ellipse at center,
        transparent 40%, rgba(15,12,20,0.35) 80%, rgba(8,6,12,0.6) 100%);
    }

    /* ── vignette anchors ───────────────────────────────────────── */
    #vignette-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      z-index: 10;
      pointer-events: none;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.5), transparent);
    }
    #vignette-top-right {
      position: fixed;
      top: 0;
      right: 0;
      width: 200px;
      height: 80px;
      z-index: 10;
      pointer-events: none;
      background: linear-gradient(to bottom left, rgba(0, 0, 0, 0.45), transparent);
    }

    /* ── loading overlay ────────────────────────────────────────── */
    #loading {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1f2e;
      color: #e8dcc0;
      font-family: 'Trebuchet MS', Verdana, sans-serif;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.1em;
      transition: opacity 0.5s;
    }
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-dot {
      display: inline-block;
      animation: blink 1.2s infinite both;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://esm.sh/three@0.171.0",
      "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="vignette"></div>

  <div id="loading">
    LOADING<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
  </div>

  <div id="canvas-host"></div>

  <div id="vignette-bottom"></div>
  <div id="vignette-top-right"></div>

  <a id="back-link" href="../index.html">&#x2190; back to 2D</a>

  <div id="hud">
    <div class="label">iter 66 vertical slice</div>
    crimson astride · drag to rotate
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader }      from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { RGBELoader }      from 'three/addons/loaders/RGBELoader.js';

    // Post-processing chain
    import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { SMAAPass }        from 'three/addons/postprocessing/SMAAPass.js';
    import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';
    import { SSAOPass }        from 'three/addons/postprocessing/SSAOPass.js';
    import { OutlinePass }     from 'three/addons/postprocessing/OutlinePass.js';
    import { BokehPass }       from 'three/addons/postprocessing/BokehPass.js';

    /* ── renderer ──────────────────────────────────────────────── */
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
    renderer.toneMapping       = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.42;  // tiny lift (+0.02) for vignette compensation
    renderer.outputColorSpace  = THREE.SRGBColorSpace;

    const host = document.getElementById('canvas-host');
    host.appendChild(renderer.domElement);

    /* ── IBL environment map (PMREM) ───────────────────────────── */
    // Primary: real HDRI from assets/env_dusk.hdr.
    // Fallback: RoomEnvironment if the HDR file is missing / fails to load.
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();

    function makeRoomEnvFallback() {
      const envScene = new RoomEnvironment();
      return pmrem.fromScene(envScene, 0.04).texture;
    }

    // Set fallback immediately so reflections work before/without the HDR.
    const fallbackEnvTex = makeRoomEnvFallback();

    /* ── scene ─────────────────────────────────────────────────── */
    const scene = new THREE.Scene();
    scene.environment  = fallbackEnvTex;  // will be replaced by HDR PMREM on success
    scene.background   = fallbackEnvTex;  // show env as visible sky; replaced by HDRI on load
    scene.environmentIntensity = 1.0;    // Three r150+ scene-level prop

    // Async HDRI load — non-blocking; falls back gracefully on 404 / parse fail.
    new RGBELoader().load(
      'assets/env_dusk.hdr',
      (hdrTex) => {
        hdrTex.mapping = THREE.EquirectangularReflectionMapping;
        const pmremTex = pmrem.fromEquirectangular(hdrTex).texture;
        scene.environment = pmremTex;
        scene.background  = pmremTex;  // HDRI becomes the visible sky
        hdrTex.dispose();
        console.log('[lkb-3d] HDRI env_dusk.hdr loaded');
      },
      undefined,
      (err) => {
        console.warn('[lkb-3d] env_dusk.hdr load failed, keeping RoomEnvironment fallback', err);
        // fallbackEnvTex already assigned to scene.environment / scene.background — nothing to do.
      }
    );

    // Dusk gradient background via a sky-dome mesh (large inverted sphere)
    // Fragment shader maps vertical position to a warm dusk gradient:
    //   top    #2a2538  (deep cool-purple zenith)
    //   middle #6a5d68  (dusky rose horizon)
    //   lower  #d8a45a  (warm amber glow near horizon)
    const skyGeo = new THREE.SphereGeometry(150, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      depthWrite: false,
      uniforms: {},
      vertexShader: /* glsl */`
        varying vec3 vWorldPos;
        void main() {
          vWorldPos = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: /* glsl */`
        varying vec3 vWorldPos;

        vec3 colorZenith  = vec3(0.165, 0.145, 0.220); // #2a2538
        vec3 colorHorizon = vec3(0.416, 0.365, 0.408); // #6a5d68
        vec3 colorGlow    = vec3(0.847, 0.643, 0.353); // #d8a45a

        void main() {
          // normalised height  -1..+1 → we remap to 0..1
          float t = clamp((vWorldPos.y / 150.0) * 0.5 + 0.5, 0.0, 1.0);

          vec3 col;
          // lower half: glow → horizon
          // upper half: horizon → zenith
          if (t < 0.45) {
            float f = t / 0.45;
            col = mix(colorGlow, colorHorizon, f);
          } else {
            float f = (t - 0.45) / 0.55;
            col = mix(colorHorizon, colorZenith, f);
          }
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
    const skyDome = new THREE.Mesh(skyGeo, skyMat);
    // scene.add(skyDome); // disabled: HDRI (scene.background = pmremTex) is now the visible sky.
    //                      // The gradient skydome was competing with the HDRI horizon.

    // Cool dusk fog — fades the far end of the log into atmosphere.
    scene.fog = new THREE.FogExp2(0x9098a8, 0.006);

    /* ── lighting ──────────────────────────────────────────────── */
    // Hemisphere: sky cool-blue, ground warm terracotta
    const hemi = new THREE.HemisphereLight(0x8aa0d8, 0x443a3a, 1.2);
    scene.add(hemi);
    const ambientFill = new THREE.AmbientLight(0x9aa8c0, 0.25);
    scene.add(ambientFill);

    // Key sun: warm amber directional, casts shadows
    const sun = new THREE.DirectionalLight(0xffc88a, 2.2);
    sun.position.set(6, 5, -4);
    sun.castShadow = true;
    sun.shadow.mapSize.set(4096, 4096); // high-res shadow map
    sun.shadow.camera.near   = 0.5;
    sun.shadow.camera.far    = 30;      // tightened from 50 to reduce bias artifacts
    sun.shadow.camera.left   = -10;
    sun.shadow.camera.right  =  10;
    sun.shadow.camera.top    =  10;
    sun.shadow.camera.bottom = -10;
    sun.shadow.bias = -0.0003;          // tightened from -0.001
    scene.add(sun);

    // Warm rim fill from front-left
    const rim = new THREE.PointLight(0xff9060, 0.6, 20);
    rim.position.set(-1.5, 4, 5);
    scene.add(rim);

    // ── silhouette rim lights (four spots, two per knight) ────────
    // Wrap in try/catch so a single light failure doesn't break the scene.
    try {
      // Crimson knight (x = -2) — warm amber back-rim + cool blue top-rim
      const rim_crimson_back = new THREE.SpotLight(0xffc88a, 3.2);
      rim_crimson_back.position.set(-2, 2.8, 4);
      rim_crimson_back.target.position.set(-2, 1, 0);
      rim_crimson_back.distance  = 6;
      rim_crimson_back.angle     = Math.PI / 5;
      rim_crimson_back.penumbra  = 0.7;
      rim_crimson_back.castShadow = false;
      scene.add(rim_crimson_back);
      scene.add(rim_crimson_back.target);

      const rim_crimson_top = new THREE.SpotLight(0x8ab4ff, 1.4);
      rim_crimson_top.position.set(-2.5, 4, 0);
      rim_crimson_top.target.position.set(-2, 1.5, 0);
      rim_crimson_top.distance = 5;
      rim_crimson_top.penumbra = 0.8;
      rim_crimson_top.castShadow = false;
      scene.add(rim_crimson_top);
      scene.add(rim_crimson_top.target);

      // Azure knight (x = +2) — cool blue back-rim + warm amber top-rim
      const rim_azure_back = new THREE.SpotLight(0x8ab4ff, 3.2);
      rim_azure_back.position.set(2, 2.8, 4);
      rim_azure_back.target.position.set(2, 1, 0);
      rim_azure_back.distance  = 6;
      rim_azure_back.angle     = Math.PI / 5;
      rim_azure_back.penumbra  = 0.7;
      rim_azure_back.castShadow = false;
      scene.add(rim_azure_back);
      scene.add(rim_azure_back.target);

      const rim_azure_top = new THREE.SpotLight(0xffc88a, 1.4);
      rim_azure_top.position.set(2.5, 4, 0);
      rim_azure_top.target.position.set(2, 1.5, 0);
      rim_azure_top.distance = 5;
      rim_azure_top.penumbra = 0.8;
      rim_azure_top.castShadow = false;
      scene.add(rim_azure_top);
      scene.add(rim_azure_top.target);
    } catch (err) {
      console.warn('[lkb-3d] rim lights skipped', err);
    }

    /* ── ground ────────────────────────────────────────────────── */
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const texLoader = new THREE.TextureLoader();
    function loadGroundTex(path) {
      const t = texLoader.load(path);
      t.wrapS = THREE.RepeatWrapping;
      t.wrapT = THREE.RepeatWrapping;
      t.repeat.set(8, 8);
      return t;
    }
    const groundColorTex    = loadGroundTex('assets/tex/ground_color.jpg');
    const groundNormalTex   = loadGroundTex('assets/tex/ground_normal.jpg');
    const groundRoughTex    = loadGroundTex('assets/tex/ground_roughness.jpg');
    groundColorTex.colorSpace = THREE.SRGBColorSpace;
    const groundMat = new THREE.MeshStandardMaterial({
      map:         groundColorTex,
      normalMap:   groundNormalTex,
      roughnessMap: groundRoughTex,
      roughness:   1.0,
      metalness:   0.0,
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    /* ── camera ────────────────────────────────────────────────── */
    // Iter 69: pull back to frame both knights (±2 m spread) comfortably
    // in 1600×900. fov 38 gives breathing room; target raised to 1.1 so
    // the log dominates the lower third.
    const camera = new THREE.PerspectiveCamera(36, 1, 0.1, 200);
    camera.position.set(0, 2.0, -7.0);
    camera.lookAt(0, 1.1, 0);
    camera.updateProjectionMatrix();

    /* ── orbit controls (inspection helper) ────────────────────── */
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.1, 0);
    controls.enableDamping   = true;
    controls.dampingFactor   = 0.07;
    controls.minDistance     = 3.5;
    controls.maxDistance     = 16;
    controls.maxPolarAngle   = Math.PI * 0.78; // don't go below ground
    controls.autoRotate      = true;
    controls.autoRotateSpeed = 0.0; // static for capture clarity
    controls.update();

    /* ── post-processing chain (EffectComposer) ────────────────── */
    // Render → SSAO → Bloom → SMAA → Output
    const initialW = host.clientWidth  || window.innerWidth;
    const initialH = host.clientHeight || window.innerHeight;
    const pixelRatio = renderer.getPixelRatio();

    const composer = new EffectComposer(renderer);
    composer.setPixelRatio(pixelRatio);
    composer.setSize(initialW, initialH);

    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    // SSAO — contact occlusion for grounded look. Specs don't matter, keep ON.
    const ssaoPass = new SSAOPass(scene, camera, initialW, initialH);
    ssaoPass.kernelRadius = 5;
    ssaoPass.minDistance  = 0.003;
    ssaoPass.maxDistance  = 0.1;
    composer.addPass(ssaoPass);

    // OutlinePass — amber rim outline on knights for silhouette punch.
    // selectedObjects is populated after each knight GLB loads (see loaders below).
    const outlinePass = new OutlinePass(
      new THREE.Vector2(initialW, initialH),
      scene,
      camera
    );
    outlinePass.edgeStrength    = 6.0;
    outlinePass.edgeGlow        = 0.55;
    outlinePass.edgeThickness   = 2.6;
    outlinePass.pulsePeriod     = 0;             // no pulse
    outlinePass.visibleEdgeColor.set(0xd8a45a); // amber (PAL.skyAmber from 2D game)
    outlinePass.hiddenEdgeColor.set(0x6a4e2a);  // warmer dark amber for occluded edges
    outlinePass.selectedObjects = [];
    composer.addPass(outlinePass);

    // BokehPass — depth-of-field, focused on the knights (~7m from camera).
    // Mild aperture so knights stay crisp; only the far log + ground blur.
    const bokehPass = new BokehPass(scene, camera, {
      focus:    7.0,
      aperture: 0.0010,
      maxblur:  0.013,
      width:    initialW,
      height:   initialH,
    });
    composer.addPass(bokehPass);

    // Bloom — soft glow on highlights.
    // Iter 67: strength 0.55 → 0.45. The dusk HDRI provides its own glow;
    // over-bloom blurs sprite/edge detail.
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(initialW, initialH),
      0.55,  // strength (amplifies amber outline rim glow)
      0.6,   // radius
      0.78   // threshold
    );
    composer.addPass(bloomPass);

    // SMAA — sub-pixel anti-aliasing (operates in device pixels).
    const smaaPass = new SMAAPass(initialW * pixelRatio, initialH * pixelRatio);
    composer.addPass(smaaPass);

    // OutputPass — handles tone mapping + color space conversion at the end.
    const outputPass = new OutputPass();
    composer.addPass(outputPass);

    /* ── GLB loader ─────────────────────────────────────────────── */
    const loader = new GLTFLoader();
    let loaded = 0;
    const TOTAL = 3; // log + crimson + azure

    function onAllLoaded() {
      console.log('[lkb-3d] scene ready');
      const overlay = document.getElementById('loading');
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.remove(), 600);
    }

    function markLoaded() {
      loaded++;
      if (loaded >= TOTAL) onAllLoaded();
    }

    // helper: enable shadow casting/receiving on every mesh in a GLTF scene
    function applyShadows(gltfScene, cast = true, receive = false) {
      gltfScene.traverse(node => {
        if (node.isMesh) {
          node.castShadow    = cast;
          node.receiveShadow = receive;
        }
      });
    }

    /* ── AnimationMixer registry ───────────────────────────────── */
    // One mixer per animated GLB root. The render loop advances them all
    // via the shared Clock delta.
    const mixers = [];
    const animClock = new THREE.Clock();

    // ── KayKit clip names (from discovery) ───────────────────────
    const CLIP_NAMES = {
      IDLE:   '2H_Melee_Idle',
      ATTACK: '2H_Melee_Attack_Chop',
      BLOCK:  'Blocking',
      HIT:    'Hit_A',
    };

    // Combatant registry — populated as each knight GLB loads. Each
    // entry holds the mixer, the clips map, current action ref, state
    // string, and a label. Used by combatTick() to drive the state
    // machine across both knights.
    // Shape: { crimson: combatant, azure: combatant }
    const combatants = {};

    // Find a clip by exact-name first, falling back to a case-insensitive
    // substring search. Tolerant — returns null if no match.
    function findClip(clips, wanted) {
      if (!clips || clips.length === 0 || !wanted) return null;
      const exact = clips.find(c => c.name === wanted);
      if (exact) return exact;
      const lower = wanted.toLowerCase();
      return clips.find(c => c.name && c.name.toLowerCase().includes(lower)) || null;
    }

    // playClip — fade from the combatant's current action to a new one
    // by clip name. Returns the new action (or null if the clip is
    // missing). Options:
    //   fadeIn (sec)   — crossfade duration (default 0.2)
    //   loop  (bool)   — true → LoopRepeat, false → LoopOnce + clampWhenFinished
    //   weight (0..1)  — action weight (default 1.0)
    //   timeScale (n)  — playback rate (default 1.0)
    function playClip(combatant, clipName, opts = {}) {
      if (!combatant || !combatant.mixer) return null;
      const { fadeIn = 0.2, loop = false, weight = 1.0, timeScale = 1.0 } = opts;
      const clip = findClip(combatant.clips, clipName);
      if (!clip) {
        console.warn(`[lkb-3d] ${combatant.label}: clip "${clipName}" not found`);
        return null;
      }
      const next = combatant.mixer.clipAction(clip);
      next.reset();
      next.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
      next.clampWhenFinished = !loop;
      next.setEffectiveWeight(weight);
      next.timeScale = timeScale;
      next.enabled = true;

      const prev = combatant.current;
      if (prev && prev !== next) {
        next.crossFadeFrom(prev, fadeIn, true);
      }
      next.play();
      combatant.current = next;
      combatant.currentClipName = clipName;
      combatant.currentDuration = clip.duration;
      return next;
    }

    // Register a combatant — build the mixer, cache the clips list, and
    // start it in idle. Tolerant: if the GLB has no animations we log and
    // return without registering (so combatTick() will just skip it).
    function setupCombatant(gltf, label) {
      if (!gltf.animations || gltf.animations.length === 0) {
        console.log(`[lkb-3d] ${label}: no animations baked into GLB`);
        return null;
      }
      const mixer = new THREE.AnimationMixer(gltf.scene);
      const combatant = {
        label,
        mixer,
        clips: gltf.animations,
        current: null,
        currentClipName: null,
        currentDuration: 0,
        state: 'idle',
        impactScheduled: false,
      };
      // Start in idle (looping). Skip crossfade since there's no prev.
      playClip(combatant, CLIP_NAMES.IDLE, { fadeIn: 0, loop: true });
      combatant.state = 'idle';
      mixers.push(mixer);
      combatants[label] = combatant;
      console.log(`[lkb-3d] ${label}: combatant ready (${gltf.animations.length} clips)`);
      return combatant;
    }

    // Backwards-compatible shim — the log GLB load still calls
    // setupMixerFor(). For non-knight GLBs (log) we just register a
    // looping mixer on the first clip (if any). For knights we'd use
    // setupCombatant() directly, but this keeps the call sites tidy.
    function setupMixerFor(gltf, label) {
      if (!gltf.animations || gltf.animations.length === 0) {
        console.log(`[lkb-3d] ${label}: no animations baked into GLB`);
        return;
      }
      // For knights, route to the combat-state setup.
      if (label === 'crimson' || label === 'azure') {
        setupCombatant(gltf, label);
        return;
      }
      // Generic fallback: play the first clip on loop (preserves log
      // behaviour — usually no anims, but defensive if a future bake
      // adds idle motion).
      const mixer = new THREE.AnimationMixer(gltf.scene);
      const clip = gltf.animations[0];
      if (clip) {
        const action = mixer.clipAction(clip);
        action.setLoop(THREE.LoopRepeat, Infinity);
        action.play();
        console.log(`[lkb-3d] ${label}: playing generic clip "${clip.name}"`);
      }
      mixers.push(mixer);
    }

    // ── Impact-burst FX system ───────────────────────────────────
    // Spawns short-lived additive amber particle bursts at hit points,
    // jitters the camera for a tactile shake, and pulses bloom for a
    // single-frame flash. Composed so the combat loop just calls
    // window.triggerImpact(hitPos) and the render loop ticks update().
    class ImpactSystem {
      constructor(scene, camera, bloomPass) {
        this.scene       = scene;
        this.camera      = camera;
        this.bloomPass   = bloomPass;
        this.bursts      = []; // active particle bursts
        this.shake       = null; // { remaining, duration, basePos }
        this.flash       = null; // { remaining, duration, baseStrength }
        this._baseBloomStrength = bloomPass ? bloomPass.strength : 0;
      }

      // Spawn a single burst at hitPos. Random direction + speed per
      // particle, gravity per frame, 0.6s lifetime, additive amber.
      spawn(hitPos) {
        const COUNT = 60 + Math.floor(Math.random() * 41); // 60–100
        const LIFETIME = 0.6;

        const positions  = new Float32Array(COUNT * 3);
        const velocities = new Float32Array(COUNT * 3);
        for (let i = 0; i < COUNT; i++) {
          positions[i * 3 + 0] = hitPos.x;
          positions[i * 3 + 1] = hitPos.y;
          positions[i * 3 + 2] = hitPos.z;
          // Random unit vector × speed in [2.5, 5.0] m/s.
          const u = Math.random() * 2 - 1;
          const phi = Math.random() * Math.PI * 2;
          const s = Math.sqrt(1 - u * u);
          const speed = 2.5 + Math.random() * 2.5;
          velocities[i * 3 + 0] = s * Math.cos(phi) * speed;
          velocities[i * 3 + 1] = u * speed;
          velocities[i * 3 + 2] = s * Math.sin(phi) * speed;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const mat = new THREE.PointsMaterial({
          color:           0xffd089, // amber
          size:            0.08,
          sizeAttenuation: true,
          transparent:     true,
          opacity:         1.0,
          depthWrite:      false,
          blending:        THREE.AdditiveBlending,
        });

        const points = new THREE.Points(geo, mat);
        points.frustumCulled = false;
        this.scene.add(points);

        this.bursts.push({
          points,
          velocities,
          age:       0,
          lifetime:  LIFETIME,
          gravity:  -3.0,
        });

        // Camera shake — 0.18s decaying jitter. basePos is captured
        // fresh each frame in update() because OrbitControls overwrites
        // camera.position every tick; we just offset on top of it.
        this.shake = {
          remaining: 0.18,
          duration:  0.18,
          amplitude: 0.06,
        };

        // Bloom flash — multiply strength by 2.0 for 0.15s, then lerp back.
        if (this.bloomPass) {
          this.flash = {
            remaining:    0.15,
            duration:     0.15,
            baseStrength: this._baseBloomStrength,
            peakStrength: this._baseBloomStrength * 2.0,
          };
          this.bloomPass.strength = this.flash.peakStrength;
        }
      }

      update(delta) {
        // ── advance particle bursts ──────────────────────────────
        for (let i = this.bursts.length - 1; i >= 0; i--) {
          const b = this.bursts[i];
          b.age += delta;
          if (b.age >= b.lifetime) {
            this.scene.remove(b.points);
            b.points.geometry.dispose();
            b.points.material.dispose();
            this.bursts.splice(i, 1);
            continue;
          }
          const pos = b.points.geometry.attributes.position;
          const arr = pos.array;
          const n = arr.length / 3;
          for (let p = 0; p < n; p++) {
            // Apply gravity to vy, then integrate position.
            b.velocities[p * 3 + 1] += b.gravity * delta;
            arr[p * 3 + 0] += b.velocities[p * 3 + 0] * delta;
            arr[p * 3 + 1] += b.velocities[p * 3 + 1] * delta;
            arr[p * 3 + 2] += b.velocities[p * 3 + 2] * delta;
          }
          pos.needsUpdate = true;
          // Fade opacity linearly over lifetime.
          b.points.material.opacity = 1.0 - (b.age / b.lifetime);
        }

        // ── camera shake (linear decay) ──────────────────────────
        // We run AFTER controls.update() each frame, so the camera's
        // current position is the controls' computed value — offset on
        // top of that. On expiry we just stop offsetting; next frame
        // OrbitControls writes its own clean value.
        if (this.shake) {
          this.shake.remaining -= delta;
          if (this.shake.remaining <= 0) {
            this.shake = null;
          } else {
            const t = this.shake.remaining / this.shake.duration; // 1 → 0
            const amp = this.shake.amplitude * t;
            // Random unit vector × amp.
            const u = Math.random() * 2 - 1;
            const phi = Math.random() * Math.PI * 2;
            const s = Math.sqrt(1 - u * u);
            this.camera.position.x += s * Math.cos(phi) * amp;
            this.camera.position.y += u * amp;
            this.camera.position.z += s * Math.sin(phi) * amp;
          }
        }

        // ── bloom flash (lerp back to base strength) ─────────────
        if (this.flash && this.bloomPass) {
          this.flash.remaining -= delta;
          if (this.flash.remaining <= 0) {
            this.bloomPass.strength = this.flash.baseStrength;
            this.flash = null;
          } else {
            const t = this.flash.remaining / this.flash.duration; // 1 → 0
            // peak at t=1, base at t=0 → linear lerp.
            this.bloomPass.strength =
              this.flash.baseStrength +
              (this.flash.peakStrength - this.flash.baseStrength) * t;
          }
        }
      }
    }

    const impactSystem = new ImpactSystem(scene, camera, bloomPass);

    // Real triggerImpact — replaces the earlier stub. Accepts either a
    // THREE.Vector3 (preferred — world-space hit position) or the legacy
    // meta object from earlier phases (in which case we default to the
    // midpoint of the two knights at (0, 1.3, 0)). This is the single
    // entry point the combat loop calls on each contact frame.
    window.triggerImpact = function triggerImpact(hitPos) {
      let pos;
      if (hitPos && typeof hitPos.x === 'number' && typeof hitPos.y === 'number' && typeof hitPos.z === 'number') {
        pos = hitPos;
      } else {
        // Legacy meta object or undefined — use mid-knight default.
        pos = new THREE.Vector3(0, 1.3, 0);
      }
      try {
        impactSystem.spawn(pos);
      } catch (err) {
        console.warn('[lkb-3d] impactSystem.spawn threw', err);
      }
    };

    // combatTick — runs every 3s. Picks a random attacker, fires the
    // ATTACK clip on them and the BLOCK clip on the defender, schedules
    // the impact at ~70% of the attack duration, and fades both back to
    // IDLE just after the attack finishes (~105%).
    let combatTickCount = 0;
    function combatTick() {
      const attackerLabel = Math.random() < 0.5 ? 'crimson' : 'azure';
      const defenderLabel = attackerLabel === 'crimson' ? 'azure' : 'crimson';
      const attacker = combatants[attackerLabel];
      const defender = combatants[defenderLabel];
      if (!attacker || !defender) return; // not both loaded yet

      combatTickCount++;
      console.log(`[lkb-3d] combatTick #${combatTickCount}: ${attackerLabel} → ${defenderLabel}`);

      // Wind up + attack — collapsed into one for now (the chop clip has
      // its own anticipation built in). State labels track the rough
      // phase so future logic (HUD, sound cues) can read combatant.state.
      attacker.state = 'attack';
      attacker.impactScheduled = false;
      const attackAction = playClip(attacker, CLIP_NAMES.ATTACK, {
        fadeIn: 0.2,
        loop: false,
        weight: 1.0,
      });

      defender.state = 'guard';
      playClip(defender, CLIP_NAMES.BLOCK, {
        fadeIn: 0.2,
        loop: false,
        weight: 1.0,
      });

      // Duration → attack clip length (with safe fallback if missing).
      const dur = (attackAction && attacker.currentDuration) || 1.0;

      // Impact at ~70% through the swing.
      setTimeout(() => {
        if (attacker.state !== 'attack') return; // got interrupted
        attacker.impactScheduled = true;
        try {
          window.triggerImpact({
            attacker: attackerLabel,
            defender: defenderLabel,
            tick: combatTickCount,
          });
        } catch (err) {
          console.warn('[lkb-3d] triggerImpact threw', err);
        }
      }, dur * 0.70 * 1000);

      // Return both knights to idle just after the swing resolves.
      setTimeout(() => {
        if (combatants[attackerLabel]) {
          playClip(combatants[attackerLabel], CLIP_NAMES.IDLE, { fadeIn: 0.25, loop: true });
          combatants[attackerLabel].state = 'idle';
        }
        if (combatants[defenderLabel]) {
          playClip(combatants[defenderLabel], CLIP_NAMES.IDLE, { fadeIn: 0.25, loop: true });
          combatants[defenderLabel].state = 'idle';
        }
      }, dur * 1.05 * 1000);
    }

    // Boot the combat loop once both knights are ready. We poll on a
    // short interval rather than coupling into markLoaded() so this
    // stays decoupled from the GLB load flow.
    let combatLoopHandle = null;
    function maybeStartCombatLoop() {
      if (combatLoopHandle) return;
      if (!combatants.crimson || !combatants.azure) return;
      console.log('[lkb-3d] both knights ready — starting combat loop');
      // Kick off the first tick after a short beat so the idle pose
      // reads first; then run on a 3s cadence.
      setTimeout(combatTick, 1200);
      combatLoopHandle = setInterval(combatTick, 3000);
    }
    const combatBootWatcher = setInterval(() => {
      if (combatants.crimson && combatants.azure) {
        clearInterval(combatBootWatcher);
        maybeStartCombatLoop();
      }
    }, 200);

    // ── log.glb ────────────────────────────────────────────────── */
    loader.load(
      'assets/log.glb',
      (gltf) => {
        const root = gltf.scene;
        applyShadows(root, true, true);
        scene.add(root);
        // Log usually static, but if a future bake has anims, drive them.
        setupMixerFor(gltf, 'log');
        markLoaded();
      },
      undefined,
      (err) => {
        console.error('[lkb-3d] failed to load log.glb', err);
        markLoaded(); // still proceed
      }
    );

    // ── crimson.glb ─────────────────────────────────────────────── */
    loader.load(
      'assets/crimson.glb',
      (gltf) => {
        const root = gltf.scene;
        // Do NOT re-anchor; meshes are already at their Blender world positions.
        applyShadows(root, true, false);
        scene.add(root);
        outlinePass.selectedObjects.push(root);
        setupMixerFor(gltf, 'crimson');
        markLoaded();
      },
      undefined,
      (err) => {
        console.error('[lkb-3d] failed to load crimson.glb', err);
        markLoaded();
      }
    );

    // ── azure.glb ───────────────────────────────────────────────── */
    loader.load(
      'assets/azure.glb',
      (gltf) => {
        const root = gltf.scene;
        applyShadows(root, true, false);
        scene.add(root);
        outlinePass.selectedObjects.push(root);
        setupMixerFor(gltf, 'azure');
        markLoaded();
      },
      undefined,
      (err) => {
        console.error('[lkb-3d] failed to load azure.glb', err);
        markLoaded();
      }
    );

    /* ── particle dust/snow (optional, fail-soft) ──────────────── */
    // 800 tiny additive points drifting downward, wrapped on a vertical
    // band so the air always feels populated. Wrapped in try/catch — if
    // any of this errors, we silently skip rather than breaking the scene.
    let dustParticles = null;
    let dustVelocities = null;
    try {
      const DUST_COUNT = 1500;
      const dustGeo = new THREE.BufferGeometry();
      const positions = new Float32Array(DUST_COUNT * 3);
      dustVelocities = new Float32Array(DUST_COUNT);
      const SPAN_X = 16, SPAN_Z = 16;
      const Y_MIN = 0.1, Y_MAX = 8.0;
      for (let i = 0; i < DUST_COUNT; i++) {
        positions[i * 3 + 0] = (Math.random() - 0.5) * SPAN_X;
        positions[i * 3 + 1] = Math.random() * (Y_MAX - Y_MIN) + Y_MIN;
        positions[i * 3 + 2] = (Math.random() - 0.5) * SPAN_Z;
        // Gentle per-particle fall speed (m/s).
        dustVelocities[i] = 0.08 + Math.random() * 0.18;
      }
      dustGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const dustMat = new THREE.PointsMaterial({
        color: 0xd8c8b8,
        size: 0.07,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      dustParticles = new THREE.Points(dustGeo, dustMat);
      dustParticles.userData = { Y_MIN, Y_MAX };
      scene.add(dustParticles);
    } catch (err) {
      console.warn('[lkb-3d] dust particles skipped', err);
      dustParticles = null;
    }

    function updateDust(delta) {
      if (!dustParticles) return;
      const pos = dustParticles.geometry.attributes.position;
      const arr = pos.array;
      const { Y_MIN, Y_MAX } = dustParticles.userData;
      const n = arr.length / 3;
      for (let i = 0; i < n; i++) {
        const yi = i * 3 + 1;
        arr[yi] -= dustVelocities[i] * delta;
        if (arr[yi] < Y_MIN) {
          arr[yi] = Y_MAX; // wrap-around: re-spawn at the top
        }
      }
      pos.needsUpdate = true;
    }

    /* ── resize handler ─────────────────────────────────────────── */
    function onResize() {
      const w = host.clientWidth;
      const h = host.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false); // false → CSS manages element size

      // Composer + all size-aware passes must follow the canvas.
      const pr = renderer.getPixelRatio();
      composer.setPixelRatio(pr);
      composer.setSize(w, h);
      ssaoPass.setSize(w, h);
      outlinePass.setSize(w, h);
      if (typeof bokehPass.setSize === 'function') bokehPass.setSize(w, h);
      bloomPass.setSize(w, h);
      smaaPass.setSize(w * pr, h * pr);
    }
    window.addEventListener('resize', onResize);
    onResize();

    /* ── render loop ────────────────────────────────────────────── */
    function animate() {
      requestAnimationFrame(animate);
      const delta = animClock.getDelta();
      // Advance every animation mixer (knights' idle, log if anim'd, etc.)
      if (mixers.length > 0) {
        mixers.forEach(m => m.update(delta));
      }
      updateDust(delta);
      controls.update(); // needed for damping (recomputes camera.position)
      // Run impact FX AFTER controls so camera-shake jitter wins this frame.
      impactSystem.update(delta);
      composer.render();
    }
    animate();
  </script>
</body>
</html>
