          // directly from (fpYaw, fpPitch) while in FP, so we MUST NOT
          // call camera.lookAt() in that branch (it would overwrite the
          // rotation we just set, and reset pitch every frame).
          this.camera.rotation.order = 'YXZ';
          const _fpPos  = FP_SHOT.getPosition();
          const _fpLook = FP_SHOT.getLookAt();
          const _dx = _fpLook.x - _fpPos.x;
          const _dy = _fpLook.y - _fpPos.y;
          const _dz = _fpLook.z - _fpPos.z;
          // Three.js camera looks down -Z by default; with rotation.y=0 the
          // forward vector is (0,0,-1). yaw = atan2(-dx, -dz) maps a world
          // delta (dx,dz) to the rotation.y needed to face it. For FP_SHOT
          // (delta ≈ +X, dz ≈ 0) this evaluates to -π/2 → looking toward +X.
          this.fpYaw   = Math.atan2(-_dx, -_dz);
          const _horiz = Math.hypot(_dx, _dz);
          this.fpPitch = Math.atan2(_dy, _horiz);
          this.camera.rotation.set(this.fpPitch, this.fpYaw, 0);
          this.active = true;
          this.controls.enabled = false;
          // Hide crimson's own meshes (helm/body) so the camera looking
          // out of the head doesn't see the inside of its own helm, and
          // attach a sword viewmodel parented to the camera.
          setCrimsonSelfVisible(false);
          attachFpSword();
          return;
        }

        // Leaving FP (or arriving from any other state) — restore fov if
        // we'd switched to FP fov previously, and undo the FP self-rig
        // tweaks (re-show crimson meshes, drop the viewmodel sword).
        if (prev === 'fp') {
          if (this.camera.fov !== this.originalFov) {
            this.camera.fov = this.originalFov;
            this.camera.updateProjectionMatrix();
          }
          setCrimsonSelfVisible(true);
          detachFpSword();
        }

        if (mode === 'cinematic') {
          // Re-seat fromPos/fromLook so the next transition eases from
          // wherever we landed (avoid a snap on FP→cinematic).
          this.fromPos.copy(this.camera.position);
          this.fromLook.copy(this.currentLookAt);
          this.state   = 'holding';
          this.elapsed = 0;
          this._override = null;
          this.active = true;
          this.controls.enabled = false;
        } else {
          // 'manual' — hand to OrbitControls.
          this.controls.target.copy(this.currentLookAt);
          this.controls.update();
          this.active = false;
          this.controls.enabled = true;
        }
      }

      update(delta) {
        if (!this.active) return;

        // FP mode — skip the cycle state machine entirely. Camera sits
        // at FP_SHOT.getPosition(); rotation is owned by the mouselook
        // handler (camera.rotation.set(pitch, yaw, 0) on YXZ order),
        // NOT by currentLookAt. fov is set ONCE in setViewMode('fp') —
        // not per-frame — so updateProjectionMatrix() is not called here.
        // CRITICAL: do NOT touch currentLookAt here; animate() guards on
        // viewMode==='fp' and skips camera.lookAt(), but defensive too.
        if (this.viewMode === 'fp') {
          this.camera.position.copy(FP_SHOT.getPosition());
          return;
        }

        if (this.state === 'holding') {
          // While holding, camera sits exactly at toPos / toLook.
          this.camera.position.copy(this.toPos);
          this.currentLookAt.copy(this.toLook);
          this.elapsed += delta;
          // Overrides bypass hold expiry — they sit on the close-up
          // until clearOverride() (or a new jumpTo) is invoked.
          if (!this._override && this.elapsed >= this.holdTime) {
            this.currentIndex = (this.currentIndex + 1) % this.shots.length;
            this._beginTransitionTo(this.shots[this.currentIndex]);
          }
          return;
        }

        // 'transitioning' — ease pos + look over transitionTime.
        this.elapsed += delta;
        const raw = Math.min(this.elapsed / this.transitionTime, 1.0);
        const t   = CameraDirector.easeInOutCubic(raw);
        this.camera.position.lerpVectors(this.fromPos, this.toPos, t);
        this.currentLookAt.lerpVectors(this.fromLook, this.toLook, t);

        if (raw >= 1.0) {
          this.state   = 'holding';
          this.elapsed = 0;
        }
      }
    }

    // ── FP self-rig helpers ────────────────────────────────────
    // In FP view the camera lives INSIDE crimson's head; without these
    // tweaks the camera sees the inside of its own helm and no weapon.
    // We:
    //   1) Hide every mesh under crimson's rig so the helm/body don't
    //      occlude the lens (animations keep ticking; only visibility flips).
    //   2) Clone crimson's sword mesh into a Three.Object3D parented to
    //      `camera` so it travels with the view (and ignores the world rig
    //      pose) — classic FPS weapon-viewmodel pattern.
    // State is intentionally module-scoped (not on the director) because
    // it ties together the camera and the loaded GLB, both of which live
    // at this scope.
    let fpSwordClone = null;
    let fpPendingAttach = false; // retry flag for boot-restore-before-load

    function setCrimsonSelfVisible(visible) {
      // TDZ guard: `combatants` is a `const` declared further down. If this
      // runs during the boot-restore path (saved viewMode === 'fp') BEFORE
      // the const initializer executes, plain access throws a TDZ
      // ReferenceError that kills the whole module. `typeof` does NOT
      // exempt TDZ either — so we have to try/catch the read itself and
      // defer the visibility flip until the crimson loader can re-apply it.
      let root = null;
      try { root = combatants?.crimson?.root; } catch (e) { /* TDZ — combatants not yet declared */ }
      if (!root) { fpPendingAttach = true; return; }
      root.traverse((obj) => {
        if (obj.isMesh) obj.visible = visible;
      });
    }

    function attachFpSword() {
      if (fpSwordClone) return; // already attached
      // TDZ guard mirrors setCrimsonSelfVisible — see comment there.
      let root = null;
      try { root = combatants?.crimson?.root; } catch (e) { /* TDZ — combatants not yet declared */ }
      if (!root) {
        // crimson.glb hasn't finished loading yet (boot restore path).
        // Re-arm a single deferred attempt; once the GLB resolves we'll
        // pick it up. Idempotent — multiple flag flips collapse to one
        // pending retry chain.
        if (fpPendingAttach) return;
        fpPendingAttach = true;
        const tryLater = () => {
          if (!fpPendingAttach) return; // user left FP before load finished
          if (!combatants.crimson?.root) {
            setTimeout(tryLater, 150);
            return;
          }
          fpPendingAttach = false;
          // Re-apply both sides (visibility + sword) now that the rig exists.
          setCrimsonSelfVisible(false);
          attachFpSword();
        };
        setTimeout(tryLater, 150);
        return;
      }
      // Find the first sword mesh by name (case-insensitive substring match).
      let swordSrc = null;
      root.traverse((o) => {
        if (!swordSrc && o.isMesh && /sword/i.test(o.name)) swordSrc = o;
      });
      if (!swordSrc) {
        console.warn('[fp] no Sword mesh found in crimson rig');
        return;
      }
      const clone = swordSrc.clone();
      // Reset to a camera-local rest pose (right-hand grip, blade out & up).
      clone.position.set(0.3, -0.35, -0.7);
      clone.rotation.set(-Math.PI / 6, -Math.PI / 8, -Math.PI / 4);
      clone.scale.set(1.0, 1.0, 1.0);
      clone.visible = true;
      // Suppress self-shadowing of the world by the viewmodel.
      clone.castShadow = false;
      clone.receiveShadow = false;
      // Render late so the blade isn't clipped by world geometry behind it.
      // Keep depthTest=true (default) — turning it off causes the blade to
      // punch through HUD/overlays.
      clone.renderOrder = 9999;
      camera.add(clone);
      // Three.js only renders Object3D children if their parent chain
      // ultimately reaches `scene`. The camera is typically not added
      // (it just gets read by the renderer), so ensure it is now.
      if (!camera.parent) scene.add(camera);
      fpSwordClone = clone;
    }

    function detachFpSword() {
      // Cancel any pending boot-restore retry — user has left FP.
      fpPendingAttach = false;
      if (!fpSwordClone) return;
      camera.remove(fpSwordClone);
      try { fpSwordClone.geometry?.dispose?.(); } catch (e) {}
      try { fpSwordClone.material?.dispose?.(); } catch (e) {}
      fpSwordClone = null;
    }

    // Cycle order: A → B → A → C → A → D (loops back to A).
    const cameraDirector = new CameraDirector(camera, controls, [
      CINEMA_SHOTS.SIDE_WIDE,
      CINEMA_SHOTS.CLOSE_CRIMSON,
      CINEMA_SHOTS.SIDE_WIDE,
      CINEMA_SHOTS.CLOSE_AZURE,
      CINEMA_SHOTS.SIDE_WIDE,
      CINEMA_SHOTS.HIGH_WIDE,
    ]);
    // Start in cinema mode → orbit input gated off.
    controls.enabled = false;

    // Manual-takeover: any pointer-down on the canvas drops cinema and
    // hands control to OrbitControls. The 🎥 button re-arms it. We bind
    // to the renderer canvas (not window) so HUD clicks don't trigger.
    // viewMode is kept in sync: dropping to orbit implies 'manual'.

    // ── syncViewButton ─────────────────────────────────────────────
    // Single source of truth: derives label from cameraDirector.viewMode
    // and writes to localStorage. Called from all four sites that can
    // change viewMode (pointerdown, cinema click, view-toggle click, boot).
    const VIEW_LABELS = { cinematic: '👁 VIEW: 3rd', fp: '👁 VIEW: FP', manual: '👁 VIEW: MANUAL' };
    function syncViewButton() {
      const vBtn = document.getElementById('view-toggle');
      if (!vBtn) return;
      vBtn.textContent = VIEW_LABELS[cameraDirector.viewMode] || '👁 VIEW: 3rd';
      try { localStorage.setItem('lkb3d_viewmode', cameraDirector.viewMode); } catch(e) {}
    }

    renderer.domElement.addEventListener('pointerdown', () => {
      // FP mode: a canvas click means "aim" — grab pointer lock and
      // stay in FP. Do NOT drop to manual, which would tear down the
      // FP self-rig (helm/sword viewmodel) and dump us into orbit.
      if (cameraDirector.viewMode === 'fp') {
        try { renderer.domElement.requestPointerLock(); } catch (e) {}
        return;
      }
      if (cameraDirector.active) {
        cameraDirector.setViewMode('manual');
        const btn = document.getElementById('cinema-toggle');
        if (btn) {
          btn.textContent = '🎥 CYCLE: OFF';
          btn.classList.add('off');
        }
        syncViewButton();
      }
    });

    // ── FP mouselook ────────────────────────────────────────────────
    // Pointer Lock + per-frame YXZ Euler aim. The CameraDirector owns
    // (fpYaw, fpPitch); we mutate them here from movementX/Y while the
    // pointer is locked, and animate() applies them via
    // camera.rotation.set(fpPitch, fpYaw, 0). YXZ order means yaw is
    // applied first (around world Y), then pitch (around the resulting
    // local X) — the standard FPS no-roll rig.
    //
    // Sensitivity: 0.0022 rad/px ≈ 0.126°/px — comfortable for both
    // trackpads and gaming mice without further tuning.
    // Pitch clamp keeps us just shy of straight up/down so the YXZ
    // gimbal never degenerates (and the helm-cam never flips).
    const FP_MOUSE_SENS = 0.0022;
    const FP_PITCH_MIN  = -Math.PI / 2 + 0.05;
    const FP_PITCH_MAX  =  Math.PI / 2 - 0.05;
    const fpLockHint = document.getElementById('fp-lock-hint');

    function refreshFpLockHint() {
      if (!fpLockHint) return;
      // Hint visible iff (FP mode && pointer not locked).
      const show = cameraDirector.viewMode === 'fp' && !window._mouseLocked;
      fpLockHint.classList.toggle('visible', show);
    }

    document.addEventListener('pointerlockchange', () => {
      window._mouseLocked = (document.pointerLockElement === renderer.domElement);
      refreshFpLockHint();
    });

    document.addEventListener('mousemove', (e) => {
      if (!window._mouseLocked) return;
      if (cameraDirector.viewMode !== 'fp') return;
      cameraDirector.fpYaw   -= e.movementX * FP_MOUSE_SENS;
      cameraDirector.fpPitch -= e.movementY * FP_MOUSE_SENS;
      if (cameraDirector.fpPitch < FP_PITCH_MIN) cameraDirector.fpPitch = FP_PITCH_MIN;
      if (cameraDirector.fpPitch > FP_PITCH_MAX) cameraDirector.fpPitch = FP_PITCH_MAX;
    });

    // Hint also needs to react to view-mode changes (button click,
    // boot restore, programmatic window.setViewMode). Wrap
    // cameraDirector.setViewMode so every viewMode mutation site
    // (including the boot-restore replay that already fired above)
    // refreshes the hint without us having to thread the call through
    // each handler.
    const _origSetViewMode = cameraDirector.setViewMode.bind(cameraDirector);
    cameraDirector.setViewMode = function (mode) {
      _origSetViewMode(mode);
      refreshFpLockHint();
    };
    refreshFpLockHint();

    // 🎥 toggle button — flips cinema on/off. When turning ON, we also
    // disable orbit input; when OFF, we re-enable it so the user can
    // drag freely (consistent with the pointer-down path above).
    // Routes through setViewMode so viewMode and active stay aligned.
    const cinemaBtn = document.getElementById('cinema-toggle');
    if (cinemaBtn) {
      cinemaBtn.addEventListener('click', () => {
        const next = !cameraDirector.active;
        cameraDirector.setViewMode(next ? 'cinematic' : 'manual');
        cinemaBtn.textContent = next ? '🎥 CYCLE: ON' : '🎥 CYCLE: OFF';
        cinemaBtn.classList.toggle('off', !next);
        syncViewButton();
      });
    }

    // 👁 VIEW mode toggle — cycles 3rd / FP / MANUAL.
    // Reading the current mode from cameraDirector (single source of truth)
    // prevents desync if viewMode was changed via any other path.
    const VIEW_CYCLE = ['cinematic', 'fp', 'manual'];
    const viewBtn = document.getElementById('view-toggle');
    if (viewBtn) {
      viewBtn.addEventListener('click', () => {
        const idx = VIEW_CYCLE.indexOf(cameraDirector.viewMode);
        const next = VIEW_CYCLE[(idx + 1) % VIEW_CYCLE.length];
        cameraDirector.setViewMode(next);
        // Keep cinema button label consistent when switching to/from cinematic.
        if (cinemaBtn) {
          cinemaBtn.textContent = cameraDirector.active ? '🎥 CYCLE: ON' : '🎥 CYCLE: OFF';
          cinemaBtn.classList.toggle('off', !cameraDirector.active);
        }
        syncViewButton();
      });
    }

    // Boot restore — replay last saved viewMode (if valid) so the user
    // continues where they left off. Unconditionally sync the button label
    // because setViewMode early-returns when mode === viewMode (no DOM side
    // effect), so we call syncViewButton() regardless of whether a restore
    // actually changed state.
    {
      const saved = (() => { try { return localStorage.getItem('lkb3d_viewmode'); } catch(e) { return null; } })();
      if (saved && VIEW_CYCLE.includes(saved)) {
        cameraDirector.setViewMode(saved);
        if (cinemaBtn) {
          cinemaBtn.textContent = cameraDirector.active ? '🎥 CYCLE: ON' : '🎥 CYCLE: OFF';
          cinemaBtn.classList.toggle('off', !cameraDirector.active);
        }
      }
      syncViewButton(); // always set label (handles both restore and cinematic default)
    }

    // Public callable entry point — used by console / future HUD button /
    // tests to flip into FP mode without depending on UI state. Also
    // exposes the director so external tooling can inspect viewMode.
    window.setViewMode = (mode) => { cameraDirector.setViewMode(mode); syncViewButton(); };
    window.cameraDirector = cameraDirector;

    /* ── post-processing chain (EffectComposer) ────────────────── */
    // Render → SSAO → Bloom → SMAA → Output
    const initialW = host.clientWidth  || window.innerWidth;
    const initialH = host.clientHeight || window.innerHeight;
    const pixelRatio = renderer.getPixelRatio();

    const composer = new EffectComposer(renderer);
    composer.setPixelRatio(pixelRatio);
    composer.setSize(initialW, initialH);

    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    // SSAO — contact occlusion for grounded look. Specs don't matter, keep ON.
    const ssaoPass = new SSAOPass(scene, camera, initialW, initialH);
    ssaoPass.kernelRadius = 5;
    ssaoPass.minDistance  = 0.003;
    ssaoPass.maxDistance  = 0.1;
    composer.addPass(ssaoPass);

    // OutlinePass — amber rim outline on knights for silhouette punch.
    // selectedObjects is populated after each knight GLB loads (see loaders below).
    const outlinePass = new OutlinePass(
      new THREE.Vector2(initialW, initialH),
      scene,
      camera
    );
    outlinePass.edgeStrength    = 6.0;
    outlinePass.edgeGlow        = 0.55;
    outlinePass.edgeThickness   = 2.6;
    outlinePass.pulsePeriod     = 0;             // no pulse
    outlinePass.visibleEdgeColor.set(0xd8a45a); // amber (PAL.skyAmber from 2D game)
    outlinePass.hiddenEdgeColor.set(0x6a4e2a);  // warmer dark amber for occluded edges
    outlinePass.selectedObjects = [];
    composer.addPass(outlinePass);

    // BokehPass — depth-of-field, focused on the knights (~7m from camera).
    // Mild aperture so knights stay crisp; only the far log + ground blur.
    const bokehPass = new BokehPass(scene, camera, {
      focus:    7.0,
      aperture: 0.0010,
      maxblur:  0.013,
      width:    initialW,
      height:   initialH,
    });
    composer.addPass(bokehPass);

    // Bloom — soft glow on highlights.
    // Iter 67: strength 0.55 → 0.45. The dusk HDRI provides its own glow;
    // over-bloom blurs sprite/edge detail.
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(initialW, initialH),
      0.55,  // strength (amplifies amber outline rim glow)
      0.6,   // radius
      0.78   // threshold
    );
    composer.addPass(bloomPass);

    // SMAA — sub-pixel anti-aliasing (operates in device pixels).
    const smaaPass = new SMAAPass(initialW * pixelRatio, initialH * pixelRatio);
    composer.addPass(smaaPass);

    // OutputPass — handles tone mapping + color space conversion at the end.
    const outputPass = new OutputPass();
    composer.addPass(outputPass);

    /* ── GLB loader ─────────────────────────────────────────────── */
    const loader = new GLTFLoader();
    let loaded = 0;
    const TOTAL = 3; // log + crimson + azure

    function onAllLoaded() {
      console.log('[lkb-3d] scene ready');
      const overlay = document.getElementById('loading');
      overlay.classList.add('fade-out');
      setTimeout(() => overlay.remove(), 600);
      // Initial ROUND 1 banner — fires once the loading overlay clears
      // (slight delay so the player actually sees it appear on top of
      // the lit scene, not under the fading LOADING screen).
      setTimeout(() => showRoundBanner(window.gameState.round || 1), 650);
    }

    function markLoaded() {
      loaded++;
      if (loaded >= TOTAL) onAllLoaded();
    }

    // helper: enable shadow casting/receiving on every mesh in a GLTF scene
    function applyShadows(gltfScene, cast = true, receive = false) {
      gltfScene.traverse(node => {
        if (node.isMesh) {
          node.castShadow    = cast;
          node.receiveShadow = receive;
        }
      });
    }

    /* ── AnimationMixer registry ───────────────────────────────── */
    // One mixer per animated GLB root. The render loop advances them all
    // via the shared Clock delta.
    const mixers = [];
    const animClock = new THREE.Clock();

    // ── KayKit clip names (from discovery) ───────────────────────
    const CLIP_NAMES = {
      IDLE:   '2H_Melee_Idle',
      BLOCK:  'Blocking',
      HIT:    'Hit_A',
    };

    // Attack variety pool — pick one uniformly at random each combat tick.
    const ATTACK_CLIPS = [
      '2H_Melee_Attack_Chop',
      '2H_Melee_Attack_Slice',
      '2H_Melee_Attack_Stab',
      '2H_Melee_Attack_Spin',
    ];
    function pickAttackClip() {
      return ATTACK_CLIPS[Math.floor(Math.random() * ATTACK_CLIPS.length)];
    }

    // Combatant registry — populated as each knight GLB loads. Each
    // entry holds the mixer, the clips map, current action ref, state
    // string, and a label. Used by combatTick() to drive the state
    // machine across both knights.
    // Shape: { crimson: combatant, azure: combatant }
    const combatants = {};

    // Find a clip by exact-name first, falling back to a case-insensitive
    // substring search. Tolerant — returns null if no match.
    function findClip(clips, wanted) {
      if (!clips || clips.length === 0 || !wanted) return null;
      const exact = clips.find(c => c.name === wanted);
      if (exact) return exact;
      const lower = wanted.toLowerCase();
      return clips.find(c => c.name && c.name.toLowerCase().includes(lower)) || null;
    }

    // playClip — fade from the combatant's current action to a new one
    // by clip name. Returns the new action (or null if the clip is
    // missing). Options:
    //   fadeIn (sec)   — crossfade duration (default 0.2)
    //   loop  (bool)   — true → LoopRepeat, false → LoopOnce + clampWhenFinished
    //   weight (0..1)  — action weight (default 1.0)
    //   timeScale (n)  — playback rate (default 1.0)
    function playClip(combatant, clipName, opts = {}) {
      if (!combatant || !combatant.mixer) return null;
      const { fadeIn = 0.2, loop = false, weight = 1.0, timeScale = 1.0 } = opts;
      const clip = findClip(combatant.clips, clipName);
      if (!clip) {
        console.warn(`[lkb-3d] ${combatant.label}: clip "${clipName}" not found`);
        return null;
      }
      const next = combatant.mixer.clipAction(clip);
      next.reset();
      next.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce, loop ? Infinity : 1);
      next.clampWhenFinished = !loop;
      next.setEffectiveWeight(weight);
      next.timeScale = timeScale;
      next.enabled = true;

      const prev = combatant.current;
      if (prev && prev !== next) {
        next.crossFadeFrom(prev, fadeIn, true);
      }
      next.play();
      combatant.current = next;
      combatant.currentClipName = clipName;
      combatant.currentDuration = clip.duration;
      return next;
    }

    // Register a combatant — build the mixer, cache the clips list, and
    // start it in idle. Tolerant: if the GLB has no animations we log and
    // return without registering (so combatTick() will just skip it).
    function setupCombatant(gltf, label) {
      if (!gltf.animations || gltf.animations.length === 0) {
        console.log(`[lkb-3d] ${label}: no animations baked into GLB`);
        return null;
      }
      const mixer = new THREE.AnimationMixer(gltf.scene);
      const combatant = {
        label,
        mixer,
        root: gltf.scene,
        clips: gltf.animations,
        current: null,
        currentClipName: null,
        currentDuration: 0,
        state: 'idle',
        impactScheduled: false,
      };
      // Start in idle (looping). Skip crossfade since there's no prev.
      playClip(combatant, CLIP_NAMES.IDLE, { fadeIn: 0, loop: true });
      combatant.state = 'idle';
      mixers.push(mixer);
      combatants[label] = combatant;
      console.log(`[lkb-3d] ${label}: combatant ready (${gltf.animations.length} clips)`);
      return combatant;
    }

    // Backwards-compatible shim — the log GLB load still calls
    // setupMixerFor(). For non-knight GLBs (log) we just register a
    // looping mixer on the first clip (if any). For knights we'd use
    // setupCombatant() directly, but this keeps the call sites tidy.
    function setupMixerFor(gltf, label) {
      if (!gltf.animations || gltf.animations.length === 0) {
        console.log(`[lkb-3d] ${label}: no animations baked into GLB`);
        return;
      }
      // For knights, route to the combat-state setup.
      if (label === 'crimson' || label === 'azure') {
        setupCombatant(gltf, label);
        return;
      }
      // Generic fallback: play the first clip on loop (preserves log
      // behaviour — usually no anims, but defensive if a future bake
      // adds idle motion).
      const mixer = new THREE.AnimationMixer(gltf.scene);
      const clip = gltf.animations[0];
      if (clip) {
        const action = mixer.clipAction(clip);
        action.setLoop(THREE.LoopRepeat, Infinity);
        action.play();
        console.log(`[lkb-3d] ${label}: playing generic clip "${clip.name}"`);
      }
      mixers.push(mixer);
    }

    // ── Impact-burst FX system ───────────────────────────────────
    // Spawns short-lived additive amber particle bursts at hit points,
    // jitters the camera for a tactile shake, and pulses bloom for a
    // single-frame flash. Composed so the combat loop just calls
    // window.triggerImpact(hitPos) and the render loop ticks update().
    class ImpactSystem {
      constructor(scene, camera, bloomPass) {
        this.scene       = scene;
        this.camera      = camera;
        this.bloomPass   = bloomPass;
        this.bursts      = []; // active particle bursts
        this.shake       = null; // { remaining, duration, basePos }
        this.flash       = null; // { remaining, duration, baseStrength }
        this.cameraPunch = null; // { phase, elapsed, target, zoomDir }
        this.punchOffset = new THREE.Vector3(); // additive offset applied after controls.update()
        this._baseBloomStrength = bloomPass ? bloomPass.strength : 0;
      }

      // Spawn a single burst at hitPos. Random direction + speed per
      // particle, gravity per frame, 0.6s lifetime, additive amber.
      spawn(hitPos) {
        const COUNT = 60 + Math.floor(Math.random() * 41); // 60–100
        const LIFETIME = 0.6;

        const positions  = new Float32Array(COUNT * 3);
        const velocities = new Float32Array(COUNT * 3);
        for (let i = 0; i < COUNT; i++) {
          positions[i * 3 + 0] = hitPos.x;
          positions[i * 3 + 1] = hitPos.y;
          positions[i * 3 + 2] = hitPos.z;
          // Random unit vector × speed in [2.5, 5.0] m/s.
          const u = Math.random() * 2 - 1;
          const phi = Math.random() * Math.PI * 2;
          const s = Math.sqrt(1 - u * u);
          const speed = 2.5 + Math.random() * 2.5;
          velocities[i * 3 + 0] = s * Math.cos(phi) * speed;
          velocities[i * 3 + 1] = u * speed;
          velocities[i * 3 + 2] = s * Math.sin(phi) * speed;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const mat = new THREE.PointsMaterial({
          color:           0xffd089, // amber
          size:            0.08,
          sizeAttenuation: true,
          transparent:     true,
          opacity:         1.0,
          depthWrite:      false,
          blending:        THREE.AdditiveBlending,
        });

        const points = new THREE.Points(geo, mat);
        points.frustumCulled = false;
        this.scene.add(points);

        this.bursts.push({
          points,
          velocities,
          age:       0,
          lifetime:  LIFETIME,
          gravity:  -3.0,
        });

        // Camera shake — 0.18s decaying jitter. Round-13 drift fix:
        // OrbitControls is temporarily DISABLED for the duration of the
        // shake so additive jitter cannot fight damping or drift the
        // camera target. We snapshot the camera position at spawn,
        // apply random offsets from that anchor each frame, then
        // restore the original position and re-enable controls on
        // expiry.
        this.originalCamPos = this.camera.position.clone();
        controls.enabled = false;
        this.shake = {
          remaining: 0.18,
          duration:  0.18,
          amplitude: 0.06,
        };

        // Bloom flash — multiply strength by 2.0 for 0.15s, then lerp back.
        if (this.bloomPass) {
          this.flash = {
            remaining:    0.15,
            duration:     0.15,
            baseStrength: this._baseBloomStrength,
            peakStrength: this._baseBloomStrength * 2.0,
          };
          this.bloomPass.strength = this.flash.peakStrength;
        }

        // Camera punch — zoom 15% closer to target over 0.12s, hold 0.05s,
        // lerp back over 0.20s. Total ~0.37s. Applied as additive punchOffset
        // after controls.update() so OrbitControls damping is not disrupted.
        // zoomDir is the unit vector from camera toward hitPos — the offset
        // is computed fresh each frame from the *current* camera.position so
        // the direction stays meaningful even if the user drags mid-punch.
        this.cameraPunch = {
          phase:   'in',    // 'in' | 'hold' | 'out'
          elapsed: 0,
          target:  hitPos.clone ? hitPos.clone() : new THREE.Vector3(hitPos.x, hitPos.y, hitPos.z),
          inDur:   0.12,
          holdDur: 0.05,
          outDur:  0.20,
          factor:  0.15,    // 15% closer
        };
        this.punchOffset.set(0, 0, 0);
      }

      update(delta) {
        // ── advance particle bursts ──────────────────────────────
        for (let i = this.bursts.length - 1; i >= 0; i--) {
          const b = this.bursts[i];
          b.age += delta;
          if (b.age >= b.lifetime) {
            this.scene.remove(b.points);
            b.points.geometry.dispose();
            b.points.material.dispose();
            this.bursts.splice(i, 1);
            continue;
          }
          const pos = b.points.geometry.attributes.position;
          const arr = pos.array;
          const n = arr.length / 3;
          for (let p = 0; p < n; p++) {
            // Apply gravity to vy, then integrate position.
            b.velocities[p * 3 + 1] += b.gravity * delta;
            arr[p * 3 + 0] += b.velocities[p * 3 + 0] * delta;
            arr[p * 3 + 1] += b.velocities[p * 3 + 1] * delta;
            arr[p * 3 + 2] += b.velocities[p * 3 + 2] * delta;
          }
          pos.needsUpdate = true;
          // Fade opacity linearly over lifetime.
          b.points.material.opacity = 1.0 - (b.age / b.lifetime);
        }

        // ── camera shake (linear decay, anchored to snapshot) ────
        // Round-13 drift fix: OrbitControls was disabled in spawn();
        // we anchor every offset to the snapshot taken at spawn time
        // (this.originalCamPos) rather than mutating camera.position
        // additively. On expiry we restore the snapshot exactly and
        // re-enable controls so damping continues from a clean state.
        if (this.shake) {
          this.shake.remaining -= delta;
          if (this.shake.remaining <= 0) {
            // Restore exact pre-shake position and hand control back.
            if (this.originalCamPos) {
              this.camera.position.copy(this.originalCamPos);
            }
            controls.enabled = true;
            this.originalCamPos = null;
            this.shake = null;
          } else {
            const alpha = this.shake.remaining / this.shake.duration; // 1 → 0
            const amp = this.shake.amplitude * alpha;
            // Random unit vector × amp, applied from snapshot anchor.
            const u = Math.random() * 2 - 1;
            const phi = Math.random() * Math.PI * 2;
            const s = Math.sqrt(1 - u * u);
            this.camera.position.copy(this.originalCamPos);
            this.camera.position.x += s * Math.cos(phi) * amp;
            this.camera.position.y += u * amp;
            this.camera.position.z += s * Math.sin(phi) * amp;
          }
        }

        // ── bloom flash (lerp back to base strength) ─────────────
        if (this.flash && this.bloomPass) {
          this.flash.remaining -= delta;
          if (this.flash.remaining <= 0) {
            this.bloomPass.strength = this.flash.baseStrength;
            this.flash = null;
          } else {
            const t = this.flash.remaining / this.flash.duration; // 1 → 0
            // peak at t=1, base at t=0 → linear lerp.
            this.bloomPass.strength =
              this.flash.baseStrength +
              (this.flash.peakStrength - this.flash.baseStrength) * t;
          }
        }

        // ── camera punch (zoom-in burst, additive offset) ─────────
        // punchOffset is reset to zero here so stale values don't leak if
        // the punch finishes or was never active.
        this.punchOffset.set(0, 0, 0);
        if (this.cameraPunch) {
          const cp = this.cameraPunch;
          cp.elapsed += delta;

          // Direction from current camera toward target — recomputed each
          // frame so it stays correct after OrbitControls damping moves cam.
          const dir = new THREE.Vector3()
            .subVectors(cp.target, this.camera.position)
            .normalize();

          // Maximum offset magnitude = 15% of current distance to target.
          const dist = this.camera.position.distanceTo(cp.target);
          const maxOffset = dist * cp.factor;

          let alpha = 0; // normalised [0..1] zoom amount this frame

          if (cp.phase === 'in') {
            const t = Math.min(cp.elapsed / cp.inDur, 1.0);
            alpha = t; // lerp in
            if (cp.elapsed >= cp.inDur) {
              cp.phase   = 'hold';
              cp.elapsed = 0;
            }
          } else if (cp.phase === 'hold') {
            alpha = 1.0; // full zoom during hold
            if (cp.elapsed >= cp.holdDur) {
              cp.phase   = 'out';
              cp.elapsed = 0;
            }
          } else if (cp.phase === 'out') {
            const t = Math.min(cp.elapsed / cp.outDur, 1.0);
            alpha = 1.0 - t; // lerp back out
            if (cp.elapsed >= cp.outDur) {
              this.cameraPunch = null;
              alpha = 0;
            }
          }

          // NEUTRALIZED (round-13 regression fix): keep the state machine
          // ticking so existing triggers still drain cleanly, but never write
          // a non-zero offset. The caller in animate() also no longer applies
          // punchOffset. Reference computation kept for future re-enable:
          //   this.punchOffset.copy(dir).multiplyScalar(maxOffset * alpha);
          void dir; void maxOffset; void alpha;
          this.punchOffset.set(0, 0, 0);
        }

        // The caller (animate) no longer applies punchOffset; the additive
        // camera mutation is disabled to prevent the round-13 drift bug.
      }
    }

    const impactSystem = new ImpactSystem(scene, camera, bloomPass);

    /* ── game state, HUD bars, death & reset ───────────────────────
       window.gameState holds per-knight HP/SP. updateGaugeDOM() pushes
       the values into the bar widths in the top HUD. window.applyDamage
       decrements HP (capped at 0) and triggers Death_A + a 5s reset
       cycle when a knight falls. The combat tick (below) calls into
       applyDamage and bumps SP on every contact frame. */
    window.gameState = {
      crimson: { hp: 100, sp: 0, dead: false, wins: 0 },
      azure:   { hp: 100, sp: 0, dead: false, wins: 0 },
      // Round counter — starts at 1 on initial load, incremented by
      // resetMatch() on each new round, and forced back to 1 by
      // resetFullMatch() after a MATCH WON.
      round: 1,
    };
    const HP_MAX = 100;
    const SP_MAX = 100;
    const WINS_MAX = 3;
    const koOverlay = document.getElementById('ko-overlay');
    const matchWonOverlay = document.getElementById('match-won-overlay');
    const mwWinnerText   = document.getElementById('mw-winner-text');
    const hpFill = {
      crimson: document.getElementById('hp-fill-crimson'),
      azure:   document.getElementById('hp-fill-azure'),
    };
    const spFill = {
      crimson: document.getElementById('sp-fill-crimson'),
      azure:   document.getElementById('sp-fill-azure'),
    };
    const hpNum = {
      crimson: document.getElementById('hp-num-crimson'),
      azure:   document.getElementById('hp-num-azure'),
    };
    const winPips = {
      crimson: document.querySelectorAll('#pips-crimson .win-pip'),
      azure:   document.querySelectorAll('#pips-azure   .win-pip'),
    };

    function updateGaugeDOM() {
      for (const id of ['crimson', 'azure']) {
        const s = window.gameState[id];
        if (hpFill[id]) hpFill[id].style.width = (s.hp / HP_MAX * 100) + '%';
        if (spFill[id]) spFill[id].style.width = (s.sp / SP_MAX * 100) + '%';
        // HP numeric readout
        if (hpNum[id]) hpNum[id].textContent = Math.ceil(s.hp) + '/' + HP_MAX;
        // Win pips — fill each pip up to wins count
        if (winPips[id]) {
          winPips[id].forEach((pip, i) => {
            pip.classList.toggle('filled', i < s.wins);
          });
        }
      }
    }
    updateGaugeDOM();

    // ── damage floater — spawns a transient "-N" DOM span above the
    // defender's head, positioned by projecting the combatant root
    // through the active camera. Span removes itself after the CSS
    // animation (0.6s) plus a small safety margin. Skipped silently if
    // the defender root isn't ready yet (e.g. mid-load).
    const _DMG_FLOAT_LIFE_MS = 650;
    function showDamageFloater(defenderId, amount) {
      const c = combatants[defenderId];
      const root = c && c.root;
      if (!root) return;
      // Project the knight's chest area (≈ root + 1.6m) into screen px.
      const ndc = new THREE.Vector3();
      ndc.copy(root.position).add(new THREE.Vector3(0, 1.6, 0)).project(camera);
      // Bail if the point is behind the camera (z>1).
      if (ndc.z > 1) return;
      const rect = renderer.domElement.getBoundingClientRect();
      const sx = (ndc.x * 0.5 + 0.5) * rect.width  + rect.left;
      const sy = (-ndc.y * 0.5 + 0.5) * rect.height + rect.top - 100; // -100px above head
      const el = document.createElement('span');
      el.className = 'dmg-floater';
      el.textContent = '-' + Math.ceil(amount);
      el.style.left = sx + 'px';
      el.style.top  = sy + 'px';
      document.body.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, _DMG_FLOAT_LIFE_MS);
    }

    // ── ROUND N banner — clears any prior banner child, then injects
    // a fresh .rb-text span so the CSS animation re-runs from frame 0.
    // The element is removed after the 1.5s show+fade completes.
    const _ROUND_BANNER_LIFE_MS = 1550;
    const roundBannerHost = document.getElementById('round-banner');
    let _roundBannerTimer = null;
    function showRoundBanner(n) {
      if (!roundBannerHost) return;
      // Clear any in-flight banner so back-to-back calls don't stack.
      if (_roundBannerTimer) { clearTimeout(_roundBannerTimer); _roundBannerTimer = null; }
      while (roundBannerHost.firstChild) roundBannerHost.removeChild(roundBannerHost.firstChild);
      const span = document.createElement('div');
      span.className = 'rb-text';
      span.textContent = 'ROUND ' + n;
      roundBannerHost.appendChild(span);
      // ── SFX wiring: FIGHT chord on round announce. Skipped on the
      //    very first showing if audio isn't unlocked yet (autoplay).
      try { if (window.sfxFight) window.sfxFight(); } catch (e) {}
      _roundBannerTimer = setTimeout(() => {
        while (roundBannerHost.firstChild) roundBannerHost.removeChild(roundBannerHost.firstChild);
        _roundBannerTimer = null;
      }, _ROUND_BANNER_LIFE_MS);
    }

    // Reset cycle — called 5s after a KO. Restores both knights to
    // full HP/SP, hides the overlay, and forces both back to idle so
    // the next combat tick has clean state to drive.
    // NOTE: mutates fields in place so `wins` is preserved across rounds.
    let resetTimerHandle = null;
    function resetMatch() {
      for (const id of ['crimson', 'azure']) {
        const s = window.gameState[id];
        s.hp   = HP_MAX;
        s.sp   = 0;
        s.dead = false;
        // wins is intentionally NOT reset here — persists until match end
      }
      updateGaugeDOM();
      if (koOverlay) koOverlay.classList.remove('visible');
      if (matchWonOverlay) matchWonOverlay.classList.remove('visible');
      for (const id of ['crimson', 'azure']) {
        const c = combatants[id];
        if (c) {
          playClip(c, CLIP_NAMES.IDLE, { fadeIn: 0.3, loop: true });
          c.state = 'idle';
        }
      }
      // Advance the round counter and announce the new round. Initial
      // load is handled separately in onAllLoaded() with ROUND 1.
      window.gameState.round = (window.gameState.round || 1) + 1;
      showRoundBanner(window.gameState.round);
      console.log('[lkb-3d] match reset — ROUND ' + window.gameState.round);
    }

    // Full match reset — zeroes wins on both sides, then does normal round reset.
    function resetFullMatch() {
      window.gameState.crimson.wins = 0;
      window.gameState.azure.wins   = 0;
      // Force round back to 1: resetMatch() below will pre-increment to 1.
      window.gameState.round = 0;
      resetMatch();
      console.log('[lkb-3d] full match reset (wins + round cleared)');
    }

    // triggerDeath — fires Death_A on the dead knight, shows K.O.,
    // increments the winner's win count, and schedules the reset.
    // Timing: 4s Death_A hold, then winner plays Cheer for 2s (overlap),
    // total 6s before round/match reset. Idempotent per defender thanks
    // to the gameState.dead flag.
    function triggerDeath(defenderId) {
      const c = combatants[defenderId];
      if (!c) return;
      window.gameState[defenderId].dead = true;
      c.state = 'dead';
      playClip(c, 'Death_A', { fadeIn: 0.15, loop: false });
      // ── SFX wiring: KO fall thud + brass horn fanfare. Sequenced so
      //    the fall lands first and the horn punctuates the silence.
      try { if (window.sfxFall) window.sfxFall(); } catch (e) {}
      try { if (window.sfxHorn) setTimeout(function () { window.sfxHorn(); }, 400); } catch (e) {}

      // Increment winner's win count
      const winnerId = defenderId === 'crimson' ? 'azure' : 'crimson';
      window.gameState[winnerId].wins += 1;
      updateGaugeDOM(); // refresh pips immediately

      const winnerWins = window.gameState[winnerId].wins;
      console.log(`[lkb-3d] ${defenderId} K.O. — ${winnerId} now has ${winnerWins} win(s)`);

      if (resetTimerHandle) clearTimeout(resetTimerHandle);

      // Winner plays Cheer after 4s (Death_A pose held), lasting 2s before reset (6s total).
      const cheerHandle = setTimeout(() => {
        const winner = combatants[winnerId];
        if (winner && !window.gameState[winnerId].dead) {
          winner.state = 'cheer';
          playClip(winner, 'Cheer', { fadeIn: 0.2, loop: false, weight: 1.0 });
          console.log(`[lkb-3d] ${winnerId} Cheer`);
        }
      }, 4000);

      if (winnerWins >= WINS_MAX) {
        // MATCH WON — show match-won overlay, then do a full reset (clears wins)
        if (koOverlay) koOverlay.classList.remove('visible');
        if (matchWonOverlay) {
          if (mwWinnerText) mwWinnerText.textContent = winnerId.toUpperCase() + ' WINS THE MATCH';
          matchWonOverlay.classList.add('visible');
        }
        console.log(`[lkb-3d] MATCH WON by ${winnerId}`);
        resetTimerHandle = setTimeout(resetFullMatch, 6000);
      } else {
        // Round over — normal KO overlay, then round reset (wins preserved)
        if (koOverlay) koOverlay.classList.add('visible');
        resetTimerHandle = setTimeout(resetMatch, 6000);
      }
      // Store cheer handle so resetMatch can cancel it if needed (defensive).
      window._pendingCheerHandle = cheerHandle;
    }

    // applyDamage — single source of truth for HP changes. Skips if
    // the defender is already down so a late-arriving impact doesn't
    // re-fire Death_A on the same knight.
    window.applyDamage = function applyDamage(defenderId, amount) {
      const s = window.gameState[defenderId];
      if (!s || s.dead) return;
      // Guard absorbs the hit — chip damage only (20%) plus a clang sfx
      // so the player feels the contact even though most of it is blocked.
      const defenderCombatant = combatants[defenderId];
      if (defenderCombatant && defenderCombatant.state === 'guard' && amount > 0) {
        amount = Math.max(1, Math.floor(amount * 0.2));
        try { if (window.sfxClang) window.sfxClang(); } catch (e) {}
      }
      s.hp = Math.max(0, s.hp - amount);
      updateGaugeDOM();
      // Spawn a floating "-N" above the defender's head. Best-effort —
      // bails internally if the combatant root isn't ready yet.
      showDamageFloater(defenderId, amount);
      if (s.hp <= 0) triggerDeath(defenderId);
    };

    // gainSP — small helper for the SP +5 on every combat tick. Capped
    // at SP_MAX; no side effects beyond the DOM update.
    function gainSP(id, amount) {
      const s = window.gameState[id];
      if (!s) return;
      s.sp = Math.min(SP_MAX, s.sp + amount);
      updateGaugeDOM();
    }

    // Real triggerImpact — replaces the earlier stub. Accepts either a
    // THREE.Vector3 (preferred — world-space hit position) or the legacy
    // meta object from earlier phases (in which case we default to the
    // midpoint of the two knights at (0, 1.3, 0)). This is the single
    // entry point the combat loop calls on each contact frame.
    window.triggerImpact = function triggerImpact(hitPos) {
      let pos;
      if (hitPos && typeof hitPos.x === 'number' && typeof hitPos.y === 'number' && typeof hitPos.z === 'number') {
        pos = hitPos;
      } else {
        // Legacy meta object or undefined — use mid-knight default.
        pos = new THREE.Vector3(0, 1.3, 0);
      }
      try {
        impactSystem.spawn(pos);
      } catch (err) {
        console.warn('[lkb-3d] impactSystem.spawn threw', err);
      }
      // ── SFX wiring: heavy hit on every impact frame. Guarded behind
      //    feature-detect so an audio init failure can't break combat.
      try { if (window.sfxHit) window.sfxHit(); } catch (e) {}
    };

    // combatTick — runs every 3s. Picks a random attacker, fires the
    // ATTACK clip on them and the BLOCK clip on the defender, schedules
    // the impact at ~70% of the attack duration, and fades both back to
    // IDLE just after the attack finishes (~105%).
    let combatTickCount = 0;
    function combatTick() {
      // In FP mode, the player owns crimson — CPU only auto-attacks on
      // azure. Outside FP mode, keep the original 50/50 random attacker.
      let attackerLabel;
      if (cameraDirector && cameraDirector.viewMode === 'fp') {
        attackerLabel = 'azure';
      } else {
        attackerLabel = Math.random() < 0.5 ? 'crimson' : 'azure';
      }
      const defenderLabel = attackerLabel === 'crimson' ? 'azure' : 'crimson';
      const attacker = combatants[attackerLabel];
      const defender = combatants[defenderLabel];
      if (!attacker || !defender) return; // not both loaded yet
      // Skip while a knight is dead — resetMatch() will clear the flag.
      if (window.gameState[attackerLabel].dead || window.gameState[defenderLabel].dead) return;

      combatTickCount++;
      console.log(`[lkb-3d] combatTick #${combatTickCount}: ${attackerLabel} → ${defenderLabel}`);

      // ── SFX wiring: swing whoosh on attack windup. The matching hit
      //    fires inside window.triggerImpact at ~70% of the swing.
      try { if (window.sfxSwing) window.sfxSwing(); } catch (e) {}

      // Wind up + attack — randomize attack clip each tick for variety.
      // State labels track the rough phase so future logic (HUD, sound
      // cues) can read combatant.state.
      attacker.state = 'attack';
      attacker.impactScheduled = false;
      const chosenAttack = pickAttackClip();
      const attackAction = playClip(attacker, chosenAttack, {
        fadeIn: 0.2,
        loop: false,
        weight: 1.0,
      });

      defender.state = 'guard';
      playClip(defender, CLIP_NAMES.BLOCK, {
        fadeIn: 0.2,
        loop: false,
        weight: 1.0,
      });

      // Duration → attack clip length (with safe fallback if missing).
      const dur = (attackAction && attacker.currentDuration) || 1.0;

      // Impact at ~70% through the swing.
      setTimeout(() => {
        if (attacker.state !== 'attack') return; // got interrupted
        attacker.impactScheduled = true;

        // Crossfade defender from BLOCK → Hit_A reaction (LoopOnce).
        if (defender && !window.gameState[defenderLabel].dead) {
          defender.state = 'hit';
          playClip(defender, CLIP_NAMES.HIT, { fadeIn: 0.1, loop: false, weight: 1.0 });
        }

        // Hit position: defender chest height for VFX / camera shake.
        const defenderRoot = defender && defender.root;
        const hitPos = defenderRoot
          ? defenderRoot.position.clone().add(new THREE.Vector3(0, 1.0, 0))
          : { x: 0, y: 1.0, z: 0 };

        try {
          window.triggerImpact(hitPos);
        } catch (err) {
          console.warn('[lkb-3d] triggerImpact threw', err);
        }
        // HUD wiring: damage the defender, +5 SP to both sides per
        // combat tick. applyDamage handles death + reset internally.
        try {
          window.applyDamage(defenderLabel, 8);
          gainSP(attackerLabel, 5);
          gainSP(defenderLabel, 5);
        } catch (err) {
          console.warn('[lkb-3d] HUD update threw', err);
        }
      }, dur * 0.70 * 1000);

      // Return both knights to idle just after the swing resolves.
      // Skip the idle restore for a knight that just died — Death_A
      // is a one-shot clampWhenFinished clip we want to hold.
      setTimeout(() => {
        const aDead = window.gameState[attackerLabel].dead;
        const dDead = window.gameState[defenderLabel].dead;
        if (combatants[attackerLabel] && !aDead) {
          playClip(combatants[attackerLabel], CLIP_NAMES.IDLE, { fadeIn: 0.25, loop: true });
          combatants[attackerLabel].state = 'idle';
        }
        if (combatants[defenderLabel] && !dDead) {
          playClip(combatants[defenderLabel], CLIP_NAMES.IDLE, { fadeIn: 0.25, loop: true });
          combatants[defenderLabel].state = 'idle';
        }
      }, dur * 1.05 * 1000);
    }

    // Boot the combat loop once both knights are ready. We poll on a
    // short interval rather than coupling into markLoaded() so this
    // stays decoupled from the GLB load flow.
    let combatLoopHandle = null;
    function maybeStartCombatLoop() {
      if (combatLoopHandle) return;
      if (!combatants.crimson || !combatants.azure) return;
      console.log('[lkb-3d] both knights ready — starting combat loop');
      // Kick off the first tick after a short beat so the idle pose
      // reads first; then run on a 3s cadence.
      setTimeout(combatTick, 1200);
      combatLoopHandle = setInterval(combatTick, 3000);
    }
    const combatBootWatcher = setInterval(() => {
      if (combatants.crimson && combatants.azure) {
        clearInterval(combatBootWatcher);
        maybeStartCombatLoop();
      }
    }, 200);

    // ── FP player input — Space=attack, E=guard ────────────────────
    // Only active when viewMode==='fp' AND the pointer is locked, so it
    // never collides with the title screen, menus, or 3rd-person cinema.
    // Player owns crimson; combatTick handles azure (CPU) auto-attack.
    const playerInput = { spacePressed: false, eHeld: false, lastSpaceTime: 0 };
    const PLAYER_ATTACK_COOLDOWN_MS = 250; // soft floor between repeated taps

    function fpInputActive() {
      return cameraDirector && cameraDirector.viewMode === 'fp' && window._mouseLocked;
    }

    // Player-driven attack on crimson. Mirrors the swing → impact → damage
    // sequence from combatTick, but lets the defender (azure) keep whatever
    // state they're in (idle / guard / attack) so we don't yank them out
    // of their own animation mid-swing.
    function playerAttack() {
      const attacker = combatants.crimson;
      const defender = combatants.azure;
      if (!attacker || !defender) return;
      if (window.gameState.crimson.dead || window.gameState.azure.dead) return;
      // Debounce — ignore if already mid-swing or guarding.
      if (attacker.state === 'attack' || attacker.state === 'guard') return;

      try { if (window.sfxSwing) window.sfxSwing(); } catch (e) {}

      attacker.state = 'attack';
      attacker.impactScheduled = false;
      const chosenAttack = pickAttackClip();
      const attackAction = playClip(attacker, chosenAttack, {
        fadeIn: 0.15,
        loop: false,
        weight: 1.0,
      });
      const dur = (attackAction && attacker.currentDuration) || 1.0;

      // Impact at ~70% through the swing — matches combatTick timing.
      setTimeout(() => {
        if (attacker.state !== 'attack') return; // got interrupted (e.g. died)
        attacker.impactScheduled = true;

        // Only play hit reaction on defender if they aren't dead, attacking,
        // or actively guarding (guard frame should hold its BLOCK pose so
        // applyDamage's chip-damage path reads right).
        if (defender && !window.gameState.azure.dead && defender.state !== 'guard' && defender.state !== 'attack') {
          defender.state = 'hit';
          playClip(defender, CLIP_NAMES.HIT, { fadeIn: 0.1, loop: false, weight: 1.0 });
        }

        const defenderRoot = defender && defender.root;
        const hitPos = defenderRoot
          ? defenderRoot.position.clone().add(new THREE.Vector3(0, 1.0, 0))
          : { x: 0, y: 1.0, z: 0 };
        try { window.triggerImpact(hitPos); } catch (err) { console.warn('[lkb-3d] triggerImpact threw', err); }
        try {
          window.applyDamage('azure', 8);
          gainSP('crimson', 5);
          gainSP('azure', 5);
        } catch (err) { console.warn('[lkb-3d] HUD update threw', err); }
      }, dur * 0.70 * 1000);

      // Return crimson to idle after the swing — but only if E isn't held
      // (in which case the keyup handler will own the state).
      setTimeout(() => {
        if (!combatants.crimson) return;
        if (window.gameState.crimson.dead) return;
        if (playerInput.eHeld) return; // guard takes over
        playClip(combatants.crimson, CLIP_NAMES.IDLE, { fadeIn: 0.25, loop: true });
        combatants.crimson.state = 'idle';
      }, dur * 1.05 * 1000);
    }

    function playerGuardEnter() {
      const c = combatants.crimson;
      if (!c) return;
      if (window.gameState.crimson.dead) return;
      if (c.state === 'attack') return; // can't guard mid-swing
      c.state = 'guard';
      playClip(c, CLIP_NAMES.BLOCK, { fadeIn: 0.12, loop: true, weight: 1.0 });
    }

    function playerGuardExit() {
      const c = combatants.crimson;
      if (!c) return;
      if (window.gameState.crimson.dead) return;
      if (c.state !== 'guard') return;
      playClip(c, CLIP_NAMES.IDLE, { fadeIn: 0.2, loop: true });
      c.state = 'idle';
    }

    window.addEventListener('keydown', (e) => {
      if (!fpInputActive()) return;
      if (e.code === 'Space') {
        if (e.repeat) return;
        e.preventDefault();
        const now = performance.now();
        if (now - playerInput.lastSpaceTime < PLAYER_ATTACK_COOLDOWN_MS) return;
        playerInput.lastSpaceTime = now;
        playerInput.spacePressed = true;
        playerAttack();
      } else if (e.code === 'KeyE') {
        if (e.repeat) return;
        e.preventDefault();
        if (playerInput.eHeld) return;
        playerInput.eHeld = true;
        playerGuardEnter();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        playerInput.spacePressed = false;
      } else if (e.code === 'KeyE') {
        if (!playerInput.eHeld) return;
        playerInput.eHeld = false;
        // Only exit guard if we're still in FP mode — otherwise leave
        // the state alone (avoid stomping on cinema/3rd-person logic).
        if (cameraDirector && cameraDirector.viewMode === 'fp') {
          playerGuardExit();
        }
      }
    });

    // ── log.glb ────────────────────────────────────────────────── */
    loader.load(
      'assets/log.glb',
      (gltf) => {
        const root = gltf.scene;
        applyShadows(root, true, true);
        scene.add(root);
        // Log usually static, but if a future bake has anims, drive them.
        setupMixerFor(gltf, 'log');
        markLoaded();
      },
      undefined,
      (err) => {
        console.error('[lkb-3d] failed to load log.glb', err);
        markLoaded(); // still proceed
      }
    );

    // ── crimson.glb ─────────────────────────────────────────────── */
    loader.load(
      'assets/crimson.glb',
      (gltf) => {
        const root = gltf.scene;
        // Do NOT re-anchor; meshes are already at their Blender world positions.
        applyShadows(root, true, false);
        scene.add(root);
        outlinePass.selectedObjects.push(root);
        setupMixerFor(gltf, 'crimson');
        // FP boot-restore replay: if the user's saved viewMode was 'fp',
        // the early setCrimsonSelfVisible/attachFpSword calls hit the TDZ
        // guard and set fpPendingAttach = true without doing anything.
        // Now that combatants.crimson exists, replay the deferred state.
        if (fpPendingAttach && cameraDirector?.viewMode === 'fp') {
          fpPendingAttach = false;
          setCrimsonSelfVisible(false);
          attachFpSword();
        }
        markLoaded();
      },
      undefined,
      (err) => {
        console.error('[lkb-3d] failed to load crimson.glb', err);
        markLoaded();
      }
    );

    // ── azure.glb ───────────────────────────────────────────────── */
    loader.load(
      'assets/azure.glb',
      (gltf) => {
        const root = gltf.scene;
        applyShadows(root, true, false);
        scene.add(root);
        outlinePass.selectedObjects.push(root);
        setupMixerFor(gltf, 'azure');
        markLoaded();
      },
      undefined,
      (err) => {
        console.error('[lkb-3d] failed to load azure.glb', err);
        markLoaded();
      }
    );

    /* ── particle dust/snow (optional, fail-soft) ──────────────── */
    // Additive points drifting downward with per-particle size variation and
    // gentle horizontal wind drift. Wrapped in try/catch — if any of this
    // errors, we silently skip rather than breaking the scene.
    let dustParticles = null;
    let dustVelocities = null;   // [fallSpeed, driftX] interleaved per particle
    try {
      const DUST_COUNT = 3500;
      const dustGeo = new THREE.BufferGeometry();
      const positions = new Float32Array(DUST_COUNT * 3);
      const sizes     = new Float32Array(DUST_COUNT);
      dustVelocities  = new Float32Array(DUST_COUNT * 2); // [vy, vx] per particle
      const SPAN_X = 16, SPAN_Z = 16;
      const Y_MIN = 0.1, Y_MAX = 8.0;
      for (let i = 0; i < DUST_COUNT; i++) {
        positions[i * 3 + 0] = (Math.random() - 0.5) * SPAN_X;
        positions[i * 3 + 1] = Math.random() * (Y_MAX - Y_MIN) + Y_MIN;
        positions[i * 3 + 2] = (Math.random() - 0.5) * SPAN_Z;
        // Per-particle size variation: 0.05 – 0.12
        sizes[i] = 0.05 + Math.random() * 0.07;
        // Gentle per-particle fall speed (m/s).
        dustVelocities[i * 2 + 0] = 0.08 + Math.random() * 0.18;
        // Slight horizontal wind drift: 0 ± 0.03 m/s
        dustVelocities[i * 2 + 1] = (Math.random() - 0.5) * 0.06;
      }
      dustGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      dustGeo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

      const dustMat = new THREE.PointsMaterial({
        color: 0xd8c8b8,
        size: 0.07,          // base size; overridden per-point via sizes attribute
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.92,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
      });

      dustParticles = new THREE.Points(dustGeo, dustMat);
      dustParticles.userData = { Y_MIN, Y_MAX, SPAN_X };
      scene.add(dustParticles);
    } catch (err) {
      console.warn('[lkb-3d] dust particles skipped', err);
      dustParticles = null;
    }

    function updateDust(delta) {
      if (!dustParticles) return;
      const pos = dustParticles.geometry.attributes.position;
      const arr = pos.array;
      const { Y_MIN, Y_MAX, SPAN_X } = dustParticles.userData;
      const n = arr.length / 3;
      for (let i = 0; i < n; i++) {
        const xi = i * 3 + 0;
        const yi = i * 3 + 1;
        arr[yi] -= dustVelocities[i * 2 + 0] * delta;
        arr[xi] += dustVelocities[i * 2 + 1] * delta;
        // Wrap vertically: re-spawn at the top when fallen past Y_MIN.
        if (arr[yi] < Y_MIN) {
          arr[yi] = Y_MAX;
          arr[xi] = (Math.random() - 0.5) * SPAN_X; // randomise X on re-spawn
        }
        // Wrap horizontally to stay within the volume.
        const half = SPAN_X * 0.5;
        if (arr[xi] >  half) arr[xi] -= SPAN_X;
        if (arr[xi] < -half) arr[xi] += SPAN_X;
      }
      pos.needsUpdate = true;
    }

    /* ── resize handler ─────────────────────────────────────────── */
    function onResize() {
      const w = host.clientWidth;
      const h = host.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false); // false → CSS manages element size

      // Composer + all size-aware passes must follow the canvas.
      const pr = renderer.getPixelRatio();
      composer.setPixelRatio(pr);
      composer.setSize(w, h);
      ssaoPass.setSize(w, h);
      outlinePass.setSize(w, h);
      if (typeof bokehPass.setSize === 'function') bokehPass.setSize(w, h);
      bloomPass.setSize(w, h);
      smaaPass.setSize(w * pr, h * pr);
    }
    window.addEventListener('resize', onResize);
    onResize();

    /* ── render loop ────────────────────────────────────────────── */
    // Shared elapsed time accumulator for campfire flicker + ember wobble.
    let _sceneTime = 0;

    // Combat-sync bookkeeping for CameraDirector — tracks last seen
    // combat snapshot so jump-to-close-up fires only on state edges
    // (not every frame). Reset when override clears.
    let _lastCombatKey = null;

    function animate() {
      requestAnimationFrame(animate);
      // SAFETY GUARD: reset camera if it has drifted out of the playable bowl.
      // Round-13 camera-punch additive offset could push camera below ground or
      // far outside the scene; this snaps it back to the default framing.
      if (camera.position.y < 0.5 || camera.position.length() > 50) {
        camera.position.set(0, 2.0, -7.0);
        controls.update();
      }
      const delta = animClock.getDelta();
      _sceneTime += delta;
      const time = _sceneTime;

      // ── campfire flicker ────────────────────────────────────────
      // Two independent phases so the fires don't pulse in sync.
      const flickerL = CAMPFIRE_BASE * (0.85 + 0.30 * Math.sin(time * 8  + 0)   + 0.15 * Math.sin(time * 13 + 0   * 1.7));
      const flickerR = CAMPFIRE_BASE * (0.85 + 0.30 * Math.sin(time * 8  + 2.1) + 0.15 * Math.sin(time * 13 + 2.1 * 1.7));
      fire_light_left.intensity  = flickerL;
      fire_light_right.intensity = flickerR;

      // Advance every animation mixer (knights' idle, log if anim'd, etc.)
      if (mixers.length > 0) {
        mixers.forEach(m => m.update(delta));
      }
      updateDust(delta);
      updateEmbers(delta, time);

      // ── CINEMA: combat sync ─────────────────────────────────────
      // Poll combat state and translate edges into director overrides:
      //   any knight 'dead'    → jump to HIGH_WIDE for KO drama
      //   any knight 'attack'  → jump to CLOSE_<attacker> close-up
      //   otherwise            → clear override, resume cycle
      // Only fires when active and only on edges (key change), so the
      // director keeps cycling normally when nothing is happening.
      // Gated on viewMode === 'cinematic' so FP/manual don't fire
      // jumpTo/clearOverride and corrupt cycle state during their reign.
      if (cameraDirector.active && cameraDirector.viewMode === 'cinematic' && combatants) {
        const cKnight = combatants.crimson;
        const aKnight = combatants.azure;
        const cState  = cKnight ? cKnight.state : null;
        const aState  = aKnight ? aKnight.state : null;
        let key  = null;
        let shot = null;
        if (cState === 'dead' || aState === 'dead') {
          key  = 'ko';
          shot = CINEMA_SHOTS.HIGH_WIDE;
        } else if (cState === 'attack') {
          key  = 'atk:crimson';
          shot = CINEMA_SHOTS.CLOSE_CRIMSON;
        } else if (aState === 'attack') {
          key  = 'atk:azure';
          shot = CINEMA_SHOTS.CLOSE_AZURE;
        }
        if (key !== _lastCombatKey) {
          if (shot) {
            cameraDirector.jumpTo(shot, key);
          } else {
            cameraDirector.clearOverride();
          }
          _lastCombatKey = key;
        }
      }

      // ── CINEMA: per-frame camera ownership ──────────────────────
      // In cinema mode the director owns position + lookAt; we SKIP
      // controls.update() entirely because OrbitControls.update()
      // rewrites camera.position from its internal spherical state
      // every frame and would erase the director's pose.
      // In manual mode the director sleeps and controls.update() runs
      // normally to drive damping. Note: the ImpactSystem briefly
      // disables controls.enabled during a shake (~0.18 s); we do NOT
      // infer cinema state from that flag — cameraDirector.active is
      // the single source of truth (see CameraDirector ownership doc).
      if (cameraDirector.active) {
        cameraDirector.update(delta);
        // FP: rotation owned by mouselook (camera.rotation.set on YXZ),
        // NOT by lookAt — calling lookAt() here would resnap pitch every
        // frame and override the user's aim. We DO assign rotation per
        // frame from (fpYaw, fpPitch) so it always reflects the latest
        // mousemove deltas, even when pointer lock is not yet engaged
        // (so the camera stays where setViewMode('fp') seeded it).
        if (cameraDirector.viewMode === 'fp') {
          camera.rotation.set(cameraDirector.fpPitch, cameraDirector.fpYaw, 0);
        } else {
          camera.lookAt(cameraDirector.currentLookAt);
        }
      } else {
        controls.update(); // damping (recomputes camera.position)
      }

      // Run impact FX AFTER camera ownership so camera-shake jitter
      // wins this frame (its 0.18 s additive offset lands on top of
      // either the director pose or the orbit-driven pose).
      impactSystem.update(delta);
      // NOTE: camera punch additive offset DISABLED (round-13 regression).
      // impactSystem.update() now forces punchOffset to (0,0,0); we also do
      // not add it here. Camera shake jitter (handled inside update()) is
      // unaffected — only the zoom-punch additive mutation is neutralized.
      composer.render();
    }
    animate();
  </script>
</body>
</html>
